const CalcPopulacaoPage=({project})=>{
  const [override,setOverride]=useState({});
  const [extra,setExtra]=useState([{id:Date.now(),descricao:"",area:"",fator:""}]);
  const [obs,setObs]=useState("");

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.usersGroup size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  const grupoOk=project.grupo&&project.divisao;
  const fatorNormativo=POP_M2[project.divisao]||0;
  const areaTotal=Number(project.area_construida)||0;
  const pavimentos=Number(project.numero_pavimentos)||1;
  const areaPav=areaTotal/Math.max(pavimentos,1);

  // Cálculo por pavimento (usa fator padrão ou override)
  const pavimentosData=[];
  for(let i=1;i<=pavimentos;i++){
    const fAplic=Number(override[i])||fatorNormativo;
    const pop=Math.ceil(areaPav*fAplic);
    pavimentosData.push({pav:i,area:areaPav,fator:fAplic,pop,custom:Boolean(override[i])});
  }
  const totalPav=pavimentosData.reduce((acc,p)=>acc+p.pop,0);

  // Áreas extras (auditório, garagem, etc) com fator diferente
  const extraData=extra.filter(e=>e.area&&e.fator).map(e=>{
    const a=Number(e.area)||0;
    const f=Number(e.fator)||0;
    return{...e,popCalc:Math.ceil(a*f)};
  });
  const totalExtra=extraData.reduce((acc,e)=>acc+e.popCalc,0);
  const populacaoTotal=totalPav+totalExtra;
  const populacaoInformada=Number(project.populacao)||0;
  const divergencia=populacaoInformada&&Math.abs(populacaoInformada-populacaoTotal)>5;

  // Salvar (memoria por enquanto)
  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"populacao",
      norma:"IT-11 CBMBA",
      calculado_em:new Date().toISOString(),
      dados_entrada:{grupo:project.grupo,divisao:project.divisao,area_total:areaTotal,pavimentos,fator_normativo:fatorNormativo,overrides:override,areas_extras:extra},
      resultado:{populacao_calculada:populacaoTotal,populacao_por_pavimento:pavimentosData,populacao_extra:extraData,observacoes:obs},
    };
    // futuro: POST /api/calculos/populacao no backend → Supabase
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`População total calculada: ${populacaoTotal} pessoas\n\nResultado salvo em memória (futura integração Supabase: ver console)`);
  };

  const exportar=()=>{
    gerarMemoriaCalculoPDF({
      modulo:"Cálculo de População",
      norma:"IT-11/2016 CBMBA — Tabela de fatores de população",
      projeto:project,
      dadosEntrada:[
        {label:"Grupo / Divisão",valor:`${project.grupo} / ${project.divisao}`,unidade:""},
        {label:"Área total da edificação",valor:areaTotal.toFixed(2),unidade:"m²"},
        {label:"Número de pavimentos",valor:pavimentos,unidade:""},
        {label:"Fator normativo aplicado",valor:fatorNormativo,unidade:"pessoa/m²"},
        {label:"Áreas extras (lotação especial)",valor:extra.length,unidade:"áreas"},
      ],
      formulas:[
        {descricao:"População de cada pavimento:",equacao:"P_pav = área_pav × fator_normativo (IT-11 Tabela 1)"},
        {descricao:"População total:",equacao:"P_total = Σ P_pav + Σ P_áreas_extras"},
      ],
      desenvolvimento:[
        ...pavimentosData.map((pd,i)=>({titulo:`Pavimento ${i+1}`,calculo:`${pd.area} m² × ${pd.fator} = ${pd.popCalc}`,resultado:`${pd.popCalc} pessoas`})),
        ...extraData.map(e=>({titulo:`Área extra: ${e.nome||"sem nome"}`,calculo:`${e.area} m² × ${e.fator}`,resultado:`${e.popCalc} pessoas`})),
        {titulo:"Soma total",calculo:`${totalPav} (pav) + ${totalExtra} (extras)`,resultado:`${populacaoTotal} pessoas`},
      ],
      resultadoFinal:{valor:populacaoTotal,unidade:"pessoas",descricao:"População total da edificação"},
      situacao:divergencia?"NÃO CONFORME":"CONFORME",
      observacoes:obs+(divergencia?`\n\nATENÇÃO: divergência entre população calculada (${populacaoTotal}) e cadastrada (${populacaoInformada}). Revisar.`:""),
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.usersGroup size={24} className="text-orange-500"/> Cálculo de População</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: IT-11 / Tabela de fatores CBMBA</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
      </div>

      {!grupoOk&&<Card className="p-4 border-amber-200 bg-amber-50/50"><div className="flex gap-3"><Icons.alert size={18} className="text-amber-500"/><p className="text-sm">O projeto precisa ter grupo e divisão definidos antes de calcular a população.</p></div></Card>}

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-1">Parâmetros do projeto</h2>
        <p className="text-xs text-slate-500 mb-4">Fonte: ocupação cadastrada no projeto</p>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Grupo/Divisão</p><p className="font-bold text-slate-800">{project.divisao||"—"}</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Área Total</p><p className="font-bold text-slate-800">{areaTotal.toLocaleString()} m²</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Pavimentos</p><p className="font-bold text-slate-800">{pavimentos}</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Fator Normativo</p><p className="font-bold text-slate-800">{fatorNormativo.toFixed(3)} <span className="text-xs text-slate-500">pess/m²</span></p></div>
        </div>
      </Card>

      <Card className="p-5">
        <div className="flex items-start justify-between mb-3 flex-wrap gap-2"><div><h2 className="text-lg font-bold text-slate-800">População por pavimento</h2><p className="text-xs text-slate-500">Você pode sobrescrever o fator de qualquer pavimento se houver mezanino, lotação especial etc.</p></div></div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-slate-200">{["Pavimento","Área (m²)","Fator (pess/m²)","Origem","População","Override"].map(h=><th key={h} className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-2 py-2">{h}</th>)}</tr></thead>
            <tbody>{pavimentosData.map(d=>(
              <tr key={d.pav} className="border-b border-slate-100">
                <td className="px-2 py-2.5 font-medium">{d.pav}º</td>
                <td className="px-2 py-2.5 text-slate-600">{d.area.toFixed(1)}</td>
                <td className="px-2 py-2.5 font-mono">{d.fator.toFixed(3)}</td>
                <td className="px-2 py-2.5"><Badge variant={d.custom?"MODERADO":"default"}>{d.custom?"Manual":"IT-11"}</Badge></td>
                <td className="px-2 py-2.5 font-bold text-orange-600">{d.pop} pessoas</td>
                <td className="px-2 py-2.5"><input type="number" step="0.001" value={override[d.pav]||""} placeholder={fatorNormativo.toFixed(3)} onChange={e=>setOverride(p=>({...p,[d.pav]:e.target.value}))} className="w-24 rounded border border-slate-300 px-2 py-1 text-xs outline-none focus:border-orange-400"/></td>
              </tr>
            ))}</tbody>
            <tfoot><tr className="border-t-2 border-slate-300 font-bold"><td className="px-2 py-2.5" colSpan={4}>Subtotal pavimentos</td><td className="px-2 py-2.5 text-orange-600">{totalPav} pessoas</td><td></td></tr></tfoot>
          </table>
        </div>
      </Card>

      <Card className="p-5">
        <div className="flex justify-between items-center mb-3"><div><h2 className="text-lg font-bold text-slate-800">Áreas com lotação especial</h2><p className="text-xs text-slate-500">Auditório, restaurante, garagem etc com fator próprio</p></div><Btn size="sm" variant="secondary" onClick={()=>setExtra(p=>[...p,{id:Date.now(),descricao:"",area:"",fator:""}])}><Icons.plus size={14}/> Adicionar</Btn></div>
        <div className="space-y-2">{extra.map(e=>(
          <div key={e.id} className="flex items-center gap-2 flex-wrap">
            <input value={e.descricao} onChange={ev=>setExtra(p=>p.map(x=>x.id===e.id?{...x,descricao:ev.target.value}:x))} placeholder="Ex: Auditório" className="flex-1 min-w-[150px] rounded border border-slate-300 px-2 py-1.5 text-sm outline-none focus:border-orange-400"/>
            <input value={e.area} onChange={ev=>setExtra(p=>p.map(x=>x.id===e.id?{...x,area:ev.target.value}:x))} placeholder="Área m²" type="number" className="w-28 rounded border border-slate-300 px-2 py-1.5 text-sm outline-none focus:border-orange-400"/>
            <input value={e.fator} onChange={ev=>setExtra(p=>p.map(x=>x.id===e.id?{...x,fator:ev.target.value}:x))} placeholder="Fator pess/m²" type="number" step="0.01" className="w-28 rounded border border-slate-300 px-2 py-1.5 text-sm outline-none focus:border-orange-400"/>
            <span className="text-sm font-bold text-orange-600 w-24">{e.area&&e.fator?`${Math.ceil(Number(e.area)*Number(e.fator))} pess`:"—"}</span>
            <button onClick={()=>setExtra(p=>p.filter(x=>x.id!==e.id))} className="p-1 rounded hover:bg-red-50 text-slate-400 hover:text-red-500"><Icons.trash size={13}/></button>
          </div>
        ))}</div>
        {totalExtra>0&&<p className="mt-3 text-sm font-bold text-orange-600">Subtotal áreas extras: {totalExtra} pessoas</p>}
      </Card>

      <Card className="p-5 bg-gradient-to-br from-orange-50 to-red-50/50 border-orange-200">
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div><p className="text-xs font-semibold text-orange-600 uppercase tracking-wider">População Calculada</p><p className="text-3xl font-bold text-slate-800 mt-1">{populacaoTotal}</p><p className="text-xs text-slate-500">pessoas (cálculo automático IT-11)</p></div>
          {populacaoInformada>0&&<div><p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">População Informada</p><p className="text-3xl font-bold text-slate-800 mt-1">{populacaoInformada}</p><p className="text-xs text-slate-500">pessoas (cadastro do projeto)</p></div>}
          <div><p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Adotar</p><p className="text-3xl font-bold text-emerald-600 mt-1">{Math.max(populacaoTotal,populacaoInformada)}</p><p className="text-xs text-slate-500">maior valor (segurança)</p></div>
        </div>
        {divergencia&&<div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg flex gap-2"><Icons.alert size={16} className="text-amber-600 flex-shrink-0"/><p className="text-xs text-amber-800">⚠ Divergência detectada entre população calculada ({populacaoTotal}) e informada ({populacaoInformada}). Recomenda-se adotar o maior valor por segurança.</p></div>}
      </Card>

      <Card className="p-5">
        <p className="text-sm font-bold text-slate-700 mb-2">Observações técnicas</p>
        <textarea value={obs} onChange={e=>setObs(e.target.value)} rows={3} placeholder="Anotações sobre o cálculo: critérios especiais, mezaninos, áreas técnicas excluídas..." className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-orange-400"/>
      </Card>
    </div>
  );
};


// ============================================================
// MÓDULO 2: CÁLCULO DE CARGA DE INCÊNDIO (IT-14 CBMBA)
// ============================================================

// Banco de materiais com poder calorífico (MJ/kg) - valores típicos
const MATERIAIS_PC=[
  {nome:"Papel",pc:16.7},{nome:"Madeira",pc:19.0},{nome:"Papelão",pc:17.0},{nome:"Tecido algodão",pc:16.0},
  {nome:"Tecido sintético",pc:25.0},{nome:"Plástico (genérico)",pc:35.0},{nome:"Borracha",pc:42.0},
  {nome:"Óleo combustível",pc:42.0},{nome:"Gasolina",pc:44.0},{nome:"Diesel",pc:42.0},
  {nome:"Álcool etílico",pc:27.0},{nome:"GLP",pc:46.0},{nome:"PVC",pc:18.0},{nome:"Polietileno",pc:46.5},
  {nome:"Couro",pc:18.0},{nome:"Espuma poliuretano",pc:30.0},{nome:"Acetona",pc:31.0},{nome:"Verniz",pc:33.0},
];

const CalcCargaIncendioPage=({project})=>{
  const [itens,setItens]=useState([{id:Date.now(),material:"Madeira",massa:"",pc:19.0,obs:""}]);
  const [buscaAnexoA,setBuscaAnexoA]=useState("");
  const [cnaeSelecionado,setCnaeSelecionado]=useState(null);
  const [aplicado,setAplicado]=useState(false);

  // Resultados da busca rápida no Anexo A (filtrado pela divisão do projeto, se houver)
  const resultadosAnexoA=useMemo(()=>{
    const q=buscaAnexoA.trim().toLowerCase();
    if(q.length<2)return [];
    return IT14_ANEXO_A.filter(it=>{
      const txt=(it.desc+" "+it.cnae).toLowerCase();
      if(!txt.includes(q))return false;
      // Filtra prioritariamente pela divisão do projeto, mas mostra todos se nada bater
      return true;
    }).slice(0,15); // limita resultados
  },[buscaAnexoA]);

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.fire size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  const area=Number(project.area_construida)||0;
  const total=itens.reduce((acc,i)=>acc+(Number(i.massa)||0)*Number(i.pc),0);
  const cargaEspecifica=area>0?total/area:0;
  const classificacao=cargaEspecifica<=300?{nivel:"LEVE",cor:"emerald"}:cargaEspecifica<=1200?{nivel:"MODERADO",cor:"amber"}:{nivel:"ELEVADO",cor:"red"};
  const cargaCadastrada=Number(project.carga_incendio)||0;

  const adicionar=(material="")=>{
    const mat=MATERIAIS_PC.find(m=>m.nome===material);
    setItens(p=>[...p,{id:Date.now(),material:material||"Madeira",massa:"",pc:mat?.pc||19.0,obs:""}]);
  };
  const atualizar=(id,campo,valor)=>{
    setItens(p=>p.map(it=>{
      if(it.id!==id)return it;
      const novoIt={...it,[campo]:valor};
      if(campo==="material"){const mat=MATERIAIS_PC.find(m=>m.nome===valor);if(mat)novoIt.pc=mat.pc;}
      return novoIt;
    }));
  };
  const remover=(id)=>setItens(p=>p.filter(it=>it.id!==id));

  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"carga_incendio",
      norma:"IT-14 CBMBA / NBR 14432",
      calculado_em:new Date().toISOString(),
      dados_entrada:{area_referencia:area,itens:itens.filter(i=>i.massa)},
      resultado:{carga_total_mj:total,carga_especifica_mj_m2:cargaEspecifica,classificacao:classificacao.nivel},
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`Carga de incêndio: ${cargaEspecifica.toFixed(1)} MJ/m² (${classificacao.nivel})\n\nResultado em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    const itensValidos=itens.filter(i=>Number(i.massa)>0);
    if(itensValidos.length===0){alert("⚠ Adicione ao menos um material com massa informada antes de exportar.");return;}
    gerarMemoriaCalculoPDF({
      modulo:"Carga de Incêndio",
      norma:"IT-14/2017 CBMBA — Anexo C (método determinístico)",
      projeto:project,
      dadosEntrada:[
        {label:"Área de referência",valor:area.toFixed(2),unidade:"m²"},
        {label:"Número de materiais inventariados",valor:itensValidos.length,unidade:""},
        {label:"Grupo / Divisão",valor:`${project.grupo} / ${project.divisao}`,unidade:""},
      ],
      formulas:[
        {descricao:"Energia liberada por material:",equacao:"E_i = massa_i × poder_calorífico_i [MJ]"},
        {descricao:"Carga de incêndio específica:",equacao:"q = Σ E_i ÷ A_referência [MJ/m²]"},
      ],
      desenvolvimento:[
        ...itensValidos.map(it=>({titulo:it.material,calculo:`${it.massa} kg × ${it.pc} MJ/kg`,resultado:`${(Number(it.massa)*Number(it.pc)).toFixed(1)} MJ`})),
        {titulo:"Energia total",calculo:`Σ E_i = ${total.toFixed(1)} MJ`,resultado:`${total.toFixed(1)} MJ`},
        {titulo:"Carga específica",calculo:`${total.toFixed(1)} ÷ ${area} m²`,resultado:`${cargaEspecifica.toFixed(1)} MJ/m²`},
      ],
      resultadoFinal:{valor:cargaEspecifica.toFixed(1),unidade:"MJ/m²",descricao:`Classificação: ${classificacao.nivel}`},
      situacao:"INFORMATIVO",
      observacoes:`Método determinístico aplicado (Anexo C IT-14/2017). Para ocupações listadas no Anexo A, prefira o método probabilístico por CNAE.${cargaCadastrada?`\nCarga cadastrada no projeto: ${cargaCadastrada} MJ/m².`:""}`,
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.fire size={24} className="text-orange-500"/> Cálculo de Carga de Incêndio</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: IT-14/2017 CBMBA — Anexo C (método determinístico)</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
      </div>

      <Card className="p-4 border-blue-200 bg-blue-50/50">
        <div className="flex gap-3"><Icons.alert size={18} className="text-blue-600 flex-shrink-0 mt-0.5"/>
          <div className="text-xs text-blue-900 space-y-1">
            <p><b>Método de cálculo (IT-14 item 5):</b></p>
            <p>• <b>Regra geral (probabilístico, Anexo A):</b> Use a tabela do Anexo A por <b>CNAE da atividade</b>. É o método preferencial para a maioria das ocupações.</p>
            <p>• <b>Determinístico (Anexo C):</b> Levantamento direto dos materiais combustíveis. <b>Obrigatório</b> para Grupo L (explosivos) e M (ocupações especiais). Use também quando a ocupação não estiver listada no Anexo A.</p>
            <p>• Esta tela aplica o <b>método determinístico</b>. Valor por divisão no cadastro do projeto ({(CARGA[project.divisao]||"—")} MJ/m² para {project.divisao}) é mediano aproximado — sempre refinar pelo CNAE específico.</p>
          </div>
        </div>
      </Card>

      <Card className="p-5 border-emerald-200 bg-gradient-to-br from-emerald-50/50 to-white">
        <div className="flex items-start justify-between flex-wrap gap-3 mb-3">
          <div>
            <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Icons.book size={18} className="text-emerald-600"/> Consulta rápida ao Anexo A da IT-14</h2>
            <p className="text-xs text-slate-500 mt-1">Busque a atividade da edificação para aplicar a carga de incêndio do CNAE diretamente</p>
          </div>
          <span className="text-xs text-emerald-700 whitespace-nowrap">Veja "Consulta Carga de Incêndio" na sidebar para busca completa</span>
        </div>
        <input type="text" value={buscaAnexoA} onChange={e=>{setBuscaAnexoA(e.target.value);setAplicado(false);setCnaeSelecionado(null);}} placeholder="Digite: hotel, padaria, escritório, oficina, 4711-3..." className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-400"/>
        {resultadosAnexoA.length>0&&!cnaeSelecionado&&(
          <div className="mt-2 max-h-64 overflow-y-auto border border-slate-200 rounded-lg divide-y divide-slate-100">
            {resultadosAnexoA.map((it,idx)=>(
              <button key={`${it.div}-${it.cnae}-${idx}`} onClick={()=>setCnaeSelecionado(it)} className="w-full text-left px-3 py-2 hover:bg-emerald-50 transition flex items-center justify-between gap-2">
                <div className="min-w-0 flex-1">
                  <p className="text-sm text-slate-800 truncate">{it.desc}</p>
                  <p className="text-[10px] text-slate-500 font-mono">{it.div} • CNAE {it.cnae}</p>
                </div>
                <span className="text-sm font-bold text-slate-800 whitespace-nowrap">{it.q} MJ/m²</span>
              </button>
            ))}
          </div>
        )}
        {buscaAnexoA.length>=2&&resultadosAnexoA.length===0&&!cnaeSelecionado&&(
          <p className="mt-2 text-xs text-slate-500 italic">Nenhuma atividade encontrada. Tente outras palavras-chave ou abra a consulta completa para ver todas as 1.105 atividades.</p>
        )}
        {cnaeSelecionado&&(
          <div className="mt-3 p-3 rounded-lg bg-white border-2 border-emerald-300">
            <div className="flex items-start justify-between gap-3 flex-wrap">
              <div className="min-w-0 flex-1">
                <p className="text-[10px] text-emerald-600 uppercase font-bold tracking-wider">Atividade selecionada</p>
                <p className="text-sm font-semibold text-slate-800 mt-0.5">{cnaeSelecionado.desc}</p>
                <p className="text-xs text-slate-500 mt-0.5">Divisão <b>{cnaeSelecionado.div}</b> • CNAE <b className="font-mono">{cnaeSelecionado.cnae}</b></p>
              </div>
              <div className="text-right">
                <p className="text-2xl font-bold text-emerald-700">{cnaeSelecionado.q} <span className="text-xs font-normal text-slate-500">MJ/m²</span></p>
                <p className="text-[10px] text-slate-500">Carga específica</p>
              </div>
            </div>
            <div className="mt-3 flex gap-2 flex-wrap">
              <Btn size="sm" onClick={()=>{
                // Aplica como item único representativo (massa virtual para gerar exatamente a carga desejada na área do projeto)
                const massa=Math.round((cnaeSelecionado.q*area)/19.0); // usa PC da madeira (19) como referência genérica
                setItens([{id:Date.now(),material:`${cnaeSelecionado.desc} (Anexo A IT-14)`,massa:massa,pc:19.0,obs:`Divisão ${cnaeSelecionado.div} • CNAE ${cnaeSelecionado.cnae} • Valor probabilístico Anexo A`}]);
                setAplicado(true);
              }}><Icons.check size={13}/> Aplicar este valor</Btn>
              <button onClick={()=>{setCnaeSelecionado(null);setBuscaAnexoA("");setAplicado(false);}} className="px-3 py-1.5 text-xs text-slate-600 hover:text-slate-800">Cancelar</button>
              {project.divisao&&project.divisao!==cnaeSelecionado.div&&(
                <span className="px-2 py-1 text-[10px] bg-amber-50 text-amber-700 rounded border border-amber-200">⚠ Divisão do projeto ({project.divisao}) difere de {cnaeSelecionado.div}</span>
              )}
            </div>
            {aplicado&&<p className="mt-2 text-xs text-emerald-700 font-semibold">✓ Valor aplicado à tabela abaixo. Resultado: {cnaeSelecionado.q} MJ/m².</p>}

      </Card>

      <Card className="p-5">
        <p className="text-xs text-slate-500 font-mono bg-slate-50 px-3 py-2 rounded">Fórmula: q = Σ (massa × poder calorífico) ÷ área_de_referência [MJ/m²] — IT-14 item 5.4 / Anexo C</p>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3">
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Área Referência</p><p className="font-bold text-slate-800">{area.toLocaleString()} m²</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Itens</p><p className="font-bold text-slate-800">{itens.length}</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Energia Total</p><p className="font-bold text-slate-800">{total.toLocaleString(undefined,{maximumFractionDigits:0})} MJ</p></div>
          <div className={`p-3 rounded-lg bg-${classificacao.cor}-50 border border-${classificacao.cor}-200`}><p className="text-[10px] text-slate-500 uppercase">Classificação</p><p className={`font-bold text-${classificacao.cor}-700`}>{classificacao.nivel}</p></div>
        </div>
      </Card>

      <Card className="p-5">
        <div className="flex items-center justify-between mb-4 flex-wrap gap-2"><div><h2 className="text-lg font-bold text-slate-800">Materiais combustíveis</h2><p className="text-xs text-slate-500">Adicione cada tipo de material presente na edificação</p></div><div className="flex gap-2"><select onChange={e=>{if(e.target.value){adicionar(e.target.value);e.target.value=""}}} className="rounded border border-slate-300 px-2 py-1.5 text-xs outline-none focus:border-orange-400"><option value="">+ Adicionar material...</option>{MATERIAIS_PC.map(m=><option key={m.nome} value={m.nome}>{m.nome} ({m.pc} MJ/kg)</option>)}</select></div></div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-slate-200">{["Material","Massa (kg)","PC (MJ/kg)","Energia (MJ)","Obs",""].map(h=><th key={h} className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-2 py-2">{h}</th>)}</tr></thead>
            <tbody>{itens.map(it=>(
              <tr key={it.id} className="border-b border-slate-100">
                <td className="px-2 py-2"><select value={it.material} onChange={e=>atualizar(it.id,"material",e.target.value)} className="w-40 rounded border border-slate-300 px-2 py-1 text-xs outline-none focus:border-orange-400">{MATERIAIS_PC.map(m=><option key={m.nome} value={m.nome}>{m.nome}</option>)}<option value={it.material}>{it.material}</option></select></td>
                <td className="px-2 py-2"><input type="number" value={it.massa} onChange={e=>atualizar(it.id,"massa",e.target.value)} placeholder="0" className="w-24 rounded border border-slate-300 px-2 py-1 text-xs outline-none focus:border-orange-400"/></td>
                <td className="px-2 py-2"><input type="number" step="0.1" value={it.pc} onChange={e=>atualizar(it.id,"pc",e.target.value)} className="w-20 rounded border border-slate-300 px-2 py-1 text-xs outline-none focus:border-orange-400"/></td>
                <td className="px-2 py-2 font-bold text-orange-600">{((Number(it.massa)||0)*Number(it.pc)).toLocaleString(undefined,{maximumFractionDigits:0})}</td>
                <td className="px-2 py-2"><input value={it.obs} onChange={e=>atualizar(it.id,"obs",e.target.value)} placeholder="local, contêineres..." className="w-32 rounded border border-slate-300 px-2 py-1 text-xs outline-none focus:border-orange-400"/></td>
                <td className="px-2 py-2"><button onClick={()=>remover(it.id)} className="p-1 rounded hover:bg-red-50 text-slate-400 hover:text-red-500"><Icons.trash size={13}/></button></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </Card>

      <Card className="p-5 bg-gradient-to-br from-orange-50 to-red-50/50 border-orange-200">
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div><p className="text-xs font-semibold text-orange-600 uppercase tracking-wider">Carga Específica Calculada</p><p className="text-3xl font-bold text-slate-800 mt-1">{cargaEspecifica.toFixed(1)}</p><p className="text-xs text-slate-500">MJ/m²</p></div>
          {cargaCadastrada>0&&<div><p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Carga Cadastrada</p><p className="text-3xl font-bold text-slate-800 mt-1">{cargaCadastrada}</p><p className="text-xs text-slate-500">MJ/m² (informada no projeto)</p></div>}
          <div><p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Risco Resultante</p><Badge variant={classificacao.nivel}>{classificacao.nivel}</Badge><p className="text-xs text-slate-500 mt-1">Faixa IT-14</p></div>
        </div>
        <div className="mt-4 text-xs text-slate-600 space-y-1">
          <p><b>Faixas:</b> Leve ≤ 300 MJ/m² | Moderado 301–1.200 MJ/m² | Elevado &gt; 1.200 MJ/m²</p>
        </div>
      </Card>
    </div>
  );
};

// MÓDULO 3: DISTÂNCIA MÁXIMA DE CAMINHAMENTO (IT-11/2016 Tabela 2)
// ============================================================
const CalcCaminhamentoPage=({project})=>{
  const [config,setConfig]=useState({n_saidas:"2",possui_chuveiros:false,possui_deteccao:false,piso_descarga:true,distancia_real:""});
  const [obs,setObs]=useState("");

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.route size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  // Tabela 2 IT-11 (Anexo B) — distâncias por grupo/divisão, condição de proteção e nº saídas
  // Formato: linha[col][saidaIdx] onde col 1=sem chuv/sem det, 2=sem chuv/com det, chuv1=com chuv/sem det, chuv2=com chuv/com det
  const TABELA2={
    "AB":{descarga:{1:[45,55],2:[55,65],chuv1:[60,70],chuv2:[80,95]},demais:{1:[40,45],2:[50,60],chuv1:[55,65],chuv2:[75,90]}},
    "CDEFGH":{descarga:{1:[40,45],2:[50,60],chuv1:[55,65],chuv2:[75,90]},demais:{1:[30,35],2:[40,45],chuv1:[45,55],chuv2:[65,75]}},
    "I1_J1":{descarga:{1:[80,95],2:[120,140],chuv1:[null,null],chuv2:[null,null]},demais:{1:[70,80],2:[110,130],chuv1:[null,null],chuv2:[null,null]}},
    "G1_G2_J2":{descarga:{1:[50,60],2:[60,70],chuv1:[80,95],chuv2:[120,140]},demais:{1:[45,55],2:[55,65],chuv1:[70,80],chuv2:[110,130]}},
    "I2_I3_J3_J4":{descarga:{1:[40,45],2:[50,60],chuv1:[60,70],chuv2:[100,120]},demais:{1:[30,35],2:[40,45],chuv1:[50,65],chuv2:[80,95]}},
  };
  function classificaGrupo(g,d){
    g=(g||"").toUpperCase();d=(d||"").toUpperCase();
    if(g==="A"||g==="B")return"AB";
    if(d==="I-1"||d==="J-1")return"I1_J1";
    if(d==="G-1"||d==="G-2"||d==="J-2")return"G1_G2_J2";
    if(d==="I-2"||d==="I-3"||d==="J-3"||d==="J-4")return"I2_I3_J3_J4";
    return"CDEFGH";
  }
  const classeGrupo=classificaGrupo(project.grupo,project.divisao);
  const linha=config.piso_descarga?TABELA2[classeGrupo].descarga:TABELA2[classeGrupo].demais;
  const saidaIdx=Number(config.n_saidas)===1?0:1;
  let distMax;
  if(config.possui_chuveiros){
    distMax=config.possui_deteccao?linha.chuv2[saidaIdx]:linha.chuv1[saidaIdx];
  }else{
    distMax=config.possui_deteccao?linha[2][saidaIdx]:linha[1][saidaIdx];
  }
  const distReal=Number(config.distancia_real)||0;
  const atende=distMax===null?null:(distReal===0||distReal<=distMax);

  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"caminhamento",
      norma:"IT-11/2016 CBMBA Tabela 2 (Anexo B)",
      calculado_em:new Date().toISOString(),
      dados_entrada:{...config,grupo:project.grupo,divisao:project.divisao,classe_tabela:classeGrupo},
      resultado:{distancia_maxima_permitida_m:distMax,distancia_real_m:distReal,atende,observacoes:obs},
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`Distância máxima permitida: ${distMax} m\nStatus: ${atende===null?"N/D":atende?"ATENDE":"NÃO ATENDE"}\n\nSalvo em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    if(distReal===0){alert("⚠ Informe a distância real do projeto antes de exportar.");return;}
    if(distMax===null){alert("⚠ Configuração de proteção inválida para esta divisão (consulte Tabela 2 IT-11).");return;}
    gerarMemoriaCalculoPDF({
      modulo:"Distância de Caminhamento",
      norma:"IT-11/2016 CBMBA — Tabela 2 (Anexo B)",
      projeto:project,
      dadosEntrada:[
        {label:"Grupo / Divisão",valor:`${project.grupo} / ${project.divisao}`,unidade:""},
        {label:"Classe da Tabela 2",valor:classeGrupo,unidade:""},
        {label:"Tipo de pavimento",valor:config.piso_descarga?"Piso de descarga":"Demais andares",unidade:""},
        {label:"Número de saídas",valor:config.n_saidas==="1"?"1 saída":"Mais de uma saída",unidade:""},
        {label:"Possui chuveiros automáticos",valor:config.possui_chuveiros?"Sim":"Não",unidade:""},
        {label:"Possui detecção automática",valor:config.possui_deteccao?"Sim":"Não",unidade:""},
        {label:"Distância real do projeto",valor:distReal,unidade:"m"},
      ],
      formulas:[
        {descricao:"Consulta direta à Tabela 2 da IT-11/2016 (Anexo B):",equacao:"d_máx = f(grupo, piso, nº saídas, chuv, det)"},
        {descricao:"Verificação de conformidade:",equacao:"d_real ≤ d_máx → CONFORME"},
      ],
      desenvolvimento:[
        {titulo:"Classificação",calculo:`Divisão ${project.divisao} → classe ${classeGrupo}`,resultado:classeGrupo},
        {titulo:"Distância permitida",calculo:`Tabela 2 IT-11 — ${config.piso_descarga?"piso descarga":"demais andares"}, ${config.n_saidas==="1"?"1 saída":">1 saída"}, chuv=${config.possui_chuveiros?"sim":"não"}, det=${config.possui_deteccao?"sim":"não"}`,resultado:`${distMax} m`},
        {titulo:"Distância real",calculo:"Medida em planta",resultado:`${distReal} m`},
        {titulo:"Verificação",calculo:`${distReal} m ${atende?"≤":">"} ${distMax} m`,resultado:atende?"ATENDE":"NÃO ATENDE"},
      ],
      resultadoFinal:{valor:`${distReal} / ${distMax}`,unidade:"m (real / permitida)",descricao:atende?"Distância real está dentro do limite normativo":"Distância real EXCEDE o limite normativo"},
      situacao:atende?"CONFORME":"NÃO CONFORME",
      observacoes:obs+(!atende?`\n\nRecomendação: adicionar saída intermediária, instalar sprinklers ou detecção para aumentar o limite permitido conforme Tabela 2.`:""),
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.route size={24} className="text-orange-500"/> Distância de Caminhamento</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: IT-11/2016 CBMBA Tabela 2 (Anexo B)</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
      </div>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Configuração</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <Select label="Número de saídas no pavimento" value={config.n_saidas} onChange={e=>setConfig(p=>({...p,n_saidas:e.target.value}))} options={[{value:"1",label:"1 saída (única)"},{value:"2",label:"Mais de uma saída"}]}/>
          <Select label="Tipo de pavimento" value={config.piso_descarga?"d":"o"} onChange={e=>setConfig(p=>({...p,piso_descarga:e.target.value==="d"}))} options={[{value:"d",label:"Piso de descarga (saída da edificação)"},{value:"o",label:"Demais andares"}]}/>
          <Input label="Distância real do projeto (m)" type="number" step="0.1" value={config.distancia_real} onChange={e=>setConfig(p=>({...p,distancia_real:e.target.value}))} placeholder="Medida da planta"/>
          <div className="space-y-2"><Toggle label="Possui chuveiros automáticos" checked={config.possui_chuveiros} onChange={v=>setConfig(p=>({...p,possui_chuveiros:v}))}/><Toggle label="Possui detecção automática de fumaça" checked={config.possui_deteccao} onChange={v=>setConfig(p=>({...p,possui_deteccao:v}))}/></div>
        </div>
        <p className="mt-3 text-xs text-slate-500"><b>Divisão do projeto:</b> {project.divisao||"—"} → faixa <code className="bg-slate-100 px-1 rounded">{classeGrupo}</code> da Tabela 2.</p>
      </Card>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Tabela 2 IT-11 — Distâncias máximas (m)</h2>
        <p className="text-xs text-slate-500 mb-3">Valores para o grupo do projeto ({classeGrupo}), {config.piso_descarga?"piso de descarga":"demais andares"}:</p>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-slate-200"><th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-3 py-2">Configuração</th><th className="text-center text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-3 py-2">1 saída</th><th className="text-center text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-3 py-2">+ de 1 saída</th></tr></thead>
            <tbody>
              {[
                ["Sem chuveiros / sem detecção",linha[1][0],linha[1][1],!config.possui_chuveiros&&!config.possui_deteccao],
                ["Sem chuveiros / com detecção",linha[2][0],linha[2][1],!config.possui_chuveiros&&config.possui_deteccao],
                ["Com chuveiros / sem detecção",linha.chuv1[0],linha.chuv1[1],config.possui_chuveiros&&!config.possui_deteccao],
                ["Com chuveiros / com detecção",linha.chuv2[0],linha.chuv2[1],config.possui_chuveiros&&config.possui_deteccao],
              ].map(([txt,v1,v2,ativa])=>(
                <tr key={txt} className={`border-b border-slate-100 ${ativa?"bg-orange-50/50 font-bold":""}`}>
                  <td className="px-3 py-2.5">{txt} {ativa&&"←"}</td>
                  <td className={`px-3 py-2.5 text-center ${ativa&&saidaIdx===0?"text-orange-600 font-bold":"text-slate-600"}`}>{v1??"N/A"} {v1?"m":""}</td>
                  <td className={`px-3 py-2.5 text-center ${ativa&&saidaIdx===1?"text-orange-600 font-bold":"text-slate-600"}`}>{v2??"N/A"} {v2?"m":""}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      <Card className={`p-5 border-2 ${atende===null?"border-slate-200 bg-slate-50":atende?"border-emerald-200 bg-emerald-50/30":"border-red-200 bg-red-50/30"}`}>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div><p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Permitida (IT-11)</p><p className="text-3xl font-bold text-slate-800 mt-1">{distMax??"N/A"} {distMax?"m":""}</p></div>
          <div><p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Real do Projeto</p><p className="text-3xl font-bold text-slate-800 mt-1">{distReal||"—"} {distReal?"m":""}</p></div>
          <div><p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</p><div className="mt-2">{distMax===null?<Badge>Não aplicável</Badge>:distReal===0?<Badge>Informe distância</Badge>:atende?<Badge variant="CALCULADO">✓ ATENDE</Badge>:<Badge variant="ELEVADO">✗ NÃO ATENDE</Badge>}</div></div>
        </div>
        {distReal>0&&atende===false&&<div className="mt-4 p-3 bg-red-100 border border-red-300 rounded-lg text-sm text-red-800"><b>Recomendação:</b> Adicionar saída intermediária, instalar sprinklers ou detecção para aumentar o limite permitido.</div>}
        {classeGrupo==="I1_J1"&&config.possui_chuveiros&&<div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-800">Para divisões I-1 e J-1, a IT-11 Tabela 2 não traz valores específicos para coluna "com chuveiros".</div>}
      </Card>

      <Card className="p-5">
        <p className="text-sm font-bold text-slate-700 mb-2">Observações</p>
        <textarea value={obs} onChange={e=>setObs(e.target.value)} rows={3} placeholder="Anotações sobre o trajeto, pontos críticos..." className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-orange-400"/>
      </Card>
    </div>
  );
};

// Tabela de eventos com lotação > 500 (item 5.1.5.2 IT-17)
function brigadistasEvento(lotacao){
  if(lotacao<=500)return null;
  if(lotacao<=1000)return 5;
  if(lotacao<=2500)return 10;
  if(lotacao<=5000)return 15;
  if(lotacao<=10000)return 20;
  // acima de 10.000: +1 brigadista a cada 500 pessoas
  return 20+Math.ceil((lotacao-10000)/500);
}

const CalcBrigadaPage=({project})=>{
  const [params,setParams]=useState({n_turnos:"1",populacao_fixa:"",modo_evento:false});
  const [obs,setObs]=useState("");

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.helmet size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  const divisao=(project.divisao||"").toUpperCase();
  const regraDiv=TABELA_IT17[divisao];
  const popProj=Number(project.populacao)||Math.ceil(Number(project.area_construida)*(POP_M2[project.divisao]||0.1));
  // População fixa = base do cálculo. Pode ser informada pelo usuário.
  const popFixa=Number(params.populacao_fixa)||Math.ceil(popProj*0.4); // default 40% da pop. total
  const nTurnos=Number(params.n_turnos)||1;

  // Identifica faixa de população na tabela A.1
  let brigadistasPorPav=0, faixa="";
  if(regraDiv&&!regraDiv.isento){
    if(popFixa<=2){brigadistasPorPav=regraDiv.vals[0];faixa="Até 2 pessoas";}
    else if(popFixa<=4){brigadistasPorPav=regraDiv.vals[1];faixa="Até 4 pessoas";}
    else if(popFixa<=6){brigadistasPorPav=regraDiv.vals[2];faixa="Até 6 pessoas";}
    else if(popFixa<=8){brigadistasPorPav=regraDiv.vals[3];faixa="Até 8 pessoas";}
    else if(popFixa<=10){brigadistasPorPav=regraDiv.vals[4];faixa="Até 10 pessoas";}
    else{
      // Nota 5 da IT-17: acima de 10, +1 brigadista para cada grupo adicional de 10
      const baseValue=regraDiv.vals[4];
      const especial=regraDiv.vals[5];
      if(especial==="todos"){
        brigadistasPorPav=popFixa;faixa="Acima de 10 — todos os ocupantes (nota específica)";
      }else{
        brigadistasPorPav=baseValue+Math.ceil((popFixa-10)/10);
        faixa=`Acima de 10 (nota 5: ${baseValue} + 1 a cada 10 adicionais)`;
      }
    }
  }

  // Para eventos F-3/F-7 com lotação > 500
  const brigadistasEvt=params.modo_evento?brigadistasEvento(popFixa):null;
  const brigadistasFinal=Math.max(brigadistasPorPav,brigadistasEvt||0);

  const pav=Number(project.numero_pavimentos)||1;
  // IT-17 Tabela A.1 é POR PAVIMENTO ou COMPARTIMENTO
  const totalEdificacao=brigadistasFinal*pav;
  const totalTurnos=totalEdificacao*nTurnos;

  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"brigada",
      norma:"IT-17/2016 CBMBA Tabela A.1",
      calculado_em:new Date().toISOString(),
      dados_entrada:{...params,populacao_fixa:popFixa,divisao,grupo:project.grupo,n_pavimentos:pav},
      resultado:{
        brigadistas_por_pavimento:brigadistasFinal,
        brigadistas_edificacao:totalEdificacao,
        brigadistas_total_turnos:totalTurnos,
        grau_risco:regraDiv?.risco||"—",
        nivel_treinamento:regraDiv?.treino||"—",
        faixa_populacional:faixa,
      },
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`Brigada IT-17:\n• ${brigadistasFinal} brigadistas por pavimento\n• ${totalEdificacao} brigadistas na edificação (${pav} pav)\n• ${totalTurnos} brigadistas totais (${nTurnos} turno(s))\n• Treinamento: ${regraDiv?.treino||"—"}\n\nSalvo em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    if(!regraDiv){alert("⚠ Divisão não encontrada na Tabela A.1 da IT-17. Revise o cadastro do projeto.");return;}
    gerarMemoriaCalculoPDF({
      modulo:"Dimensionamento de Brigada de Incêndio",
      norma:"IT-17/2016 CBMBA — Tabela A.1 (Anexo A)",
      projeto:project,
      dadosEntrada:[
        {label:"Divisão",valor:divisao,unidade:""},
        {label:"População fixa por pavimento",valor:popFixa,unidade:"pessoas"},
        {label:"Número de pavimentos",valor:pav,unidade:""},
        {label:"Número de turnos",valor:nTurnos,unidade:""},
        {label:"Modo evento (>500 pessoas)",valor:params.modo_evento?"Sim":"Não",unidade:""},
        {label:"Grau de risco (tabela A.1)",valor:regraDiv.risco,unidade:""},
        {label:"Nível de treinamento exigido",valor:regraDiv.treino,unidade:""},
      ],
      formulas:[
        {descricao:"Quantidade de brigadistas — Tabela A.1 IT-17:",equacao:"N_bri = f(divisão, população fixa)"},
        {descricao:"Para pop > 10 (nota 5): +1 brigadista a cada 10 pessoas adicionais",equacao:"N = N_base + ⌈(pop − 10) / 10⌉"},
        {descricao:"Total na edificação:",equacao:"N_total = N_por_pavimento × n_pavimentos × n_turnos"},
      ],
      desenvolvimento:[
        {titulo:"Classificação",calculo:`Divisão ${divisao}`,resultado:`${regraDiv.risco} / ${regraDiv.treino}`},
        {titulo:"Faixa populacional",calculo:`Pop fixa = ${popFixa}`,resultado:faixa||"—"},
        {titulo:"Brigadistas por pavimento",calculo:"Consulta Tabela A.1",resultado:`${brigadistasFinal}`},
        {titulo:"Total na edificação",calculo:`${brigadistasFinal} × ${pav} pavimentos`,resultado:`${totalEdificacao}`},
        {titulo:"Total considerando turnos",calculo:`${totalEdificacao} × ${nTurnos} turno(s)`,resultado:`${totalTurnos} brigadistas`},
        ...(brigadistasEvt?[{titulo:"Modo evento (item 5.1.5.2)",calculo:`Lotação ${popFixa}`,resultado:`${brigadistasEvt} mín.`}]:[]),
      ],
      resultadoFinal:{valor:totalTurnos,unidade:"brigadistas",descricao:`Treinamento exigido: ${regraDiv.treino}`},
      situacao:regraDiv.isento?"INFORMATIVO":"CONFORME",
      observacoes:obs+`\n\nGrau de risco da brigada: ${regraDiv.risco}. Nível de treinamento: ${regraDiv.treino} (carga horária e habilitações conforme item 5.3 da IT-17/2016).`,
    });
  };

  if(!regraDiv){
    return(
      <div className="space-y-6 fade-in">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.helmet size={24} className="text-orange-500"/> Dimensionamento de Brigada</h1></div>
        <Card className="p-5 border-amber-200 bg-amber-50/30">
          <div className="flex gap-3"><Icons.alert size={18} className="text-amber-500"/><div><p className="font-bold">Divisão "{project.divisao||"—"}" não encontrada na Tabela A.1 da IT-17</p><p className="text-xs mt-1 text-slate-600">A IT-17 cobre as principais ocupações dos grupos A, B, C, D, E, F, G, H, I e J. Confira o cadastro do projeto.</p></div></div>
        </Card>
      </div>
    );
  }

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.helmet size={24} className="text-orange-500"/> Dimensionamento de Brigada</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: IT-17/2016 CBMBA — Tabela A.1 (Anexo A)</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
      </div>

      {regraDiv.isento&&<Card className="p-4 border-emerald-200 bg-emerald-50"><div className="flex gap-3"><Icons.check size={18} className="text-emerald-600"/><p className="text-sm">Divisão {divisao}: <b>isenta de brigada</b> conforme IT-17 Tabela A.1.</p></div></Card>}

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Parâmetros</h2>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <Input label="População fixa por pavimento" type="number" value={params.populacao_fixa} onChange={e=>setParams(p=>({...p,populacao_fixa:e.target.value}))} placeholder={`Estimado: ${popFixa}`}/>
          <Select label="Número de turnos" value={params.n_turnos} onChange={e=>setParams(p=>({...p,n_turnos:e.target.value}))} options={[{value:"1",label:"1 turno"},{value:"2",label:"2 turnos"},{value:"3",label:"3 turnos"}]}/>
          {(divisao==="F-3"||divisao==="F-7")&&<Toggle label="Evento com lotação > 500 (IT-17 item 5.1.5)" checked={params.modo_evento} onChange={v=>setParams(p=>({...p,modo_evento:v}))}/>}

          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Nível treinamento</p><p className="font-bold text-slate-800">{regraDiv.treino}</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Faixa populacional</p><p className="font-bold text-slate-800">{faixa||"—"}</p></div>

      <Card className="p-5">

            <tbody>
              {[["Até 2",regraDiv.vals[0]],["Até 4",regraDiv.vals[1]],["Até 6",regraDiv.vals[2]],["Até 8",regraDiv.vals[3]],["Até 10",regraDiv.vals[4]],["Acima de 10",regraDiv.vals[5]==="todos"?"Todos":`${regraDiv.vals[4]} + 1 a cada 10 adicionais`]].map(([txt,v],i)=>{
                const popLimite=[2,4,6,8,10,Infinity][i];

const CalcIluminacaoPage=({project})=>{
  const [config,setConfig]=useState({altura_pe_direito:"2.6",tipo_ambiente:"plano",autonomia:"1"});
  const [ambientes,setAmbientes]=useState([
    {id:Date.now(),local:"Rota de fuga / corredor",area:"",iluminancia_min:3,tipo:"plano"},
  ]);
  const [obs,setObs]=useState("");

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.bulb size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  // Iluminâncias mínimas conforme IT-18/2017 item 5.4.2.1 e NBR 10898
  const ILUMINANCIAS={
    plano:{lux:3,desc:"Locais planos (corredores, halls, áreas de refúgio) - IT-18 item 5.4.2.1"},
    desnivel:{lux:5,desc:"Locais com desnível (escadas, rampas, passagens com obstáculos)"},
    porta:{lux:5,desc:"Portas de saída e mudanças de direção"},
    risco:{lux:15,desc:"Áreas de risco (subestação, sala técnica) - NBR 10898"},
    espaco_aberto:{lux:3,desc:"Espaços abertos (lobbies, áreas comuns)"},
  };

  // Lâmpada típica de emergência LED — fluxo luminoso médio
  const FLUXO_LAMPADA=80; // lúmens por lâmpada de balizamento padrão
  const FATOR_UTILIZACAO=0.5;
  const FATOR_MANUTENCAO=0.8;
  // IT-18 item 5.4.2: distância máxima 15m entre pontos, máx 7,5m do ponto à parede
  const ESPACAMENTO_MAX=15;

  const totalArea=ambientes.reduce((acc,a)=>acc+(Number(a.area)||0),0);

  // Calcula para cada ambiente
  const calcAmbientes=ambientes.map(a=>{
    const area=Number(a.area)||0;
    const lux=Number(a.iluminancia_min)||5;
    // E (lux) = (fluxo × N × FU × FM) / área
    // → N = (lux × área) / (fluxo × FU × FM)
    const nPorLumen=(lux*area)/(FLUXO_LAMPADA*FATOR_UTILIZACAO*FATOR_MANUTENCAO);
    const nMinimo=Math.max(Math.ceil(nPorLumen),Math.ceil(area/(ESPACAMENTO_MAX*ESPACAMENTO_MAX)));
    return{...a,nLampadas:nMinimo,areaNum:area};
  });
  const totalLampadas=calcAmbientes.reduce((acc,a)=>acc+a.nLampadas,0);

  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"iluminacao_emergencia",
      norma:"IT-18 CBMBA / NBR 10898",
      calculado_em:new Date().toISOString(),
      dados_entrada:{...config,ambientes,total_area:totalArea},
      resultado:{total_lampadas:totalLampadas,detalhes:calcAmbientes,fluxo_lampada:FLUXO_LAMPADA,fator_utilizacao:FATOR_UTILIZACAO,fator_manutencao:FATOR_MANUTENCAO,observacoes:obs},
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`Iluminação de emergência: ${totalLampadas} lâmpadas no total\nÁrea total: ${totalArea} m²\n\nSalvo em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    if(calcAmbientes.length===0||totalArea===0){alert("⚠ Adicione ao menos um ambiente com área informada antes de exportar.");return;}
    gerarMemoriaCalculoPDF({
      modulo:"Iluminação de Emergência",
      norma:"IT-18/2017 CBMBA / ABNT NBR 10898",
      projeto:project,
      dadosEntrada:[
        {label:"Número de ambientes",valor:calcAmbientes.length,unidade:""},
        {label:"Área total iluminada",valor:totalArea.toFixed(2),unidade:"m²"},
        {label:"Pé direito",valor:config.altura_pe_direito,unidade:"m"},
        {label:"Autonomia exigida",valor:config.autonomia,unidade:"h"},
        {label:"Fluxo luminoso por lâmpada",valor:FLUXO_LAMPADA,unidade:"lm"},
        {label:"Fator de utilização",valor:FATOR_UTILIZACAO,unidade:""},
        {label:"Fator de manutenção",valor:FATOR_MANUTENCAO,unidade:""},
      ],
      formulas:[
        {descricao:"Número de lâmpadas por ambiente:",equacao:"N = (E × A) / (Φ × FU × FM)"},
        {descricao:"Onde: E=iluminância(lux), A=área(m²), Φ=fluxo(lm), FU=fator utilização, FM=fator manutenção",equacao:"IT-18/2017 item 5.4.2.1 e NBR 10898"},
      ],
      desenvolvimento:[
        ...calcAmbientes.map(a=>({titulo:a.local||"Ambiente",calculo:`(${a.iluminancia_min} × ${a.area}) / (${FLUXO_LAMPADA} × ${FATOR_UTILIZACAO} × ${FATOR_MANUTENCAO})`,resultado:`${a.nLampadas} lâmp.`})),
        {titulo:"Total de lâmpadas",calculo:`Σ por ambiente`,resultado:`${totalLampadas} lâmpadas`},
      ],
      resultadoFinal:{valor:totalLampadas,unidade:"lâmpadas",descricao:`Iluminação total para ${totalArea.toFixed(0)} m² (autonomia ${config.autonomia}h)`},
      situacao:"INFORMATIVO",
      observacoes:obs+"\n\nIluminâncias mínimas IT-18/2017 item 5.4.2.1: 3 lux em locais planos, 5 lux em locais com desnível (escadas/rampas), 15 lux em áreas de risco.",
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.bulb size={24} className="text-orange-500"/> Iluminação de Emergência</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: IT-18 CBMBA / NBR 10898</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
      </div>

      <Card className="p-5">
        <p className="text-xs text-slate-500 font-mono bg-slate-50 px-3 py-2 rounded">Fórmula: N = (E × A) / (Φ × FU × FM), onde N = nº lâmpadas, E = iluminância (lux), A = área (m²), Φ = fluxo luminoso por lâmpada (lm), FU = fator utilização, FM = fator manutenção</p>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3">
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Fluxo/lâmpada</p><p className="font-bold text-slate-800">{FLUXO_LAMPADA} lm</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Fator Utilização</p><p className="font-bold text-slate-800">{FATOR_UTILIZACAO}</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Fator Manutenção</p><p className="font-bold text-slate-800">{FATOR_MANUTENCAO}</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Espaç. máx</p><p className="font-bold text-slate-800">{ESPACAMENTO_MAX} m</p></div>
        </div>
      </Card>

      <Card className="p-5">
        <div className="flex items-center justify-between mb-4"><div><h2 className="text-lg font-bold text-slate-800">Ambientes a iluminar</h2><p className="text-xs text-slate-500">Cadastre cada trecho com sua iluminância normativa</p></div><Btn size="sm" variant="secondary" onClick={()=>setAmbientes(p=>[...p,{id:Date.now(),local:"",area:"",iluminancia_min:5,tipo:"rota"}])}><Icons.plus size={14}/> Adicionar</Btn></div>

// ============================================================
// MÓDULO 7: DETECÇÃO E ALARME (IT-19 CBMBA / NBR 17240)
// ============================================================
const CalcAlarmePage=({project})=>{
  const [config,setConfig]=useState({tipo_deteccao:"manual",altura_teto:"3.0",possui_dutos:false});
  const [zonas,setZonas]=useState([{id:Date.now(),nome:"Pavimento Térreo",area:"",tipo:"fumaca"}]);
  const [acionadores,setAcionadores]=useState([{id:Date.now(),pavimento:"Térreo",quantidade:2}]);
  const [obs,setObs]=useState("");

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.bell size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  // Áreas máximas de cobertura por detector (NBR 17240)
  // fumaca pontual: 81 m² (espaçamento máx 9m)
  // termico pontual: 36 m² (espaçamento máx 6m)
  // termico linear: depende, default 9m de raio
  const AREA_COBERTURA={
    fumaca:{area:81,espacamento:9,nome:"Detector de fumaça pontual",aplicacao:"Ambientes com pé-direito até 8m"},
    termico:{area:36,espacamento:6,nome:"Detector térmico pontual",aplicacao:"Cozinhas, áreas com fumaça/vapor normal"},
    chama:{area:200,espacamento:15,nome:"Detector de chama (UV/IR)",aplicacao:"Áreas com líquidos inflamáveis"},
    duto:{area:50,espacamento:7,nome:"Detector de fumaça em duto",aplicacao:"Sistemas de ar condicionado"},
  };

  const calcZonas=zonas.map(z=>{
    const cov=AREA_COBERTURA[z.tipo];
    const area=Number(z.area)||0;
    const nDetectores=Math.max(Math.ceil(area/cov.area),1);
    return{...z,nDetectores,cov,areaNum:area};
  });
  const totalDetectores=calcZonas.reduce((acc,z)=>acc+z.nDetectores,0);
  const totalAcionadores=acionadores.reduce((acc,a)=>acc+Number(a.quantidade||0),0);
  // Avisadores sonoros/visuais: 1 a cada 50m² de área comum
  const areaTotal=zonas.reduce((acc,z)=>acc+(Number(z.area)||0),0);
  const totalAvisadores=Math.max(Math.ceil(areaTotal/200),Number(project.numero_pavimentos)||1);

  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"deteccao_alarme",
      norma:"IT-19 CBMBA / NBR 17240",
      calculado_em:new Date().toISOString(),
      dados_entrada:{...config,zonas,acionadores,observacoes:obs},
      resultado:{tipo_sistema:config.tipo_deteccao,total_detectores:totalDetectores,total_acionadores:totalAcionadores,total_avisadores:totalAvisadores,detalhes_zonas:calcZonas},
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`Sistema de Alarme:\n• ${totalDetectores} detectores automáticos\n• ${totalAcionadores} acionadores manuais\n• ${totalAvisadores} avisadores sonoros/visuais\n\nSalvo em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    if(zonas.length===0&&acionadores.length===0){alert("⚠ Cadastre ao menos uma zona ou acionador antes de exportar.");return;}
    gerarMemoriaCalculoPDF({
      modulo:"Sistema de Detecção e Alarme de Incêndio",
      norma:"IT-19/2017 CBMBA / ABNT NBR 17240",
      projeto:project,
      dadosEntrada:[
        {label:"Tipo de sistema",valor:config.tipo_deteccao,unidade:""},
        {label:"Altura do teto",valor:config.altura_teto,unidade:"m"},
        {label:"Possui dutos de ar condicionado",valor:config.possui_dutos?"Sim":"Não",unidade:""},
        {label:"Zonas cadastradas",valor:zonas.length,unidade:""},
        {label:"Área total monitorada",valor:areaTotal.toFixed(2),unidade:"m²"},
      ],
      formulas:[
        {descricao:"Detectores por zona (NBR 17240):",equacao:"N_det = área / cobertura_detector"},
        {descricao:"Acionadores manuais (item 5.4 IT-19):",equacao:"Distância máxima entre acionadores ≤ 30 m"},
        {descricao:"Avisadores sonoros/visuais:",equacao:"Min. 1 a cada pavimento + cobertura de área comum"},
      ],
      desenvolvimento:[
        ...calcZonas.map(z=>({titulo:z.nome||"Zona",calculo:`${z.area} m² ÷ cobertura do detector ${z.tipo_detector}`,resultado:`${z.nDetectores} detectores`})),
        {titulo:"Total de detectores",calculo:"Σ por zona",resultado:`${totalDetectores}`},
        {titulo:"Total de acionadores manuais",calculo:"Cadastro manual",resultado:`${totalAcionadores}`},
        {titulo:"Avisadores sonoros/visuais",calculo:`max(${areaTotal.toFixed(0)}/200, ${project.numero_pavimentos||1})`,resultado:`${totalAvisadores}`},
      ],
      resultadoFinal:{valor:`${totalDetectores}+${totalAcionadores}+${totalAvisadores}`,unidade:"componentes",descricao:"Detectores + Acionadores + Avisadores"},
      situacao:"INFORMATIVO",
      observacoes:obs+"\n\nCentral de alarme deve ter autonomia mínima de 24h em standby e 15 min em alarme (NBR 17240). Setorização e endereçamento conforme IT-19 itens 5.5 e 5.6.",
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.bell size={24} className="text-orange-500"/> Detecção e Alarme</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: IT-19 CBMBA / NBR 17240</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
      </div>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Configuração do sistema</h2>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <Select label="Tipo de sistema" value={config.tipo_deteccao} onChange={e=>setConfig(p=>({...p,tipo_deteccao:e.target.value}))} options={[{value:"manual",label:"Manual (apenas acionadores)"},{value:"automatico",label:"Automático (com detectores)"},{value:"misto",label:"Misto (acionadores + detectores)"}]}/>
          <Input label="Altura do teto (m)" type="number" step="0.1" value={config.altura_teto} onChange={e=>setConfig(p=>({...p,altura_teto:e.target.value}))}/>
          <Toggle label="Possui dutos de ar condicionado" checked={config.possui_dutos} onChange={v=>setConfig(p=>({...p,possui_dutos:v}))}/>
        </div>
      </Card>

      {(config.tipo_deteccao==="automatico"||config.tipo_deteccao==="misto")&&(
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4"><div><h2 className="text-lg font-bold text-slate-800">Zonas de detecção</h2><p className="text-xs text-slate-500">Cadastre cada zona com seu tipo de detector</p></div><Btn size="sm" variant="secondary" onClick={()=>setZonas(p=>[...p,{id:Date.now(),nome:"",area:"",tipo:"fumaca"}])}><Icons.plus size={14}/> Adicionar zona</Btn></div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="border-b border-slate-200">{["Zona/Local","Tipo Detector","Área (m²)","Cobertura/und","Detectores",""].map(h=><th key={h} className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-2 py-2">{h}</th>)}</tr></thead>
              <tbody>{calcZonas.map(z=>(
                <tr key={z.id} className="border-b border-slate-100">
                  <td className="px-2 py-2"><input value={z.nome} onChange={e=>setZonas(p=>p.map(x=>x.id===z.id?{...x,nome:e.target.value}:x))} placeholder="Ex: Pav. tipo" className="w-40 rounded border border-slate-300 px-2 py-1 text-xs outline-none focus:border-orange-400"/></td>
                  <td className="px-2 py-2"><select value={z.tipo} onChange={e=>setZonas(p=>p.map(x=>x.id===z.id?{...x,tipo:e.target.value}:x))} className="w-44 rounded border border-slate-300 px-1 py-1 text-xs outline-none focus:border-orange-400">{Object.entries(AREA_COBERTURA).map(([k,v])=><option key={k} value={k}>{v.nome}</option>)}</select></td>
                  <td className="px-2 py-2"><input type="number" value={z.area} onChange={e=>setZonas(p=>p.map(x=>x.id===z.id?{...x,area:e.target.value}:x))} placeholder="0" className="w-20 rounded border border-slate-300 px-2 py-1 text-xs outline-none focus:border-orange-400"/></td>
                  <td className="px-2 py-2 text-xs text-slate-600">{z.cov.area} m²</td>
                  <td className="px-2 py-2 font-bold text-orange-600">{z.nDetectores} und</td>
                  <td className="px-2 py-2"><button onClick={()=>setZonas(p=>p.filter(x=>x.id!==z.id))} className="p-1 rounded hover:bg-red-50 text-slate-400 hover:text-red-500"><Icons.trash size={13}/></button></td>
                </tr>
              ))}</tbody>
              <tfoot><tr className="border-t-2 border-slate-300 font-bold"><td className="px-2 py-2.5" colSpan={2}>TOTAL</td><td>{areaTotal.toFixed(0)} m²</td><td></td><td className="text-orange-600">{totalDetectores} und</td><td></td></tr></tfoot>
            </table>
          </div>
        </Card>
      )}

      <Card className="p-5">
        <div className="flex items-center justify-between mb-3"><div><h2 className="text-lg font-bold text-slate-800">Acionadores manuais</h2><p className="text-xs text-slate-500">1 acionador a cada 30 m do percurso de fuga (IT-19)</p></div><Btn size="sm" variant="secondary" onClick={()=>setAcionadores(p=>[...p,{id:Date.now(),pavimento:"",quantidade:1}])}><Icons.plus size={14}/> Adicionar</Btn></div>
        <div className="space-y-2">{acionadores.map(a=>(
          <div key={a.id} className="flex items-center gap-2 flex-wrap">
            <input value={a.pavimento} onChange={e=>setAcionadores(p=>p.map(x=>x.id===a.id?{...x,pavimento:e.target.value}:x))} placeholder="Local/Pavimento" className="flex-1 min-w-[150px] rounded border border-slate-300 px-2 py-1.5 text-sm outline-none focus:border-orange-400"/>
            <input type="number" min="1" value={a.quantidade} onChange={e=>setAcionadores(p=>p.map(x=>x.id===a.id?{...x,quantidade:e.target.value}:x))} className="w-20 rounded border border-slate-300 px-2 py-1.5 text-sm outline-none focus:border-orange-400"/>
            <span className="text-xs text-slate-500">acionador(es)</span>
            <button onClick={()=>setAcionadores(p=>p.filter(x=>x.id!==a.id))} className="p-1 rounded hover:bg-red-50 text-slate-400 hover:text-red-500"><Icons.trash size={13}/></button>
          </div>
        ))}</div>
      </Card>

      <Card className="p-5 bg-gradient-to-br from-orange-50 to-red-50/50 border-orange-200">
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div><p className="text-xs font-semibold text-slate-500 uppercase">Detectores</p><p className="text-3xl font-bold text-slate-800 mt-1">{totalDetectores}</p></div>

// ============================================================
// MÓDULO 8: CHUVEIROS AUTOMÁTICOS — SPRINKLERS (IT-23 / NBR 10897)
// ============================================================
const CalcSprinklersPage=({project})=>{
  const [config,setConfig]=useState({classe_risco:"LEVE",tipo_sprinkler:"upright",pe_direito:"3.0"});
  const [obs,setObs]=useState("");
  const [ambientes,setAmbientes]=useState([{nome:"",area:""}]);
  const [modoCalc,setModoCalc]=useState("projeto"); // "projeto" = usa área total do projeto, "ambientes" = calcula por ambiente

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.sprinkler size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  const addAmbiente=()=>setAmbientes(a=>[...a,{nome:"",area:""}]);
  const removeAmbiente=(i)=>setAmbientes(a=>a.filter((_,idx)=>idx!==i));
  const setAmbiente=(i,k,v)=>setAmbientes(a=>a.map((x,idx)=>idx===i?{...x,[k]:v}:x));
  const areaAmbientes=ambientes.reduce((s,a)=>s+(Number(a.area)||0),0);

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.sprinkler size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  // Parâmetros NBR 10897 por classe de risco
  const CLASSES_RISCO={
    LEVE:{nome:"Risco Leve",densidade:4.1,area_op:139,duracao:30,area_max_sprinkler:21,espacamento:4.6,aplicacao:"Escritórios, residenciais, escolas, igrejas"},
    OO_GRUPO1:{nome:"Risco Ordinário Grupo 1",densidade:6.1,area_op:139,duracao:60,area_max_sprinkler:12,espacamento:4.0,aplicacao:"Estacionamentos, padarias, lavanderias"},
    OO_GRUPO2:{nome:"Risco Ordinário Grupo 2",densidade:8.1,area_op:139,duracao:60,area_max_sprinkler:12,espacamento:4.0,aplicacao:"Indústrias químicas leves, oficinas, lojas"},
    EXTRA1:{nome:"Risco Extra Grupo 1",densidade:12.2,area_op:230,duracao:90,area_max_sprinkler:9,espacamento:3.7,aplicacao:"Madeireiras, gráficas, têxteis"},
    EXTRA2:{nome:"Risco Extra Grupo 2",densidade:16.3,area_op:325,duracao:120,area_max_sprinkler:9,espacamento:3.7,aplicacao:"Plásticos, espumas, asfalto, tintas"},
  };
  const c=CLASSES_RISCO[config.classe_risco];

  const area=modoCalc==="ambientes"&&areaAmbientes>0?areaAmbientes:(Number(project.area_construida)||0);
  const pe=Number(config.pe_direito)||3;
  const pav=Number(project.numero_pavimentos)||1;

  // Quantidade de sprinklers
  const nSprinklersPorPav=Math.ceil((area/pav)/c.area_max_sprinkler);
  const nSprinklersTotal=nSprinklersPorPav*pav;

  // Vazão total mínima
  // Q (L/min) = densidade (L/min/m²) × área operação (m²)
  const vazaoTotal=c.densidade*c.area_op;
  // Volume da reserva técnica
  const volumeRTI=vazaoTotal*c.duracao;
  const volumeRTI_m3=volumeRTI/1000;

  // Bomba — estimativa básica
  const pressaoMin=70; // m.c.a. tipica para sprinklers
  const potHidraulica_cv=(1000*9.81*(vazaoTotal/60000)*pressaoMin)/735.5;
  const potMotor=Math.ceil(potHidraulica_cv/0.65*1.25);
  const cvs=[3,5,7.5,10,15,20,25,30,40,50,60,75,100,125,150];
  const potCom=cvs.find(x=>x>=potMotor)||Math.ceil(potMotor);

  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"sprinklers",
      norma:"IT-23 CBMBA / NBR 10897",
      calculado_em:new Date().toISOString(),
      dados_entrada:{...config,area_protegida:area,pavimentos:pav,observacoes:obs},
      resultado:{classe:c.nome,sprinklers_por_pavimento:nSprinklersPorPav,sprinklers_total:nSprinklersTotal,vazao_total_lpm:vazaoTotal,volume_reserva_m3:volumeRTI_m3,potencia_bomba_cv:potCom},
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`Sprinklers:\n• ${nSprinklersTotal} sprinklers no total\n• Vazão: ${vazaoTotal.toFixed(0)} L/min\n• Reserva: ${volumeRTI_m3.toFixed(1)} m³\n• Bomba: ${potCom} CV\n\nSalvo em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    if(area===0){alert("⚠ Projeto sem área construída cadastrada. Não é possível dimensionar sprinklers.");return;}
    gerarMemoriaCalculoPDF({
      modulo:"Sistema de Chuveiros Automáticos (Sprinklers)",
      norma:"IT-23/2018 CBMBA / ABNT NBR 10897",
      projeto:project,
      dadosEntrada:[
        {label:"Classe de risco",valor:c.nome,unidade:""},
        {label:"Tipo de sprinkler",valor:config.tipo_sprinkler,unidade:""},
        {label:"Área a proteger",valor:area.toFixed(2),unidade:"m²"},
        {label:"Pé direito",valor:pe,unidade:"m"},
        {label:"Densidade de aplicação",valor:c.densidade,unidade:"L/min/m²"},
        {label:"Área de operação",valor:c.area_op,unidade:"m²"},

        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
