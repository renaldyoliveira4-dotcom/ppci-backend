// ============================================================
// MÓDULO 9: SPDA — Sistema de Proteção contra Descargas Atmosféricas (NBR 5419)
// ============================================================
const CalcSpdaPage=({project})=>{
  const [config,setConfig]=useState({
    largura:"",comprimento:"",altura:"",
    densidade_ng:"5.0", // raios/km²/ano - típico para BA (varia por região)
    A:"1.0",B:"1.0",C:"1.0",D:"1.0",E:"1.0", // fatores de localização e características
    perda_humana_tolerada:"1e-5", // R_T tolerável (NBR 5419)
  });
  const [obs,setObs]=useState("");

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.lightning size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  // Usa dimensões do projeto ou da config
  const L=Number(config.comprimento)||Math.sqrt(Number(project.area_construida)||100);
  const W=Number(config.largura)||Math.sqrt(Number(project.area_construida)||100);
  const H=Number(config.altura)||Number(project.altura_edificacao)||6;
  const Ng=Number(config.densidade_ng)||5;

  // Área de exposição equivalente AD (m²)
  // AD = L×W + 6H×(L+W) + π×9H²
  const AD=(L*W)+(6*H*(L+W))+(Math.PI*9*H*H);
  // Frequência de descargas anuais ND
  // ND = Ng × AD × Cd × 10^-6 (Cd = fator de localização)
  const Cd=Number(config.A)||1;
  const ND=Ng*AD*Cd*1e-6;

  // Risco R1 (perda de vida humana) — simplificado
  // R1 = ND × PA × LA (probabilidade e perda)
  // Vamos usar valores típicos para análise inicial
  const PA=Number(config.B)||1; // probabilidade
  const LA=Number(config.C)||0.01; // perda
  const R1=ND*PA*LA;

  const R_T=Number(config.perda_humana_tolerada)||1e-5;
  const exigeSPDA=R1>R_T;

  // Determinar nível de proteção (NPP) conforme R1/R_T
  let nivelProtecao="—",eficiencia="—";
  if(exigeSPDA){
    const ratio=R1/R_T;
    if(ratio>10){nivelProtecao="I";eficiencia="98%";}
    else if(ratio>5){nivelProtecao="II";eficiencia="95%";}
    else if(ratio>2){nivelProtecao="III";eficiencia="90%";}
    else{nivelProtecao="IV";eficiencia="80%";}
  }

  // Características do sistema por nível
  const PARAMETROS={
    "I":{raio_esfera:20,malha:5,desc:"Indústrias químicas, hospitais, locais críticos"},
    "II":{raio_esfera:30,malha:10,desc:"Reunião de público, comércio grande, escolas"},
    "III":{raio_esfera:45,malha:15,desc:"Edifícios comerciais comuns, residenciais altos"},
    "IV":{raio_esfera:60,malha:20,desc:"Edificações simples, residenciais baixos"},
  };
  const p=exigeSPDA?PARAMETROS[nivelProtecao]:null;

  // Estimativa de captores e descidas
  const perimetro=2*(L+W);
  const nDescidasMin=Math.max(2,Math.ceil(perimetro/(p?.malha||20)));
  const nCaptores=p?Math.ceil((L*W)/(p.malha*p.malha)):0;

  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"spda",
      norma:"NBR 5419",
      calculado_em:new Date().toISOString(),
      dados_entrada:{...config,L,W,H,Ng},
      resultado:{
        area_exposicao_AD:AD,frequencia_descargas_ND:ND,risco_R1:R1,
        risco_tolerado_RT:R_T,exige_spda:exigeSPDA,
        nivel_protecao:nivelProtecao,eficiencia,
        descidas_minimas:nDescidasMin,captores_estimados:nCaptores,
        observacoes:obs,
      },
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`SPDA — Análise de risco\n• R1 = ${R1.toExponential(2)}\n• Tolerado = ${R_T.toExponential(0)}\n• ${exigeSPDA?`EXIGE SPDA Nível ${nivelProtecao}`:"NÃO EXIGE SPDA"}\n\nSalvo em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    gerarMemoriaCalculoPDF({
      modulo:"SPDA — Proteção contra Descargas Atmosféricas",
      norma:"ABNT NBR 5419:2015",
      projeto:project,
      dadosEntrada:[
        {label:"Comprimento (L)",valor:L.toFixed(2),unidade:"m"},
        {label:"Largura (W)",valor:W.toFixed(2),unidade:"m"},
        {label:"Altura (H)",valor:H.toFixed(2),unidade:"m"},
        {label:"Densidade de raios (Ng)",valor:Ng,unidade:"raios/km²/ano"},
        {label:"Fator localização (Cd)",valor:Cd,unidade:""},
        {label:"Probabilidade PA",valor:PA,unidade:""},
        {label:"Perda relativa LA",valor:LA,unidade:""},
        {label:"Risco tolerado (R_T)",valor:R_T.toExponential(0),unidade:""},
      ],
      formulas:[
        {descricao:"Área de exposição equivalente:",equacao:"AD = L·W + 6H(L+W) + 9π·H²"},
        {descricao:"Frequência anual de descargas:",equacao:"ND = Ng × AD × Cd × 10⁻⁶"},
        {descricao:"Risco de perda de vida humana:",equacao:"R1 = ND × PA × LA"},
        {descricao:"Decisão:",equacao:"R1 > R_T  →  exige SPDA (nível conforme razão R1/R_T)"},
      ],
      desenvolvimento:[
        {titulo:"Área AD",calculo:`${L.toFixed(1)}×${W.toFixed(1)} + 6·${H.toFixed(1)}(L+W) + 9π·${H.toFixed(1)}²`,resultado:`${AD.toFixed(0)} m²`},
        {titulo:"Frequência ND",calculo:`${Ng} × ${AD.toFixed(0)} × ${Cd} × 10⁻⁶`,resultado:ND.toExponential(2)},
        {titulo:"Risco R1",calculo:`${ND.toExponential(2)} × ${PA} × ${LA}`,resultado:R1.toExponential(2)},
        {titulo:"Comparação",calculo:`R1 ${R1>R_T?">":"≤"} R_T (${R_T.toExponential(0)})`,resultado:exigeSPDA?"EXIGE":"NÃO EXIGE"},
        ...(exigeSPDA?[
          {titulo:"Nível de Proteção (NPP)",calculo:`Razão R1/R_T = ${(R1/R_T).toFixed(1)}`,resultado:`NPP ${nivelProtecao} (${eficiencia})`},
          {titulo:"Raio da esfera rolante",calculo:"NBR 5419 Tabela 2",resultado:`${p.raio_esfera} m`},
          {titulo:"Malha máxima",calculo:"NBR 5419 Tabela 4",resultado:`${p.malha}×${p.malha} m`},
          {titulo:"Descidas mínimas",calculo:`Perímetro ${perimetro.toFixed(0)} m ÷ ${p.malha}`,resultado:`${nDescidasMin}`},
          {titulo:"Captores (Faraday estimado)",calculo:`(L×W) ÷ malha²`,resultado:`${nCaptores}`},
        ]:[]),
      ],
      resultadoFinal:{valor:exigeSPDA?`NPP ${nivelProtecao}`:"NÃO EXIGE",unidade:"",descricao:exigeSPDA?`Sistema com eficiência ${eficiencia}, ${nDescidasMin} descidas, ${nCaptores} captores estimados`:`R1 = ${R1.toExponential(2)} ≤ R_T = ${R_T.toExponential(0)}`},
      situacao:exigeSPDA?"NÃO CONFORME":"CONFORME",
      observacoes:obs+"\n\nAnálise de risco R1 conforme NBR 5419-2:2015 (perda de vida humana). Para análise completa devem ser também avaliados R2 (perda do serviço público), R3 (perda do patrimônio cultural) e R4 (perda econômica) conforme o tipo de ocupação.",
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.lightning size={24} className="text-orange-500"/> SPDA — Proteção contra Raios</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: ABNT NBR 5419:2015 (não há IT CBMBA específica)</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
      </div>

      <Card className="p-4 border-blue-200 bg-blue-50/50">
        <div className="flex gap-3"><Icons.alert size={18} className="text-blue-600 flex-shrink-0 mt-0.5"/>
          <p className="text-xs text-blue-900">Observação: o CBMBA não possui IT exclusiva para SPDA. A NBR 5419 é referenciada por ITs específicas (IT-27 Silos, IT-28 GLP, IT-30 Fogos pirotécnicos, IT-32 Produtos perigosos) quando o tipo de ocupação exige proteção. Para edificações comuns, o SPDA é exigido conforme análise de risco R1 da própria NBR 5419.</p>
        </div>
      </Card>

      <Card className="p-5">
        <p className="text-xs text-slate-500 font-mono bg-slate-50 px-3 py-2 rounded">Método: análise de risco R1 (perda de vida humana). AD = L×W + 6H(L+W) + 9πH²  |  ND = Ng × AD × Cd × 10⁻⁶</p>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3">
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Área equivalente AD</p><p className="font-bold text-slate-800">{AD.toFixed(0)} m²</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Densidade Ng</p><p className="font-bold text-slate-800">{Ng} /km²/ano</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Freq. descargas ND</p><p className="font-bold text-slate-800">{ND.toExponential(2)}</p></div>
          <div className="p-3 bg-slate-50 rounded-lg"><p className="text-[10px] text-slate-500 uppercase">Risco R1</p><p className="font-bold text-slate-800">{R1.toExponential(2)}</p></div>
        </div>
      </Card>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Dimensões da edificação</h2>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <Input label="Comprimento L (m)" type="number" step="0.1" value={config.comprimento} onChange={e=>setConfig(p=>({...p,comprimento:e.target.value}))} placeholder={`Estimado: ${Math.sqrt(Number(project.area_construida)||100).toFixed(1)}`}/>
          <Input label="Largura W (m)" type="number" step="0.1" value={config.largura} onChange={e=>setConfig(p=>({...p,largura:e.target.value}))} placeholder={`Estimado: ${Math.sqrt(Number(project.area_construida)||100).toFixed(1)}`}/>
          <Input label="Altura H (m)" type="number" step="0.1" value={config.altura} onChange={e=>setConfig(p=>({...p,altura:e.target.value}))} placeholder={`Cadastro: ${project.altura_edificacao||6}`}/>
        </div>
      </Card>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Parâmetros de risco (NBR 5419)</h2>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <Input label="Ng (raios/km²/ano)" type="number" step="0.1" value={config.densidade_ng} onChange={e=>setConfig(p=>({...p,densidade_ng:e.target.value}))}/>
          <Input label="Cd - localização (0,25 a 2)" type="number" step="0.01" value={config.A} onChange={e=>setConfig(p=>({...p,A:e.target.value}))}/>
          <Input label="PA - probabilidade (0 a 1)" type="number" step="0.01" value={config.B} onChange={e=>setConfig(p=>({...p,B:e.target.value}))}/>
          <Input label="LA - perda relativa" type="number" step="0.001" value={config.C} onChange={e=>setConfig(p=>({...p,C:e.target.value}))}/>
          <Input label="R_T - risco tolerado" type="number" step="1e-6" value={config.perda_humana_tolerada} onChange={e=>setConfig(p=>({...p,perda_humana_tolerada:e.target.value}))}/>
        </div>
        <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded text-xs text-blue-800">
          <b>Valores típicos:</b> Ng=5 (Bahia média) • Cd=1 (terreno plano) • PA=1 (sem proteção existente) • LA=0,01 (estrutura comum) • R_T=10⁻⁵ (limite NBR para vida humana)
        </div>
      </Card>

      <Card className={`p-5 border-2 ${exigeSPDA?"border-red-200 bg-red-50/30":"border-emerald-200 bg-emerald-50/30"}`}>
        <div className="flex items-center gap-3 mb-3">

        </div>
        {exigeSPDA&&p&&(
          <div className="mt-4 grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div className="p-3 bg-white rounded border"><p className="text-[10px] text-slate-500 uppercase">Nível de proteção</p><p className="font-bold text-red-600 text-xl">NPP {nivelProtecao}</p><p className="text-[10px] text-slate-500">{eficiencia} eficiência</p></div>
            <div className="p-3 bg-white rounded border"><p className="text-[10px] text-slate-500 uppercase">Raio esfera</p><p className="font-bold text-slate-800 text-xl">{p.raio_esfera} m</p></div>
            <div className="p-3 bg-white rounded border"><p className="text-[10px] text-slate-500 uppercase">Malha máx.</p><p className="font-bold text-slate-800 text-xl">{p.malha}×{p.malha} m</p></div>
            <div className="p-3 bg-white rounded border"><p className="text-[10px] text-slate-500 uppercase">Descidas mín.</p><p className="font-bold text-slate-800 text-xl">{nDescidasMin}</p></div>
          </div>
        )}
        {exigeSPDA&&p&&<p className="mt-3 text-xs text-slate-600 italic">{p.desc}</p>}

      <Card className="p-5"><p className="text-sm font-bold text-slate-700 mb-2">Observações</p><textarea value={obs} onChange={e=>setObs(e.target.value)} rows={3} placeholder="Tipo de captação (Franklin/Faraday/Gaiola), aterramento, equipotencialização..." className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-orange-400"/></Card>
    </div>
  );
};


// ============================================================
// MÓDULO 10: GLP — Central de Gás (IT-28/2021 CBMBA / NBR 15514)
// ============================================================
const CalcGlpPage=({project})=>{
  const [config,setConfig]=useState({
    tipo_central:"P13",numero_recipientes:"4",consumo_diario:"",
    distancia_edificacao:"",distancia_via:"",
    tipo_consumo:"residencial",
  });
  const [obs,setObs]=useState("");

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.cylinder size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  // Tipos de recipientes
  const RECIPIENTES={
    P13:{cap:13,nome:"Botijão 13 kg (P-13)",aplicacao:"Residencial individual"},
    P20:{cap:20,nome:"Cilindro 20 kg (P-20)",aplicacao:"Comercial pequeno"},
    P45:{cap:45,nome:"Cilindro 45 kg (P-45)",aplicacao:"Comercial / multifamiliar pequeno"},
    P90:{cap:90,nome:"Cilindro 90 kg (P-90)",aplicacao:"Multifamiliar médio"},
    P190:{cap:190,nome:"Cilindro 190 kg (P-190)",aplicacao:"Industrial / multifamiliar grande"},
    TANQUE:{cap:500,nome:"Tanque estacionário (mín 500 kg)",aplicacao:"Indústria / consumos altos"},
  };
  const rec=RECIPIENTES[config.tipo_central];
  const nRec=Number(config.numero_recipientes)||1;
  const capacidadeTotal=rec.cap*nRec;

  // IT-28/2021 Tabela 2 - Classificação das áreas de armazenamento (recipientes transportáveis)
  // ATENÇÃO: A Tabela 2 da IT-28 é apresentada em formato de imagem no PDF. Os limites de capacidade
  // e os afastamentos abaixo são valores típicos consagrados pela NBR 15514 (referência da IT-28),
  // e DEVEM ser confirmados visualmente na Tabela 2 do PDF oficial da IT-28/2021 para projeto definitivo.
  const FAIXAS=[
    {ate:520,edif:1.5,viaPublica:3.0,classe:"Classe I"},
    {ate:1560,edif:3.0,viaPublica:7.5,classe:"Classe II"},
    {ate:6240,edif:7.5,viaPublica:7.5,classe:"Classe III"},
    {ate:12480,edif:15.0,viaPublica:15.0,classe:"Classe IV"},
    {ate:24960,edif:22.5,viaPublica:22.5,classe:"Classe V"},
    {ate:9999999,edif:30.0,viaPublica:30.0,classe:"Classe VI"},
  ];
  const faixa=FAIXAS.find(f=>capacidadeTotal<=f.ate)||FAIXAS[FAIXAS.length-1];

  const distEdif=Number(config.distancia_edificacao)||0;
  const distVia=Number(config.distancia_via)||0;
  const atendeEdif=distEdif>=faixa.edif;
  const atendeVia=distVia>=faixa.viaPublica;

  // Estimativa de consumo
  const consumoDia=Number(config.consumo_diario)||0;
  const autonomia=consumoDia>0?capacidadeTotal/consumoDia:0;

  // ============================================================
  // EXTINTORES PARA CENTRAL DE GLP — IT-42/2016 item 9.2.6.6 Tabela 3
  // ============================================================
  // Esta é a regra DEDICADA do CBMBA para proteção de centrais de GLP.
  // GLP é fogo classe B/C (gás inflamável + presença de instalação elétrica).
  // Os extintores devem ficar a no máx. 15 m do abrigo (IT-21/2017).
  const getExtintorGLP=()=>{
    const cap=capacidadeTotal;
    if(cap===0)return null;
    // Tabela 3 oficial da IT-42/2016 item 9.2.6.6
    if(cap<=270)return{
      faixa:"Até 270 kg",
      quantidade:1,
      capacidadeExt:"20-B:C",
      especificacao:"01 extintor 20-B:C (mínimo)",
      agente:"Pó Químico Seco (PQS-BC) ou CO₂",
      norma:"IT-42/2016 item 9.2.6.6 Tabela 3",
      obs:"Posicionar a no máximo 15 m do abrigo (IT-21/2017). NÃO usar extintor d'água ou espuma — GLP é fogo classe B/C.",
    };
    if(cap<=1800)return{
      faixa:"De 271 a 1.800 kg",
      quantidade:2,
      capacidadeExt:"20-B:C",
      especificacao:"02 extintores 20-B:C (mínimo)",
      agente:"Pó Químico Seco (PQS-BC) ou CO₂",
      norma:"IT-42/2016 item 9.2.6.6 Tabela 3",
      obs:"Distribuir em lados opostos do abrigo, ambos a no máximo 15 m. Capacidade extintora mínima conforme IT-21 Tabela 1.",
    };
    // Acima de 1.800 kg
    return{
      faixa:"Acima de 1.800 kg",
      quantidade:3,
      capacidadeExt:"2× 20-B:C + 1× 80-B:C",
      especificacao:"02 extintores 20-B:C + 01 extintor 80-B:C (mínimo)",
      agente:"Pó Químico Seco (PQS-BC) — o 80-B:C é tipicamente sobre rodas (carreta)",
      norma:"IT-42/2016 item 9.2.6.6 Tabela 3",
      obs:"O extintor 80-B:C deve ser do tipo carreta (sobre rodas), posicionado a no máx. 15 m do abrigo. Para centrais > 12.480 kg, PTS NÃO é permitido (IT-42 item 5.1.5).",
    };
  };
  const extGLP=getExtintorGLP();
  // Acima disso requer projeto técnico (não PTS)
  const exigePTS=capacidadeTotal>12480;
  // Recipientes estacionários > 8.000 kg (8 m³) seguem Tabela 1 IT-28 (afastamentos específicos)
  const isEstacionarioGrande=config.tipo_central==="TANQUE"&&capacidadeTotal>8000;

  const salvar=()=>{
    const payload={
      projeto_id:project.id,
      tipo:"glp",
      norma:"IT-28/2021 CBMBA / NBR 15514",
      calculado_em:new Date().toISOString(),
      dados_entrada:{...config,capacidade_total_kg:capacidadeTotal},
      resultado:{
        classe:faixa.classe,
        capacidade_total:capacidadeTotal,
        distancia_min_edif:faixa.edif,
        distancia_min_via:faixa.viaPublica,
        atende_edif:atendeEdif,
        atende_via:atendeVia,
        autonomia_dias:autonomia,
        exige_projeto:capacidadeTotal>520,
        exige_pts_excluido:exigePTS,
        estacionario_grande:isEstacionarioGrande,
        extintores_obrigatorios:extGLP?{faixa:extGLP.faixa,quantidade:extGLP.quantidade,capacidade:extGLP.capacidadeExt,especificacao:extGLP.especificacao}:null,
        observacoes:obs,
      },
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`Central de GLP — ${faixa.classe}\n• Capacidade: ${capacidadeTotal} kg\n• Distância mín. edificação: ${faixa.edif} m\n• Distância mín. via pública: ${faixa.viaPublica} m\n${exigePTS?"⚠ Acima de 12.480 kg: PTS NÃO permitido (IT-42 item 5.1.5)":""}\n${isEstacionarioGrande?"⚠ Tanque > 8.000 kg: consultar Tabela 1 IT-28 para afastamentos":""}\n\nSalvo em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    if(capacidadeTotal===0){alert("⚠ Informe a quantidade e tipo de recipientes antes de exportar.");return;}
    const conforme=(distEdif===0||atendeEdif)&&(distVia===0||atendeVia);
    gerarMemoriaCalculoPDF({
      modulo:"Central de GLP — Armazenamento de Gás Liquefeito de Petróleo",
      norma:"IT-28/2021 CBMBA / ABNT NBR 15514",
      projeto:project,
      dadosEntrada:[
        {label:"Tipo de recipiente",valor:rec.nome,unidade:""},
        {label:"Número de recipientes",valor:nRec,unidade:""},
        {label:"Capacidade unitária",valor:rec.cap,unidade:"kg"},
        {label:"Capacidade total",valor:capacidadeTotal,unidade:"kg"},
        {label:"Classe (Tabela 2 IT-28)",valor:faixa.classe,unidade:""},
        {label:"Tipo de consumo",valor:config.tipo_consumo,unidade:""},
        {label:"Consumo diário informado",valor:Number(config.consumo_diario)||"—",unidade:"kg/dia"},
        {label:"Distância à edificação (real)",valor:distEdif||"—",unidade:"m"},
        {label:"Distância à via pública (real)",valor:distVia||"—",unidade:"m"},
      ],
      formulas:[
        {descricao:"Capacidade total da central:",equacao:"Cap_total = n_recipientes × cap_unitária [kg]"},
        {descricao:"Classificação (Tabela 2 IT-28):",equacao:"Classe = f(capacidade total em kg)"},
        {descricao:"Afastamentos mínimos (Tabela 2 IT-28):",equacao:"D_edif e D_via são definidos pela classe"},
      ],
      desenvolvimento:[
        {titulo:"Capacidade total",calculo:`${nRec} × ${rec.cap} kg`,resultado:`${capacidadeTotal} kg`},
        {titulo:"Classificação",calculo:`Cap ≤ ${faixa.ate} kg`,resultado:faixa.classe},
        {titulo:"Afastamento mín. edificação",calculo:"Tabela 2 IT-28",resultado:`${faixa.edif} m`},
        {titulo:"Afastamento mín. via pública",calculo:"Tabela 2 IT-28",resultado:`${faixa.viaPublica} m`},
        {titulo:"Verificação edificação",calculo:`Real ${distEdif||"?"} m vs mín ${faixa.edif} m`,resultado:distEdif===0?"informar":(atendeEdif?"ATENDE":"NÃO ATENDE")},
        {titulo:"Verificação via pública",calculo:`Real ${distVia||"?"} m vs mín ${faixa.viaPublica} m`,resultado:distVia===0?"informar":(atendeVia?"ATENDE":"NÃO ATENDE")},
        ...(autonomia>0?[{titulo:"Autonomia",calculo:`${capacidadeTotal} kg ÷ ${config.consumo_diario} kg/dia`,resultado:`${autonomia.toFixed(1)} dias`}]:[]),
        ...(extGLP?[{titulo:"Extintores p/ central (IT-42 Tabela 3)",calculo:`Faixa: ${extGLP.faixa}`,resultado:extGLP.especificacao}]:[]),
      ],
      resultadoFinal:{valor:`${capacidadeTotal} kg — ${faixa.classe}`,unidade:"",descricao:`Afastamento: ${faixa.edif}/${faixa.viaPublica} m  •  Extintores: ${extGLP?extGLP.especificacao:"—"}`},
      situacao:conforme?"CONFORME":"NÃO CONFORME",
      observacoes:obs+`\n\nAplicação típica: ${rec.aplicacao}.${exigePTS?" Acima de 12.480 kg: PTS NÃO é permitido (IT-42 item 5.1.5).":""}${isEstacionarioGrande?" Tanques estacionários > 8.000 kg seguem afastamentos da Tabela 1 IT-28.":""}\n\nPROTEÇÃO POR EXTINTORES (IT-42/2016 item 9.2.6.6 Tabela 3):${extGLP?`\n• ${extGLP.especificacao}\n• Agente: ${extGLP.agente}\n• ${extGLP.obs}`:" Aguardando capacidade para determinar."}\n\nA Tabela 2 da IT-28 está em formato de imagem no PDF oficial — valores aqui seguem NBR 15514, confirmar visualmente para projeto definitivo.`,
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.cylinder size={24} className="text-orange-500"/> Central de GLP</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: IT-28/2021 CBMBA / NBR 15514</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>
      </div>

      <Card className="p-4 border-amber-200 bg-amber-50/50">
        <div className="flex gap-3"><Icons.alert size={18} className="text-amber-600 flex-shrink-0 mt-0.5"/>
          <p className="text-xs text-amber-900"><b>Atenção:</b> A Tabela 1 (afastamentos para recipientes estacionários > 8.000 kg) e a Tabela 2 (classes I a VI por capacidade total) são apresentadas em formato de imagem no PDF oficial da IT-28/2021. Os valores numéricos aqui seguem a NBR 15514 (referência citada pela IT-28) e devem ser confirmados visualmente no PDF para o projeto definitivo. Para tanques estacionários > 8.000 kg, consulte a Tabela 1 da IT-28 diretamente.</p>
        </div>
      </Card>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Configuração da central</h2>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <Select label="Tipo de recipiente" value={config.tipo_central} onChange={e=>setConfig(p=>({...p,tipo_central:e.target.value}))} options={Object.entries(RECIPIENTES).map(([k,v])=>({value:k,label:v.nome}))}/>
          <Input label="Número de recipientes" type="number" min="1" value={config.numero_recipientes} onChange={e=>setConfig(p=>({...p,numero_recipientes:e.target.value}))}/>
          <Input label="Consumo diário (kg/dia)" type="number" value={config.consumo_diario} onChange={e=>setConfig(p=>({...p,consumo_diario:e.target.value}))} placeholder="Opcional"/>
          <Input label="Distância edificação (m)" type="number" step="0.1" value={config.distancia_edificacao} onChange={e=>setConfig(p=>({...p,distancia_edificacao:e.target.value}))} placeholder="Real do projeto"/>
          <Input label="Distância via pública (m)" type="number" step="0.1" value={config.distancia_via} onChange={e=>setConfig(p=>({...p,distancia_via:e.target.value}))} placeholder="Real do projeto"/>
          <Select label="Tipo de consumo" value={config.tipo_consumo} onChange={e=>setConfig(p=>({...p,tipo_consumo:e.target.value}))} options={[{value:"residencial",label:"Residencial"},{value:"comercial",label:"Comercial"},{value:"industrial",label:"Industrial"}]}/>
        </div>
      </Card>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Classificação por capacidade (IT-28/2021 Tabela 2 — recipientes transportáveis)</h2>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-slate-200">{["Classe","Capacidade total","Dist. mín. edificação","Dist. mín. via pública"].map(h=><th key={h} className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-3 py-2">{h}</th>)}</tr></thead>
            <tbody>{FAIXAS.map((f,i)=>{
              const ativa=f.classe===faixa.classe;
              const prevAte=i>0?FAIXAS[i-1].ate:0;
              return(
                <tr key={i} className={`border-b border-slate-100 ${ativa?"bg-orange-50/50 font-bold":""}`}>
                  <td className="px-3 py-2.5">{f.classe} {ativa&&"←"}</td>
                  <td className="px-3 py-2.5">{prevAte>0?`> ${prevAte}`:"até"} {f.ate<9999999?`${f.ate} kg`:`> ${prevAte} kg`}</td>
                  <td className="px-3 py-2.5">{f.edif} m</td>
                  <td className="px-3 py-2.5">{f.viaPublica} m</td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </Card>

      <Card className="p-5 bg-gradient-to-br from-orange-50 to-red-50/50 border-orange-200">
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div><p className="text-xs font-semibold text-slate-500 uppercase">Capacidade total</p><p className="text-3xl font-bold text-slate-800 mt-1">{capacidadeTotal}</p><p className="text-xs text-slate-500">kg de GLP</p></div>
          <div><p className="text-xs font-semibold text-slate-500 uppercase">Classe</p><p className="text-3xl font-bold text-orange-600 mt-1">{faixa.classe.split(" ")[1]}</p><p className="text-xs text-slate-500">{faixa.classe}</p></div>
          <div><p className="text-xs font-semibold text-slate-500 uppercase">Autonomia</p><p className="text-3xl font-bold text-slate-800 mt-1">{consumoDia>0?autonomia.toFixed(1):"—"}</p><p className="text-xs text-slate-500">{consumoDia>0?"dias":"informe consumo"}</p></div>
          <div><p className="text-xs font-semibold text-slate-500 uppercase">Recipientes</p><p className="text-3xl font-bold text-slate-800 mt-1">{nRec}× {config.tipo_central}</p></div>
        </div>
      </Card>

      <Card className="p-5">
        <h3 className="font-bold text-slate-700 mb-3">Verificação de distâncias mínimas</h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div className={`p-4 rounded-lg border-2 ${distEdif===0?"border-slate-200 bg-slate-50":atendeEdif?"border-emerald-200 bg-emerald-50/30":"border-red-200 bg-red-50/30"}`}>
            <p className="text-xs font-semibold text-slate-500 uppercase">Distância à edificação</p>
            <div className="flex items-center justify-between mt-2"><div><p className="text-2xl font-bold text-slate-800">{distEdif||"—"} m</p><p className="text-xs text-slate-500">Mínimo: {faixa.edif} m</p></div>{distEdif===0?<Badge>Informe</Badge>:atendeEdif?<Badge variant="CALCULADO">✓ OK</Badge>:<Badge variant="ELEVADO">✗ Insuficiente</Badge>}</div>
          </div>
          <div className={`p-4 rounded-lg border-2 ${distVia===0?"border-slate-200 bg-slate-50":atendeVia?"border-emerald-200 bg-emerald-50/30":"border-red-200 bg-red-50/30"}`}>
            <p className="text-xs font-semibold text-slate-500 uppercase">Distância à via pública</p>
            <div className="flex items-center justify-between mt-2"><div><p className="text-2xl font-bold text-slate-800">{distVia||"—"} m</p><p className="text-xs text-slate-500">Mínimo: {faixa.viaPublica} m</p></div>{distVia===0?<Badge>Informe</Badge>:atendeVia?<Badge variant="CALCULADO">✓ OK</Badge>:<Badge variant="ELEVADO">✗ Insuficiente</Badge>}</div>
          </div>
        </div>
      </Card>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {exigePTS&&<Card className="p-4 border-red-200 bg-red-50"><div className="flex gap-3"><Icons.alert size={18} className="text-red-600 flex-shrink-0 mt-0.5"/><div><p className="font-bold text-red-900 text-sm">PTS NÃO permitido (IT-42 item 5.1.5)</p><p className="text-xs text-red-700 mt-1">Capacidade total > 12.480 kg de GLP exclui a edificação da modalidade PTS. Projeto Técnico Completo é obrigatório.</p></div></div></Card>}
        {isEstacionarioGrande&&<Card className="p-4 border-amber-200 bg-amber-50"><div className="flex gap-3"><Icons.alert size={18} className="text-amber-600 flex-shrink-0 mt-0.5"/><div><p className="font-bold text-amber-900 text-sm">Tanque estacionário grande (Tabela 1 IT-28)</p><p className="text-xs text-amber-700 mt-1">Recipientes estacionários acima de 8.000 kg (8 m³) seguem afastamentos específicos da Tabela 1 da IT-28/2021 (afastamento entre tanques, edificações e limites de propriedade). Verifique no PDF oficial.</p></div></div></Card>}
      </div>

      {extGLP&&<Card className="p-5 border-orange-200 bg-orange-50/40">
        <div className="flex items-start gap-3">
          <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center flex-shrink-0"><Icons.flame size={18} className="text-white"/></div>
          <div className="flex-1 min-w-0">
            <p className="text-[10px] font-bold uppercase tracking-wider text-orange-600">Proteção por extintores — IT-42/2016 Tabela 3</p>
            <p className="text-sm font-bold text-slate-800 mt-1">Faixa: {extGLP.faixa}</p>
            <p className="text-lg font-bold text-orange-700 mt-1">{extGLP.especificacao}</p>
            <div className="mt-2 grid grid-cols-1 sm:grid-cols-3 gap-2 text-xs">
              <div className="p-2 bg-white rounded border border-orange-100"><p className="text-[10px] text-slate-500 uppercase">Quantidade</p><p className="font-bold text-slate-800">{extGLP.quantidade} extintor{extGLP.quantidade>1?"es":""}</p></div>
              <div className="p-2 bg-white rounded border border-orange-100"><p className="text-[10px] text-slate-500 uppercase">Cap. extintora</p><p className="font-bold text-slate-800">{extGLP.capacidadeExt}</p></div>
              <div className="p-2 bg-white rounded border border-orange-100"><p className="text-[10px] text-slate-500 uppercase">Agente</p><p className="font-bold text-slate-800 text-[11px]">{extGLP.agente}</p></div>
            </div>
            <p className="text-[11px] text-slate-600 mt-2"><b>Base normativa:</b> {extGLP.norma}</p>
            <p className="text-xs text-amber-700 mt-1.5 italic">⚠ {extGLP.obs}</p>
          </div>
        </div>
      </Card>}

      <Card className="p-4 bg-slate-50/50">
        <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-2">Referência — IT-42/2016 item 9.2.6.6 Tabela 3</p>
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead><tr className="border-b border-slate-300">
              <th className="text-left px-2 py-1.5 font-semibold text-slate-600">Quantidade de GLP (kg)</th>

// ============================================================
// MÓDULO 11: PRESSURIZAÇÃO DE ESCADA (IT-13/2022 CBMBA)
// ============================================================
// IMPORTANTE: a IT-13 do CBMBA trata APENAS de pressurização de escada
// de segurança. NÃO existe IT CBMBA específica para "controle de fumaça
// em átrios/ambientes" (NFPA 92 / NBR 16401 são auxiliares opcionais).
// Os parâmetros aqui seguem estritamente a IT-13/2022 Anexos A e B.
const CalcPressurizacaoPage=({project})=>{
  const [config,setConfig]=useState({
    tipo_sistema:"2_estagios",       // 1_estagio ou 2_estagios
    tipo_pcf:"simples_acesso",       // tipo de porta corta-fogo
    n_pcf_pavimento:"1",              // PCFs por pavimento
    n_pcf_abertas:"2",                // PCFs simultaneamente abertas (Anexo B)
    velocidade_ar:"1.0",              // m/s típico para a porta aberta
  });
  const [obs,setObs]=useState("");

  if(!project)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.wind size={48} className="mb-4 opacity-50"/><p>Selecione um projeto no Dashboard</p></div>;

  // IT-13/2022 Tabela 1 - Diferenciais de pressão (Pa)
  const NIVEIS={
    "1_estagio":{rotulo:"1 estágio",p1:null,p2:50,desc:"Sistema opera apenas em emergência (50 Pa)"},
    "2_estagios":{rotulo:"2 estágios",p1:15,p2:50,desc:"Pressurização contínua de baixo nível (15 Pa) com elevação em emergência (50 Pa)"},
  };
  const niv=NIVEIS[config.tipo_sistema];

  // IT-13/2022 Tabela 2 - Áreas típicas de escape para PCF (m²)
  const PCFS={
    "simples_acesso":{nome:"PCF simples - ACESSO ao espaço pressurizado",dim:"2,10 × 0,89 m",aberta:1.64,fechada:0.03},
    "simples_saida":{nome:"PCF simples - SAÍDA do espaço pressurizado",dim:"2,10 × 0,89 m",aberta:1.64,fechada:0.04},
    "dupla_acesso":{nome:"PCF dupla - ACESSO",dim:"2× 2,10 × 0,89 m",aberta:3.28,fechada:0.045},
    "dupla_saida":{nome:"PCF dupla - SAÍDA",dim:"2× 2,10 × 0,89 m",aberta:3.28,fechada:0.06},
  };
  const pcf=PCFS[config.tipo_pcf];

  const nPavimentos=Number(project.numero_pavimentos)||1;
  const altura=Number(project.altura_edificacao)||0;
  const nPcfPav=Number(config.n_pcf_pavimento)||1;
  const nPcfAbertas=Number(config.n_pcf_abertas)||2;
  const velAr=Number(config.velocidade_ar)||1.0;

  // Verificação se a edificação está no escopo da IT-13 (Anexo B)
  const grupo=(project.grupo||"").toUpperCase();
  const EXIGENCIA_IT13={
    "A":{alturaMin:80,obs:"Residencial: exigido acima de 80 m. Até 80 m: opcional/conforme IT-11."},
    "B":{alturaMin:30,obs:"Serviço de hospedagem: exigido em todas as alturas (Anexo B IT-13)."},
    "C":{alturaMin:12,obs:"Comercial: exigido em todas as alturas (Anexo B IT-13)."},
    "D":{alturaMin:21,obs:"Serviço profissional: até 21 m com flexibilidades, acima de 21 m exigido."},
    "E":{alturaMin:30,obs:"Educacional: exigido em todas as alturas."},
    "F":{alturaMin:12,obs:"Reunião de público: exigido em todas as alturas."},
    "G":{alturaMin:12,obs:"Serviço automotivo: exigido em todas as alturas."},
    "H":{alturaMin:12,obs:"Saúde e institucional: exigido em todas as alturas."},
    "I":{alturaMin:12,obs:"Indústria: exigido em todas as alturas."},
    "J":{alturaMin:12,obs:"Depósito: exigido em todas as alturas."},
    "L":{alturaMin:12,obs:"Explosivos: exigido em todas as alturas."},
    "M":{alturaMin:12,obs:"Ocupação especial: exigido em todas as alturas."},
  };
  const exig=EXIGENCIA_IT13[grupo]||{alturaMin:12,obs:""};
  const exigeIT13=altura>=exig.alturaMin||(grupo==="A"&&altura>=80);

  // Vazão pelo método das PCFs abertas (Equação 3 da IT-13)
  // Q_aberta = velocidade × área_PCF_aberta × n_PCFs_abertas
  const vazaoAbertas=velAr*pcf.aberta*nPcfAbertas; // m³/s
  const vazaoAbertasM3h=vazaoAbertas*3600;

  // Vazão pelas frestas (Equação 2 IT-13, todas PCFs fechadas)
  // Q_fechada = K × (ΔP)^(1/n) × Σ A_fechada (modelo orifício, K=0,827, n=2)
  const totalPcfFechadas=nPcfPav*nPavimentos;
  const areaTotalFrestas=totalPcfFechadas*pcf.fechada;
  // ΔP do 2º estágio (emergência)
  const dPressao=niv.p2;
  const vazaoFrestas=0.827*areaTotalFrestas*Math.sqrt(dPressao); // m³/s
  const vazaoFrestasM3h=vazaoFrestas*3600;

  // Vazão de projeto = MAIOR entre as duas situações (IT-13 item 5.1.6)
  const vazaoProjeto=Math.max(vazaoAbertasM3h,vazaoFrestasM3h);
  // Acréscimo típico de 25% para perdas e segurança
  const vazaoComMargem=vazaoProjeto*1.25;

  // Exigência de grupo motogerador (Anexo B IT-13)
  const exigeMotogerador=exigeIT13&&(grupo!=="A"||altura>80);
  // Exigência de duplicata do motoventilador (Anexo B)

  const salvar=()=>{

        vazao_pcfs_abertas_m3h:Math.round(vazaoAbertasM3h),
        vazao_pcfs_fechadas_m3h:Math.round(vazaoFrestasM3h),
        vazao_projeto_m3h:Math.round(vazaoProjeto),
        vazao_com_margem_m3h:Math.round(vazaoComMargem),
        exige_motogerador:exigeMotogerador,
        exige_duplicata_motoventilador:exigeDuplicata,
        observacoes:obs,
      },
    };
    console.log("Para Supabase:",JSON.stringify(payload,null,2));
    alert(`Pressurização IT-13:\n• Sistema: ${niv.rotulo}\n• Vazão projeto: ${Math.round(vazaoProjeto)} m³/h\n• Vazão c/ margem 25%: ${Math.round(vazaoComMargem)} m³/h\n• Motogerador: ${exigeMotogerador?"SIM":"NÃO"}\n• Duplicata: ${exigeDuplicata?"SIM":"NÃO"}\n\nSalvo em memória (Supabase: ver console)`);
  };

  const exportar=()=>{
    gerarMemoriaCalculoPDF({
      modulo:"Pressurização de Escada de Segurança",
      norma:"IT-13/2022 CBMBA — Anexos A e B",
      projeto:project,
      dadosEntrada:[
        {label:"Grupo / Divisão",valor:`${project.grupo} / ${project.divisao}`,unidade:""},

        {label:"Número de pavimentos",valor:nPavimentos,unidade:""},

        {label:"PCFs por pavimento",valor:nPcfPav,unidade:""},
        {label:"PCFs simultaneamente abertas",valor:nPcfAbertas,unidade:""},
        {label:"Velocidade do ar na PCF aberta",valor:velAr,unidade:"m/s"},
        {label:"Área aberta por PCF",valor:pcf.aberta.toFixed(2),unidade:"m²"},
        {label:"Área de fresta por PCF (fechada)",valor:pcf.fechada.toFixed(3),unidade:"m²"},
      ],
      formulas:[
        {descricao:"Equação 3 IT-13 (PCFs abertas):",equacao:"Q_aberta = v × A_aberta × n_PCFs_abertas  [m³/s]"},
        {descricao:"Equação 2 IT-13 (PCFs fechadas — frestas, modelo orifício):",equacao:"Q_fechada = 0,827 × Σ A_fresta × √(ΔP)  [m³/s]"},
        {descricao:"Vazão de projeto (item 5.1.5.3):",equacao:"Q_projeto = max(Q_aberta, Q_fechada)"},
      ],
      desenvolvimento:[
        {titulo:"Q_PCFs abertas",calculo:`${velAr} × ${pcf.aberta.toFixed(2)} × ${nPcfAbertas}`,resultado:`${vazaoAbertasM3h.toFixed(0)} m³/h`},
        {titulo:"Σ A_frestas",calculo:`${nPcfPav} × ${nPavimentos} × ${pcf.fechada}`,resultado:`${areaTotalFrestas.toFixed(3)} m²`},
        {titulo:"Q_PCFs fechadas",calculo:`0,827 × ${areaTotalFrestas.toFixed(3)} × √${dPressao}`,resultado:`${vazaoFrestasM3h.toFixed(0)} m³/h`},
        {titulo:"Vazão de projeto (maior)",calculo:"MAX(Q_aberta, Q_fechada)",resultado:`${Math.round(vazaoProjeto)} m³/h`},
        {titulo:"Margem de 25%",calculo:`${Math.round(vazaoProjeto)} × 1,25`,resultado:`${Math.round(vazaoComMargem)} m³/h`},
        {titulo:"Diferencial pressão 2º estágio",calculo:"Tabela 1 IT-13",resultado:`${niv.p2} Pa`},
        {titulo:"Motogerador (Anexo B)",calculo:"Avaliação por grupo/altura",resultado:exigeMotogerador?"OBRIGATÓRIO":"NÃO EXIGIDO"},
        {titulo:"Duplicata motoventilador",calculo:"Avaliação por grupo/altura",resultado:exigeDuplicata?"OBRIGATÓRIO":"OPCIONAL"},
      ],
      resultadoFinal:{valor:`${Math.round(vazaoComMargem)} m³/h`,unidade:"",descricao:`Sistema: ${niv.rotulo}, ΔP emergência = ${niv.p2} Pa`},
      situacao:exigeIT13?"NÃO CONFORME":"INFORMATIVO",
      observacoes:obs+`\n\nAvaliação Anexo B IT-13: ${exig.obs}\nDetecção automática de fumaça é obrigatória nos halls de acesso à escada pressurizada. Motogerador, quando obrigatório, deve ter autonomia mínima de 4h.`,
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.wind size={24} className="text-orange-500"/> Pressurização de Escada</h1><p className="text-slate-500 text-sm mt-1">{project.nome} • Norma: IT-13/2022 CBMBA — Anexos A e B</p></div>
        <div className="flex gap-2 flex-wrap"><BtnExportarPDF onClick={exportar}/><Btn onClick={salvar}><Icons.check size={14}/> Salvar Resultado</Btn></div>

      <Card className={`p-5 border-2 ${exigeIT13?"border-red-200 bg-red-50/30":"border-emerald-200 bg-emerald-50/30"}`}>
        <div className="flex items-center gap-3">

          <div>

          </table>
        </div>
        <p className="mt-2 text-[11px] text-slate-500">Fonte: IT-13/2022 CBMBA, Anexo A, Tabela 1. 10 Pa ≡ 1,0 mmH2O.</p>
      </Card>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Tabela 2 IT-13 — Tipo de PCF</h2>

// CONSULTA AO ANEXO A DA IT-14/2017 — Dicionário CNAE / Divisão / Carga
// ============================================================
const ConsultaIT14Page=()=>{
  const [busca,setBusca]=useState("");
  const [filtroDiv,setFiltroDiv]=useState("");
  const [filtroCarga,setFiltroCarga]=useState("");
  const [pagina,setPagina]=useState(1);
  const POR_PAGINA=50;

  // Lista única de divisões para o dropdown
  const divisoes=useMemo(()=>[...new Set(IT14_ANEXO_A.map(i=>i.div))].sort(),[]);

  const resultados=useMemo(()=>{
    const q=busca.trim().toLowerCase();
    return IT14_ANEXO_A.filter(it=>{
      // Filtro por texto (descrição ou CNAE)
      if(q){
        const txt=(it.desc+" "+it.cnae).toLowerCase();
        if(!txt.includes(q))return false;
      }
      // Filtro por divisão
      if(filtroDiv&&it.div!==filtroDiv)return false;
      // Filtro por faixa de carga
      if(filtroCarga==="leve"&&it.q>300)return false;
      if(filtroCarga==="moderado"&&(it.q<=300||it.q>1200))return false;
      if(filtroCarga==="elevado"&&it.q<=1200)return false;
      return true;
    });
  },[busca,filtroDiv,filtroCarga]);

  const totalPaginas=Math.max(1,Math.ceil(resultados.length/POR_PAGINA));
  const paginaAtual=Math.min(pagina,totalPaginas);
  const items=resultados.slice((paginaAtual-1)*POR_PAGINA,paginaAtual*POR_PAGINA);

  // Reset página quando filtros mudam
  useEffect(()=>{setPagina(1);},[busca,filtroDiv,filtroCarga]);

  const limpar=()=>{setBusca("");setFiltroDiv("");setFiltroCarga("");setPagina(1);};

  const corCarga=(q)=>q<=300?"text-emerald-700 bg-emerald-50":q<=1200?"text-amber-700 bg-amber-50":"text-red-700 bg-red-50";
  const nivelCarga=(q)=>q<=300?"Leve":q<=1200?"Moderado":"Elevado";

  const exportar=()=>{
    if(resultados.length===0){alert("⚠ Aplique algum filtro com resultados antes de exportar.");return;}
    if(resultados.length>500){alert(`⚠ Resultado muito amplo (${resultados.length} itens). Refine os filtros para até 500 atividades antes de exportar.`);return;}

    if(busca)filtrosTxt.push(`Texto: "${busca}"`);
    if(filtroDiv)filtrosTxt.push(`Divisão: ${filtroDiv}`);
    if(filtroCarga)filtrosTxt.push(`Faixa: ${filtroCarga}`);
    const descricaoConsulta=filtrosTxt.length>0?filtrosTxt.join(" | "):"Sem filtros aplicados";

    gerarMemoriaCalculoPDF({
      modulo:"Consulta Carga de Incêndio — Anexo A IT-14",
      norma:"IT-14/2017 CBMBA — Anexo A (cargas específicas por CNAE)",
      projeto:{nome:"Relatório de Consulta ao Anexo A",grupo:"—",divisao:"—",area_construida:"—",altura_edificacao:"—",numero_pavimentos:"—",responsavel_tecnico:"—",crea_responsavel:"—"},
      dadosEntrada:[
        {label:"Filtros aplicados",valor:descricaoConsulta,unidade:""},
        {label:"Resultados encontrados",valor:resultados.length,unidade:"atividades"},
        {label:"Base total Anexo A",valor:IT14_ANEXO_A.length,unidade:"atividades"},
      ],
      formulas:[
        {descricao:"Método de classificação (regra geral, Anexo A IT-14):",equacao:"q = valor tabelado por CNAE da atividade [MJ/m²]"},
        {descricao:"Classificação de risco (NBR 14432):",equacao:"q ≤ 300: Leve  |  301 ≤ q ≤ 1200: Moderado  |  q > 1200: Elevado"},
      ],
      desenvolvimento:resultados.slice(0,200).map((it,i)=>({titulo:`${i+1}. ${it.div} • CNAE ${it.cnae}`,calculo:it.desc,resultado:`${it.q} MJ/m² (${nivelCarga(it.q)})`})),
      resultadoFinal:{valor:resultados.length,unidade:"atividades listadas",descricao:resultados.length>200?`Listadas as 200 primeiras de ${resultados.length} encontradas`:`Total exibido: ${resultados.length}`},
      situacao:"INFORMATIVO",
      observacoes:`Esta consulta foi gerada a partir do Anexo A da IT-14/2017 do CBMBA, que define a carga de incêndio específica por atividade (CNAE) usando o método probabilístico. Para atividades não listadas, deve ser utilizado o método determinístico (Anexo C). Para Grupo L e M, o método determinístico é obrigatório independentemente da listagem.${resultados.length>200?"\n\nPara exportar todos os resultados, refine os filtros para reduzir o volume ou exporte em lotes.":""}`,
    });
  };

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.book size={24} className="text-orange-500"/> Consulta ao Anexo A — IT-14/2017</h1><p className="text-slate-500 text-sm mt-1">Tabela oficial CBMBA de carga de incêndio específica por ocupação/uso e CNAE • {IT14_ANEXO_A.length.toLocaleString()} atividades cadastradas</p></div>
        <BtnExportarPDF onClick={exportar}/>
      </div>

      <Card className="p-4 border-blue-200 bg-blue-50/50">
        <div className="flex gap-3"><Icons.alert size={18} className="text-blue-600 flex-shrink-0 mt-0.5"/>
          <p className="text-xs text-blue-900">A IT-14/2017 oferece dois métodos para definir a carga de incêndio: <b>regra geral (Anexo A, este dicionário)</b> baseado em CNAE da atividade — preferencial para a maioria das ocupações; e <b>método determinístico (Anexo C)</b> com levantamento direto dos materiais — obrigatório para Grupo L e M, e quando a ocupação não está listada. Para grupos H-1 e B-2 a divisão final depende também de outras características da edificação.</p>
        </div>
      </Card>

      <Card className="p-5">
        <h2 className="text-lg font-bold text-slate-800 mb-3">Filtros de busca</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
          <div className="sm:col-span-2"><label className="block text-xs font-semibold text-slate-600 mb-1.5">Buscar por descrição ou CNAE</label><input type="text" value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Ex: hotel, padaria, 4711-3..." className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-orange-400"/></div>
          <Select label="Divisão" value={filtroDiv} onChange={e=>setFiltroDiv(e.target.value)} options={[{value:"",label:`Todas (${divisoes.length})`},...divisoes.map(d=>({value:d,label:d}))]}/>
          <Select label="Faixa de carga" value={filtroCarga} onChange={e=>setFiltroCarga(e.target.value)} options={[{value:"",label:"Todas"},{value:"leve",label:"Leve (≤ 300 MJ/m²)"},{value:"moderado",label:"Moderado (301-1200)"},{value:"elevado",label:"Elevado (> 1200)"}]}/>
        </div>
        <div className="mt-3 flex items-center justify-between flex-wrap gap-2">
          <p className="text-xs text-slate-500"><b className="text-orange-600">{resultados.length.toLocaleString()}</b> resultado(s) encontrado(s){resultados.length>POR_PAGINA&&` • página ${paginaAtual} de ${totalPaginas}`}</p>
          {(busca||filtroDiv||filtroCarga)&&<button onClick={limpar} className="text-xs text-orange-600 hover:underline">Limpar filtros</button>}
        </div>
      </Card>

      <Card className="p-0 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 sticky top-0">
              <tr className="border-b border-slate-200">
                <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-12">#</th>
                <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3">Descrição da atividade</th>
                <th className="text-center text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-20">Divisão</th>
                <th className="text-center text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-32">CNAE</th>
                <th className="text-right text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-32">Carga (MJ/m²)</th>
                <th className="text-center text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-28">Nível</th>
              </tr>
            </thead>
            <tbody>
              {items.length===0?(
                <tr><td colSpan={6} className="px-4 py-12 text-center text-slate-400">Nenhuma atividade encontrada com os filtros aplicados.</td></tr>
              ):items.map((it,idx)=>(
                <tr key={`${it.div}-${it.cnae}-${idx}`} className="border-b border-slate-100 hover:bg-orange-50/30">
                  <td className="px-4 py-2.5 text-xs text-slate-400 tabular-nums">{(paginaAtual-1)*POR_PAGINA+idx+1}</td>
                  <td className="px-4 py-2.5 text-slate-800">{it.desc}</td>
                  <td className="px-4 py-2.5 text-center"><span className="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-slate-100 text-slate-700">{it.div}</span></td>
                  <td className="px-4 py-2.5 text-center text-xs text-slate-600 font-mono">{it.cnae}</td>
                  <td className="px-4 py-2.5 text-right font-bold text-slate-800 tabular-nums">{it.q.toLocaleString()}</td>
                  <td className="px-4 py-2.5 text-center"><span className={`inline-block px-2 py-0.5 text-xs font-semibold rounded ${corCarga(it.q)}`}>{nivelCarga(it.q)}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {totalPaginas>1&&(
          <div className="flex items-center justify-between px-4 py-3 border-t border-slate-200 bg-slate-50">
            <button onClick={()=>setPagina(p=>Math.max(1,p-1))} disabled={paginaAtual===1} className="px-3 py-1.5 text-xs font-semibold rounded bg-white border border-slate-300 text-slate-600 hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">← Anterior</button>
            <span className="text-xs text-slate-500">Página {paginaAtual} de {totalPaginas} • {resultados.length.toLocaleString()} resultados</span>
            <button onClick={()=>setPagina(p=>Math.min(totalPaginas,p+1))} disabled={paginaAtual===totalPaginas} className="px-3 py-1.5 text-xs font-semibold rounded bg-white border border-slate-300 text-slate-600 hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">Próxima →</button>
          </div>
        )}
      </Card>

      <Card className="p-4 bg-slate-50/50">
        <p className="text-xs text-slate-600"><b>Fonte:</b> Anexo A da Instrução Técnica nº 14/2017 do Corpo de Bombeiros Militar da Bahia — Tabela de cargas de incêndio específicas por ocupação/uso e por CNAE. Para classificação detalhada das ocupações (Divisão), consultar a Tabela 1 do Decreto Estadual nº 16.302/2015.</p>
      </Card>
    </div>
  );
};



// ============================================================
// PROJETO TÉCNICO SIMPLIFICADO — IT-42/2016 CBMBA
// ============================================================
// Aba completa de análise prévia de enquadramento PTS,
// identificação CLCB vs AVCB, checklist de documentos,
// medidas de segurança e modelos de anexos.
const ProjetoSimplificadoPage=({project})=>{
  const [tabAtiva,setTabAtiva]=useState("dados");
  const [dados,setDados]=useState({
    // Identificação
    nome_fantasia:project?.nome||"",
    razao_social:"",
    cnpj_cpf:"",
    endereco:"",
    proprietario:"",
    responsavel_tecnico:project?.responsavel_tecnico||"",
    crea_cau:project?.crea_responsavel||"",
    // Edificação
    area_construida:project?.area_construida||"",
    numero_pavimentos:project?.numero_pavimentos||"1",
    possui_subsolo:project?.possui_subsolo||false,
    uso_subsolo:"",
    grupo:project?.grupo||"",
    divisao:project?.divisao||"",
    descricao_atividade:"",
    cnae:"",
    populacao:project?.populacao||"",
    // Mezanino
    possui_mezanino:false,
    area_mezanino:"",
    // Adjacências
    possui_abertura_adjacente:false,
    tipo_cobertura:"comum",
    area_cobertura_palha:"",
    // GLP
    possui_glp:false,
    quantidade_glp_kg:"",
    tipo_glp:"recipiente_transportavel", // ou central
    // Inflamáveis
    possui_inflamaveis:false,
    quantidade_inflamaveis_litros:"",
    armazenamento_tanque_aereo:false,
    posto_combustivel:false,
    // Gases e perigosos
    possui_gases_inflamaveis:false,
    possui_produtos_perigosos:false,
    possui_vaso_pressao:false,
    // Reunião pública
    local_reuniao_publico:false,
    lotacao_maxima:"",
  });
  const [medidas,setMedidas]=useState({
    extintores:{aplicavel:true,status:"pendente",observacoes:"",justificativa:""},
    sinalizacao:{aplicavel:true,status:"pendente",observacoes:"",justificativa:""},
    saidas_emergencia:{aplicavel:true,status:"pendente",observacoes:"",justificativa:""},
    cmar:{aplicavel:false,status:"pendente",observacoes:"",justificativa:""},
    iluminacao_emergencia:{aplicavel:true,status:"pendente",observacoes:"",justificativa:""},
    glp:{aplicavel:false,status:"pendente",observacoes:"",justificativa:""},
    hangares:{aplicavel:false,status:"pendente",observacoes:"",justificativa:""},
    brigada:{aplicavel:true,status:"pendente",observacoes:"",justificativa:""},
    eletrica:{aplicavel:true,status:"pendente",observacoes:"",justificativa:""},
    mei:{aplicavel:false,status:"pendente",observacoes:"",justificativa:""},
  });

  const set=(k,v)=>setDados(p=>({...p,[k]:v}));
  const setMedida=(k,campo,v)=>setMedidas(p=>({...p,[k]:{...p[k],[campo]:v}}));

  // ============================================================
  // ANÁLISE DE ENQUADRAMENTO — IT-42 itens 5.1 (PTS) e 5.2 (CLCB)
  // ============================================================
  const analise=useMemo(()=>{
    const motivos5_1=[];   // motivos para NÃO enquadrar como PTS (item 5.1)
    const motivos5_2=[];   // motivos para NÃO ter CLCB (item 5.2) - terá AVCB
    const pendencias=[];   // dados ausentes
    const area=Number(dados.area_construida)||0;
    const pav=Number(dados.numero_pavimentos)||1;
    const pop=Number(dados.populacao)||0;
    const lotF=Number(dados.lotacao_maxima)||0;
    const glp=Number(dados.quantidade_glp_kg)||0;
    const inf=Number(dados.quantidade_inflamaveis_litros)||0;
    const grupo=(dados.grupo||"").toUpperCase();
    const divisao=(dados.divisao||"").toUpperCase();
    const cnaeStr=(dados.cnae||"").trim();

    if(!dados.area_construida)pendencias.push("Área construída");
    if(!dados.grupo)pendencias.push("Grupo de ocupação");
    if(!dados.divisao)pendencias.push("Divisão de ocupação");
    if(dados.local_reuniao_publico&&!dados.lotacao_maxima)pendencias.push("Lotação máxima (Grupo F)");

    // ITEM 5.1 — Critérios para PTS
    if(area>0&&area>750)motivos5_1.push("5.1.1 — Área > 750 m²");
    if(pav>3)motivos5_1.push("5.1.2 — Mais de 3 pavimentos");
    if(dados.possui_subsolo){
      const usoSub=(dados.uso_subsolo||"").toLowerCase();
      if(grupo==="F")motivos5_1.push("5.1.3 — Subsolo com Grupo F (reunião de público)");
      // outros usos diferentes de estacionamento com > 50 m² seriam excluídos, mas área do subsolo não é coletada
    }
    if(grupo==="F"&&lotF>100)motivos5_1.push("5.1.4 — Grupo F com lotação > 100");
    if(glp>12480)motivos5_1.push("5.1.5 — GLP > 12.480 kg (revenda)");
    if(dados.armazenamento_tanque_aereo)motivos5_1.push("5.1.6 — Tanque aéreo de inflamáveis/combustíveis");
    if(dados.posto_combustivel)motivos5_1.push("5.1.7 — Posto de abastecimento");
    if(dados.possui_gases_inflamaveis&&glp===0)motivos5_1.push("5.1.8 — Gases inflamáveis em tanques/cilindros");
    if(dados.possui_produtos_perigosos)motivos5_1.push("5.1.9 — Produtos perigosos (explosivos, oxidantes, tóxicos etc.)");

    // ITEM 5.2 — Critérios para CLCB (sub-conjunto do PTS)
    if(area>750)motivos5_2.push("5.2.1 — Área > 750 m² (sem desconto)");
    if(dados.possui_glp&&dados.tipo_glp==="central"&&glp>190)motivos5_2.push("5.2.2 — Central de GLP > 190 kg");
    if(inf>250)motivos5_2.push("5.2.3 — > 250 L de líquidos combustíveis/inflamáveis fracionados");
    if(dados.possui_subsolo&&(dados.uso_subsolo||"").toLowerCase()!=="estacionamento")motivos5_2.push("5.2.4 — Subsolo com uso não exclusivo de estacionamento");
    if(dados.tipo_cobertura==="sape_piacava"&&Number(dados.area_cobertura_palha)>200)motivos5_2.push("5.2.5 — Cobertura de sapé/piaçava > 200 m²");
    if(dados.possui_abertura_adjacente)motivos5_2.push("5.2.6 — Abertura para edificação adjacente");
    // 5.2.7 — ocupações excluídas
    if(divisao==="A-3"||divisao==="B-1"){/* só excluído se > 16 leitos - não coletamos leitos */}
    if(["E-5","E-6"].includes(divisao))motivos5_2.push(`5.2.7-d — Divisão ${divisao} (pré-escola/portadores de deficiência)`);
    if(["F-1","F-3","F-4","F-5","F-6","F-7","F-9","F-10"].includes(divisao))motivos5_2.push(`5.2.7-e — Divisão ${divisao} (reunião pública excluída)`);
    if(["H-2","H-3","H-5"].includes(divisao))motivos5_2.push(`5.2.7-f — Divisão ${divisao} (saúde / liberdade restrita)`);
    if(grupo==="J")motivos5_2.push("5.2.7-g — Grupo J (Depósitos)");
    // 5.2.8 — CNAEs excluídos
    const cnaesExcluidos=["0600-0/01","2092-4/01","2092-4/02","2092-4/03","4789-0/06"];
    if(cnaeStr&&cnaesExcluidos.some(c=>cnaeStr.includes(c.replace(/[^0-9/]/g,""))||cnaeStr===c))
      motivos5_2.push(`5.2.8 — CNAE ${cnaeStr} excluído (petróleo, explosivos, pirotécnicos)`);

    // Resultado
    let enquadramento, tipoRegularizacao, descricao;
    if(pendencias.length>0&&motivos5_1.length===0){
      enquadramento="PENDENTE";
      tipoRegularizacao="—";
      descricao="Pendência de informação — preencha os dados obrigatórios para análise definitiva";
    }else if(motivos5_1.length>0){
      enquadramento="NAO_PTS";
      tipoRegularizacao="PROJETO_TECNICO";
      descricao="Edificação NÃO se enquadra como PTS. Deve ser regularizada via Projeto Técnico conforme IT-01.";
    }else if(motivos5_2.length>0){
      enquadramento="PTS_AVCB";
      tipoRegularizacao="AVCB";
      descricao="Enquadra-se como PTS no item 5.1, mas NÃO atende ao item 5.2 (CLCB). Regularização via AVCB com vistoria prévia.";
    }else{
      enquadramento="PTS_CLCB";
      tipoRegularizacao="CLCB";
      descricao="Enquadra-se integralmente nos itens 5.1 e 5.2 da IT-42. Regularização via CLCB (Certificado de Licença) com vistoria posterior por amostragem.";
    }

    return{enquadramento,tipoRegularizacao,descricao,motivos5_1,motivos5_2,pendencias,area,pav,pop};
  },[dados]);

  // ============================================================
  // CHECKLIST DE DOCUMENTOS — IT-42 item 6
  // ============================================================
  const checklist=useMemo(()=>{
    const docs=[];
    const area=Number(dados.area_construida)||0;
    const ehTerreaAte200=Number(dados.numero_pavimentos)===1&&area<=200;

    if(analise.tipoRegularizacao==="CLCB"){
      if(ehTerreaAte200&&dados.tipo_glp!=="revenda"){
        // Item 6.3.6.1 — térrea ≤ 200 m² com saída direta
        docs.push({nome:"Declaração do Proprietário ou Responsável pelo Uso",anexo:"Anexo B",obrigatorio:true,base:"IT-42 item 6.3.6.1-a"});
        docs.push({nome:"Documento comprobatório de área",anexo:"—",obrigatorio:true,base:"IT-42 item 6.3.6.1-c"});
        docs.push({nome:"Recolhimento de taxa do CBMBA",anexo:"—",obrigatorio:true,base:"IT-42 item 6.3.6.1-b"});
      }else{
        // Item 6.3.6.2 — demais casos CLCB
        docs.push({nome:"Formulário de Avaliação de Risco do Responsável Técnico",anexo:"Anexo C",obrigatorio:true,base:"IT-42 item 6.3.6.2-a"});
        docs.push({nome:"ART/RRT de instalação e/ou manutenção dos sistemas",anexo:"—",obrigatorio:true,base:"IT-42 item 6.3.6.2-b"});
        docs.push({nome:"ART/RRT de riscos específicos (CMAR, gás, vaso pressão)",anexo:"—",obrigatorio:(dados.possui_glp||dados.possui_vaso_pressao),base:"IT-42 item 6.3.6.2-c"});
        docs.push({nome:"Planta baixa cotada com equipamentos e riscos especiais",anexo:"—",obrigatorio:true,base:"IT-42 item 6.3.6.2-e"});
        docs.push({nome:"Recolhimento de taxa do CBMBA",anexo:"—",obrigatorio:true,base:"IT-42 item 6.3.6.2-d"});
      }
    }else if(analise.tipoRegularizacao==="AVCB"){
      // Item 6.2.4 — PTS com AVCB
      docs.push({nome:"Formulário de Segurança Contra Incêndio",anexo:"Anexo D",obrigatorio:true,base:"IT-42 item 6.2.4-a"});
      docs.push({nome:"ART/RRT de instalação e/ou manutenção dos sistemas",anexo:"—",obrigatorio:!(ehTerreaAte200&&dados.tipo_glp!=="revenda"),base:"IT-42 item 6.2.4-b"});
      docs.push({nome:"ART/RRT de riscos específicos (CMAR, gás, vaso pressão)",anexo:"—",obrigatorio:(dados.possui_glp||dados.possui_vaso_pressao||dados.possui_gases_inflamaveis),base:"IT-42 item 6.2.4-c"});
      docs.push({nome:"Planta baixa cotada (área > 200 m² ou revenda GLP)",anexo:"—",obrigatorio:area>200||dados.tipo_glp==="revenda",base:"IT-42 item 6.2.4-e"});
      docs.push({nome:"Documento comprobatório de área (área < 200 m²)",anexo:"—",obrigatorio:area<200,base:"IT-42 item 6.2.4-f"});
      docs.push({nome:"Recolhimento de taxa do CBMBA",anexo:"—",obrigatorio:true,base:"IT-42 item 6.2.4-d"});
    }else if(analise.tipoRegularizacao==="PROJETO_TECNICO"){
      docs.push({nome:"Projeto Técnico Completo conforme IT-01",anexo:"—",obrigatorio:true,base:"IT-42 item 6.1.1"});
      docs.push({nome:"Memorial descritivo de proteção contra incêndio",anexo:"—",obrigatorio:true,base:"IT-01"});
      docs.push({nome:"Plantas de PPCI com simbologia IT-04",anexo:"—",obrigatorio:true,base:"IT-01"});
      docs.push({nome:"ART/RRT do projeto",anexo:"—",obrigatorio:true,base:"IT-01"});
    }
    return docs;
  },[dados,analise]);

  // ============================================================
  // EXPORTAÇÃO PDF (relatório consolidado da análise)
  // ============================================================

      const labels={extintores:"Extintores",sinalizacao:"Sinalização",saidas_emergencia:"Saídas de Emergência",cmar:"CMAR",iluminacao_emergencia:"Iluminação de Emergência",glp:"GLP",hangares:"Hangares",brigada:"Brigada de Incêndio",eletrica:"Instalações Elétricas",mei:"MEI"};

      norma:"IT-42/2016 CBMBA — Projeto Técnico Simplificado",

        area_construida:dados.area_construida,
        altura_edificacao:project?.altura_edificacao||"—",

        responsavel_tecnico:dados.responsavel_tecnico,

      },
      dadosEntrada:[
        {label:"Nome fantasia",valor:dados.nome_fantasia||"—",unidade:""},
        {label:"Razão social",valor:dados.razao_social||"—",unidade:""},
        {label:"CNPJ/CPF",valor:dados.cnpj_cpf||"—",unidade:""},
        {label:"Endereço",valor:dados.endereco||"—",unidade:""},
        {label:"Proprietário/Responsável uso",valor:dados.proprietario||"—",unidade:""},
        {label:"Descrição atividade",valor:dados.descricao_atividade||"—",unidade:""},
        {label:"CNAE",valor:dados.cnae||"—",unidade:""},
        {label:"Área construída",valor:dados.area_construida||"—",unidade:"m²"},
        {label:"Nº pavimentos",valor:dados.numero_pavimentos||"—",unidade:""},
        {label:"Subsolo",valor:dados.possui_subsolo?`Sim — ${dados.uso_subsolo||"uso não especificado"}`:"Não",unidade:""},
        {label:"Mezanino",valor:dados.possui_mezanino?`Sim — ${dados.area_mezanino||"?"} m²`:"Não",unidade:""},
        {label:"População",valor:dados.populacao||"—",unidade:"pessoas"},
        {label:"Lotação máx. (se Grupo F)",valor:dados.local_reuniao_publico?(dados.lotacao_maxima||"—"):"N/A",unidade:""},
        {label:"GLP",valor:dados.possui_glp?`${dados.quantidade_glp_kg||"?"} kg (${dados.tipo_glp})`:"Não",unidade:""},
        {label:"Inflamáveis/combustíveis",valor:dados.possui_inflamaveis?`${dados.quantidade_inflamaveis_litros||"?"} L`:"Não",unidade:""},
        {label:"Tanque aéreo",valor:dados.armazenamento_tanque_aereo?"Sim":"Não",unidade:""},
        {label:"Posto combustível",valor:dados.posto_combustivel?"Sim":"Não",unidade:""},
        {label:"Gases inflamáveis",valor:dados.possui_gases_inflamaveis?"Sim":"Não",unidade:""},
        {label:"Produtos perigosos",valor:dados.possui_produtos_perigosos?"Sim":"Não",unidade:""},

      ],
      formulas:[

      ],
      desenvolvimento:[
        {titulo:"Avaliação item 5.1 (PTS)",calculo:analise.motivos5_1.length===0?"Atende a todos os critérios 5.1.1 a 5.1.9":"Restrições: "+analise.motivos5_1.join(" | "),resultado:analise.motivos5_1.length===0?"APTO PTS":"NÃO APTO"},
        {titulo:"Avaliação item 5.2 (CLCB)",calculo:analise.motivos5_2.length===0?"Atende a todos os critérios 5.2.1 a 5.2.8":"Restrições: "+analise.motivos5_2.join(" | "),resultado:analise.motivos5_2.length===0?"APTO CLCB":"NÃO APTO CLCB"},
        {titulo:"Tipo de regularização",calculo:"Conclusão da análise",resultado:analise.tipoRegularizacao},

    });
  };

  // ============================================================
  // EXPORTAÇÃO DE ANEXOS (PDF preenchível)
  // ============================================================
  const exportarAnexo=(codigo)=>{
    if(!window.jspdf){alert("Biblioteca PDF não carregada.");return;}
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210, M=15;
    let y=M;

    // Cabeçalho
    doc.setFillColor(234,88,12);
    doc.rect(0,0,W,22,"F");
    doc.setTextColor(255,255,255);
    doc.setFont("helvetica","bold").setFontSize(13);
    doc.text(`ANEXO ${codigo} — IT-42/2016 CBMBA`,M,11);
    doc.setFont("helvetica","normal").setFontSize(9);
    doc.text("Projeto Técnico Simplificado (PTS)",M,17);
    doc.setTextColor(40,40,40);
    y=30;

    const anexos={
      "A":{titulo:"Certificado de Licença do Corpo de Bombeiros (CLCB)",modelo:"oficial"},
      "B":{titulo:"Declaração do Proprietário ou Responsável pelo Uso",modelo:"declaracao"},
      "C":{titulo:"Formulário de Avaliação de Risco do Responsável Técnico",modelo:"avaliacao"},
      "D":{titulo:"Formulário de Segurança Contra Incêndio para PTS",modelo:"seguranca"},
      "E":{titulo:"Dados para Dimensionamento das Saídas de Emergência",modelo:"tabela"},
      "F":{titulo:"Distâncias Máximas a Serem Percorridas",modelo:"tabela"},
      "G":{titulo:"Classes dos Materiais de Acabamento e Revestimento",modelo:"tabela"},
      "H":{titulo:"Afastamentos de Segurança para Central de GLP",modelo:"tabela"},
    };
    const ax=anexos[codigo];

    doc.setFont("helvetica","bold").setFontSize(12);
    doc.text(ax.titulo,M,y); y+=8;
    doc.setFont("helvetica","normal").setFontSize(9);

    // Identificação do empreendimento (comum a todos)
    doc.autoTable({
      startY:y,
      head:[["Identificação do Empreendimento",""]],
      body:[
        ["Nome fantasia",dados.nome_fantasia||"_________________________________"],
        ["Razão social",dados.razao_social||"_________________________________"],
        ["CNPJ/CPF",dados.cnpj_cpf||"_________________________________"],
        ["Endereço",dados.endereco||"_________________________________"],
        ["Área construída",dados.area_construida?`${dados.area_construida} m²`:"_______ m²"],
        ["Ocupação",`${dados.grupo||"____"} / ${dados.divisao||"____"}`],
        ["População",dados.populacao||"_____"],
        ["CNAE",dados.cnae||"_________________"],
      ],
      margin:{left:M,right:M},
      theme:"grid",
      headStyles:{fillColor:[71,85,105],fontSize:9},
      bodyStyles:{fontSize:9},
      columnStyles:{0:{cellWidth:55,fontStyle:"bold"}},
    });
    y=doc.lastAutoTable.finalY+8;

    // Conteúdo específico de cada anexo
    if(codigo==="B"){
      doc.setFont("helvetica","bold").setFontSize(10);
      doc.text("DECLARAÇÃO",W/2,y,{align:"center"}); y+=8;
      doc.setFont("helvetica","normal").setFontSize(10);
      const texto="Declaro, para os devidos fins, que a edificação acima identificada atende aos requisitos para enquadramento como Projeto Técnico Simplificado (PTS), conforme item 5.2 da IT-42/2016 do CBMBA, sendo a regularização realizada por meio de Certificado de Licença do Corpo de Bombeiros (CLCB).\n\nDeclaro ainda estar ciente da minha responsabilidade quanto à manutenção das medidas de segurança contra incêndio e pânico instaladas no imóvel, conforme normas técnicas do Estado da Bahia, e de que o Corpo de Bombeiros Militar poderá, a qualquer tempo, fiscalizar a veracidade das informações prestadas.";
      const lines=doc.splitTextToSize(texto,W-2*M);
      lines.forEach(l=>{doc.text(l,M,y);y+=5;});
      y+=10;
      doc.setFont("helvetica","normal").setFontSize(9);
      doc.text(`Local e data: _____________________________, ____/____/______`,M,y);y+=15;
      doc.line(M+30,y,W-M-30,y);y+=4;
      doc.text(dados.proprietario||"Nome do Proprietário ou Responsável pelo Uso",W/2,y,{align:"center"});y+=4;
      doc.setFontSize(8).setTextColor(80,80,80);
      doc.text("CPF/RG: ________________________",W/2,y,{align:"center"});
    }
    else if(codigo==="C"||codigo==="D"){
      // Avaliação de risco / Segurança contra incêndio
      doc.setFont("helvetica","bold").setFontSize(10);
      doc.text(codigo==="C"?"AVALIAÇÃO DE RISCO":"FORMULÁRIO DE SEGURANÇA CONTRA INCÊNDIO",W/2,y,{align:"center"}); y+=8;
      doc.autoTable({
        startY:y,
        head:[["Aspecto","Situação","Observações"]],
        body:[
          ["Possui GLP?",dados.possui_glp?`Sim (${dados.quantidade_glp_kg||"?"} kg, ${dados.tipo_glp})`:"Não",""],
          ["Líquidos inflamáveis/combustíveis",dados.possui_inflamaveis?`Sim (${dados.quantidade_inflamaveis_litros||"?"} L)`:"Não",""],
          ["Gases inflamáveis",dados.possui_gases_inflamaveis?"Sim":"Não",""],
          ["Produtos perigosos",dados.possui_produtos_perigosos?"Sim":"Não",""],
          ["Vaso sob pressão / caldeira",dados.possui_vaso_pressao?"Sim":"Não",""],
          ["Mezanino",dados.possui_mezanino?`Sim (${dados.area_mezanino||"?"} m²)`:"Não",""],
          ["Subsolo",dados.possui_subsolo?`Sim (${dados.uso_subsolo||"?"})`:"Não",""],
          ["Local de reunião pública",dados.local_reuniao_publico?`Sim (lotação ${dados.lotacao_maxima||"?"})`:"Não",""],
        ],
        margin:{left:M,right:M},
        theme:"grid",
        headStyles:{fillColor:[71,85,105],fontSize:9},
        bodyStyles:{fontSize:9},
      });
      y=doc.lastAutoTable.finalY+6;

      doc.setFont("helvetica","bold").setFontSize(10);
      doc.text("Medidas de segurança contra incêndio aplicáveis (item 9 IT-42):",M,y); y+=6;
      const labels={extintores:"Extintores",sinalizacao:"Sinalização",saidas_emergencia:"Saídas de Emergência",cmar:"CMAR",iluminacao_emergencia:"Iluminação de Emergência",glp:"GLP",hangares:"Hangares",brigada:"Brigada",eletrica:"Instalações Elétricas",mei:"MEI"};
      doc.autoTable({
        startY:y,
        head:[["Medida","Aplicável","Status"]],
        body:Object.entries(medidas).map(([k,m])=>[labels[k],m.aplicavel?"SIM":"NÃO",m.aplicavel?m.status.toUpperCase():"—"]),
        margin:{left:M,right:M},
        theme:"striped",
        headStyles:{fillColor:[71,85,105],fontSize:9},
        bodyStyles:{fontSize:9},
      });
      y=doc.lastAutoTable.finalY+10;
    }
    else if(codigo==="E"){
      // Saídas de emergência
      doc.autoTable({
        startY:y,
        head:[["População por UP","Capacidade UP (pessoas)"]],
        body:[
          ["Acessos e descargas (geral)","100"],
          ["Escadas e rampas (geral)","60-75"],
          ["Portas (geral)","100"],
          ["Hospitais, asilos (H-2, H-3)","30 (acesso) / 22 (escada)"],
          ["Pré-escolas, escolas especiais (E-5, E-6)","30 (acesso) / 22 (escada)"],
        ],
        margin:{left:M,right:M},
        theme:"grid",
        headStyles:{fillColor:[71,85,105],fontSize:9},
        bodyStyles:{fontSize:9},
      });
      y=doc.lastAutoTable.finalY+6;
      doc.setFontSize(8).setTextColor(80,80,80);
      doc.text("Largura mínima da UP = 0,55 m | Largura mínima total da saída = 1,10 m (geral) ou 1,65 m (reunião pública/saúde)",M,y); y+=4;
      doc.text("Fonte: IT-42/2016 Anexo E + IT-11/2016 Anexo A Tabela 1",M,y);
    }
    else if(codigo==="F"){
      // Distâncias máximas
      doc.autoTable({
        startY:y,
        head:[["Configuração","1 saída","2+ saídas"]],
        body:[
          ["Sem chuveiros / sem detecção","30-40 m","45-50 m"],
          ["Sem chuveiros / com detecção","40-50 m","55-60 m"],
          ["Com chuveiros / sem detecção","55-60 m","65-70 m"],
          ["Com chuveiros / com detecção","75-95 m","90-140 m"],
        ],
        margin:{left:M,right:M},
        theme:"grid",
        headStyles:{fillColor:[71,85,105],fontSize:9},
        bodyStyles:{fontSize:9},
      });
      y=doc.lastAutoTable.finalY+6;
      doc.setFontSize(8).setTextColor(80,80,80);
      doc.text("Valores variam por grupo/divisão e tipo de piso. Consultar IT-11/2016 Tabela 2 (Anexo B) para valores definitivos.",M,y);
    }
    else if(codigo==="G"){
      // Classes de materiais de acabamento (CMAR)
      doc.autoTable({
        startY:y,
        head:[["Classe","Característica","Aplicação típica"]],
        body:[
          ["Classe I","Incombustível","Saídas de emergência, escadas, áreas de risco"],
          ["Classe II-A","Combustível com baixa propagação","Locais de reunião, hospitais"],
          ["Classe II-B","Combustível com propagação moderada","Comércio, escritórios"],
          ["Classe III-A","Combustível com propagação média","Demais áreas"],
          ["Classe III-B","Combustível com propagação alta","Restrito - apenas onde IT permitir"],
        ],
        margin:{left:M,right:M},
        theme:"grid",
        headStyles:{fillColor:[71,85,105],fontSize:9},
        bodyStyles:{fontSize:9},
      });
      y=doc.lastAutoTable.finalY+6;
      doc.setFontSize(8).setTextColor(80,80,80);
      doc.text("Classificação conforme IT-10/2017 — Controle de Materiais de Acabamento e Revestimento (CMAR)",M,y);
    }
    else if(codigo==="H"){
      // Afastamentos GLP
      doc.autoTable({
        startY:y,
        head:[["Classe","Capacidade total","Dist. mín. edificação","Dist. mín. via pública"]],
        body:[
          ["Classe I","até 520 kg","1,5 m","3,0 m"],
          ["Classe II","521 - 1.560 kg","3,0 m","7,5 m"],
          ["Classe III","1.561 - 6.240 kg","7,5 m","7,5 m"],
          ["Classe IV","6.241 - 12.480 kg","15,0 m","15,0 m"],
          ["Classe V","12.481 - 24.960 kg","22,5 m","22,5 m"],
          ["Classe VI","acima de 24.960 kg","30,0 m","30,0 m"],
        ],
        margin:{left:M,right:M},
        theme:"grid",
        headStyles:{fillColor:[71,85,105],fontSize:9},
        bodyStyles:{fontSize:9},
      });
      y=doc.lastAutoTable.finalY+6;
      doc.setFontSize(8).setTextColor(80,80,80);
      doc.text("Valores conforme IT-28/2021 e NBR 15514. PTS aceita GLP até 12.480 kg (item 5.1.5 IT-42).",M,y);
    }
    else if(codigo==="A"){
      // Modelo do CLCB
      doc.setFont("helvetica","bold").setFontSize(11);
      doc.text("CERTIFICADO DE LICENÇA DO CORPO DE BOMBEIROS",W/2,y,{align:"center"}); y+=8;
      doc.setFont("helvetica","normal").setFontSize(10);
      const txt="O Corpo de Bombeiros Militar do Estado da Bahia, com base nos dados declarados pelo Proprietário/Responsável pelo Uso e/ou pelo Responsável Técnico, em conformidade com a Instrução Técnica nº 42/2016, certifica que o estabelecimento acima identificado encontra-se REGULARIZADO sob a modalidade Projeto Técnico Simplificado (PTS).\n\nEste Certificado de Licença tem validade de 1 (um) ano, contados da data de sua emissão, conforme item 8.1 da IT-42/2016, podendo o CBMBA realizar fiscalização posterior por amostragem, segundo critérios de risco estabelecidos pelos Órgãos Técnicos.\n\nA emissão deste documento não exime o proprietário, responsável pelo uso ou empresário do cumprimento integral das exigências técnicas previstas no Decreto Estadual nº 16.302/2015 e demais normas adotadas pelo CBMBA.";
      doc.splitTextToSize(txt,W-2*M).forEach(l=>{doc.text(l,M,y);y+=5;});
      y+=15;
      doc.text(`Salvador-BA, ____/____/______`,W/2,y,{align:"center"});y+=15;
      doc.line(M+30,y,W-M-30,y);y+=4;
      doc.setFontSize(9);
      doc.text("Autoridade do Corpo de Bombeiros Militar da Bahia",W/2,y,{align:"center"});
    }

    // Rodapé
    const totalPages=doc.internal.pages.length-1;
    for(let i=1;i<=totalPages;i++){
      doc.setPage(i);
      doc.setFont("helvetica","normal").setFontSize(7).setTextColor(120,120,120);
      doc.text(`Anexo ${codigo} — IT-42/2016 CBMBA  |  ${dados.nome_fantasia||"empreendimento"}`,M,292);
      doc.text(`Página ${i} de ${totalPages}`,W-M,292,{align:"right"});
    }

    doc.save(`Anexo_${codigo}_IT42_${(dados.nome_fantasia||"empreendimento").replace(/[^a-zA-Z0-9]/g,"_")}.pdf`);
  };

  // ============================================================
  // RENDER
  // ============================================================
  const tabs=[
    {id:"dados",label:"Dados Gerais",Ic:Icons.fileText},
    {id:"analise",label:"Análise de Enquadramento",Ic:Icons.shield},
    {id:"docs",label:"Documentos Necessários",Ic:Icons.checklist},
    {id:"medidas",label:"Medidas de Segurança",Ic:Icons.flame},
    {id:"anexos",label:"Anexos IT-42",Ic:Icons.book},

  const corEnq={

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">

          <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.checklist size={24} className="text-orange-500"/> Projeto Técnico Simplificado (PTS)</h1>

          <p className="text-xs text-blue-900"><b>Importante:</b> Esta tela apresenta uma análise técnica preliminar com base nos dados informados e na IT-42/2016. <b>Não substitui a análise oficial</b> do Corpo de Bombeiros Militar da Bahia, que é o órgão competente para a aprovação final do projeto.</p>
        </div>
      </Card>

      {/* Resumo do enquadramento - sempre visível */}
      <Card className={`p-5 border-2 border-${corEnq.bg}-200 bg-${corEnq.bg}-50/30`}>
        <div className="flex items-start justify-between flex-wrap gap-3">
          <div className="flex-1 min-w-0">
            <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500">Resultado da análise</p>
            <p className={`text-2xl font-bold text-${corEnq.bg}-700 mt-1`}>{corEnq.label}</p>
            <p className="text-sm text-slate-600 mt-1">{analise.descricao}</p>
          </div>
          <div className="text-right">
            <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500">Edificação</p>
            <p className="text-sm font-semibold text-slate-800">{analise.area||"?"} m² • {analise.pav} pav</p>
            <p className="text-xs text-slate-500">{dados.grupo||"—"} / {dados.divisao||"—"}</p>

      <div className="border-b border-slate-200 flex gap-1 overflow-x-auto">

            <t.Ic size={15}/>{t.label}
          </button>

      </div>

      {/* ABA: Dados gerais */}
      {tabAtiva==="dados"&&(
        <div className="space-y-5">
