const PlanosPage=({profile,onPlanChange})=>{
  const planoAtual=profile?.plan||"free";
  const [loading,setLoading]=useState(null);
  const [msg,setMsg]=useState("");

  // Ao voltar do checkout Pagar.me, o parâmetro ?upgraded=pro pode estar na URL
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search).get("upgraded");
    if(p&&["pro","escritorio"].includes(p)){
      setMsg(`Pagamento confirmado! Seu plano foi atualizado para ${p==="pro"?"Pro":"Escritório"}.`);
      supabase.from("profiles").update({plan:p,plan_expires_at:new Date(Date.now()+30*24*60*60*1000).toISOString()})
        .eq("id",profile?.id)
        .then(()=>onPlanChange&&onPlanChange(p));
      window.history.replaceState({},"",window.location.pathname);
    }
  },[]);

  const PLANOS=[
    {
      id:"free",
      nome:"Gratuito",
      preco:"R$ 0",
      periodo:"/sempre",
      cor:"slate",
      destaque:false,
      itens:[
        "Até 3 projetos",
        "Todos os calculadores",
        "Consulta ITs CBMBA",
        "Dashboard básico",
        "Sem exportação PDF",
        "Sem suporte prioritário",

      cta:planoAtual==="free"?"Plano atual":"Fazer downgrade",
      link:null,
    },
    {
      id:"pro",
      nome:"Profissional",
      preco:"R$ 99",
      periodo:"/mês",
      cor:"orange",
      destaque:true,
      itens:[
        "Projetos ilimitados",
        "Todos os calculadores",
        "Exportação PDF completa",
        "Memória de cálculo PDF",
        "Análise de planta com IA",
        "Suporte por e-mail",
      ],
      // Link de pagamento Pagar.me — substituir pela URL real após criar produto no painel
      link:"https://pagar.me/",
      cta:planoAtual==="pro"?"Plano atual":planoAtual==="escritorio"?"Fazer downgrade":"Assinar agora",
    },
    {
      id:"escritorio",
      nome:"Escritório",
      preco:"R$ 279",
      periodo:"/mês",
      cor:"violet",
      destaque:false,
      itens:[
        "Tudo do Pro",
        "Até 5 usuários",
        "Logo do escritório no PDF",
        "Projetos compartilhados",
        "Relatório com timbre",
        "Suporte prioritário",

      // Link de pagamento Pagar.me — substituir pela URL real após criar produto no painel
      link:"https://pagar.me/",

    },
  ];

    if(!plano.link||plano.id===planoAtual)return;
    setLoading(plano.id);
    // Monta URL de checkout com parâmetros de retorno para identificar o usuário

    const checkoutUrl=`${plano.link}?customer_email=${encodeURIComponent(profile?.id||"")}&redirect_url=${encodeURIComponent(returnUrl)}`;

    setLoading(null);
  };

    free:"bg-slate-100 text-slate-600",
    orange:"bg-orange-100 text-orange-700",
    violet:"bg-violet-100 text-violet-700"
  };

  return(
    <div className="space-y-8 fade-in max-w-5xl">

                <li key={i} className="flex items-start gap-2 text-sm">
                  <Icons.check size={14} className={`mt-0.5 flex-shrink-0 ${it.startsWith("Sem ")||it.startsWith("Sem")||it.startsWith("Até 3")?"text-slate-300":"text-emerald-500"}`}/>
                  <span className={it.startsWith("Sem ")?"text-slate-400 line-through":"text-slate-700"}>{it}</span>
                </li>
              ))}
            </ul>
            <button
              onClick={()=>pl.link&&pl.id!==planoAtual?handleCheckout(pl):undefined}
              disabled={pl.id===planoAtual||loading===pl.id||!pl.link}
              className={`w-full py-2.5 rounded-xl text-sm font-semibold transition-all focus:outline-none ${
                pl.id===planoAtual
                  ?"bg-slate-100 text-slate-400 cursor-default"
                  :pl.destaque
                  ?"bg-gradient-to-r from-orange-500 to-red-500 text-white hover:from-orange-600 hover:to-red-600 shadow-sm"
                  :"bg-slate-800 text-white hover:bg-slate-900"
              }`}
            >
              {loading===pl.id?<span className="pulse-dot">Abrindo checkout...</span>:pl.cta}
            </button>
            {pl.id!=="free"&&pl.id!==planoAtual&&<p className="text-[10px] text-slate-400 text-center mt-2">Cobrado mensalmente · Cancele quando quiser</p>}
          </div>
        ))}
      </div>

      <Card className="p-5 border-amber-200 bg-amber-50/40">
        <div className="flex gap-3 items-start">
          <Icons.info size={18} className="text-amber-600 flex-shrink-0 mt-0.5"/>
          <div>
            <p className="text-sm font-semibold text-slate-700 mb-1">Como configurar o checkout Pagar.me</p>
            <ol className="text-xs text-slate-600 space-y-1 list-decimal ml-4">
              <li>Crie uma conta em <strong>pagar.me</strong> e acesse o painel.</li>
              <li>Crie um <strong>Plano de Assinatura</strong> para cada plano (Pro e Escritório) com os valores acima.</li>
              <li>Copie o link de checkout gerado e substitua a constante <code className="bg-slate-100 px-1 rounded">link</code> em cada plano no código desta página.</li>
              <li>Os clientes serão redirecionados de volta ao app após o pagamento e o plano será atualizado automaticamente.</li>
            </ol>
          </div>
        </div>
      </Card>
    </div>
  );
};

// ---- APP ----
// ============================================================
function App(){
  const [session,setSession]=useState(undefined); // undefined = carregando, null = deslogado
  const [profile,setProfile]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [collapsed,setCollapsed]=useState(false);
  const [projects,setProjects]=useState([]);
  const [selProj,setSelProj]=useState(null);
  const [mobMenu,setMobMenu]=useState(false);

  // Escuta mudanças de sessão (login, logout, refresh de token)
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>setSession(session??null));
    const{data:{subscription}}=supabase.auth.onAuthStateChange((_event,session)=>{
      setSession(session??null);
      if(!session){setProfile(null);setProjects([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Carrega perfil e projetos quando loga
  useEffect(()=>{
    if(!session)return;
    // Busca perfil
    supabase.from("profiles").select("*").eq("id",session.user.id).single()
      .then(({data})=>{if(data)setProfile(data);});
    // Busca projetos do usuário
    supabase.from("projects").select("*").eq("user_id",session.user.id).order("updated_at",{ascending:false})
      .then(({data})=>{if(data)setProjects(data.map(p=>({
        ...p,
        // Compatibilidade com campos usados no app
        nome:p.nome,
        status:p.status==="em_andamento"?"RASCUNHO":p.status==="concluido"?"CALCULADO":"ARQUIVADO",
        grupo:p.divisao?p.divisao.split("-")[0]:"A",
        area_construida:p.area,
        altura_edificacao:p.altura*p.pavimentos,
        numero_pavimentos:p.pavimentos,
        possui_subsolo:p.subterraneo,
        criado:p.created_at?.slice(0,10),
        atualizado:p.updated_at?.slice(0,10),
      })));});
  },[session]);

  const handleLogout=async()=>{
    await supabase.auth.signOut();
    setSession(null);setProjects([]);setSelProj(null);setPage("dashboard");
  };

  // Tela de carregamento inicial
  if(session===undefined){
    return(
      <div className="min-h-screen bg-slate-900 flex items-center justify-center">
        <div className="text-center">
          <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-500/30"><Icons.flame size={24} className="text-white"/></div>
          <p className="text-slate-400 text-sm">Carregando PPCI SaaS...</p>
        </div>
      </div>
    );
  }

  if(!session)return <LoginPage onLogin={(sess)=>setSession(sess)}/>;

  const planoBadge={free:"bg-slate-100 text-slate-600",pro:"bg-orange-100 text-orange-700",escritorio:"bg-violet-100 text-violet-700"};
  const planoLabel={free:"Grátis",pro:"Pro",escritorio:"Escritório"};
  const plano=profile?.plan||"free";

  const pages={
    "dashboard":<DashboardPage projects={projects} setPage={setPage} setSelProj={setSelProj} setProjects={setProjects}/>,
    "novo-projeto":<NovoProjetoPage setPage={setPage} setProjects={setProjects} projects={projects} setSelProj={setSelProj}/>,
    "analise-planta":<AnalisePlantaPage setPage={setPage} setProjects={setProjects} setSelProj={setSelProj}/>,
    "calc-populacao":<CalcPopulacaoPage project={selProj}/>,
    "calc-carga":<CalcCargaIncendioPage project={selProj}/>,
    "consulta-it14":<ConsultaIT14Page/>,
    "calc-caminhamento":<CalcCaminhamentoPage project={selProj}/>,
    "calc-brigada":<CalcBrigadaPage project={selProj}/>,
    "calc-iluminacao":<CalcIluminacaoPage project={selProj}/>,
    "calc-sinalizacao":<CalcSinalizacaoPage project={selProj}/>,
    "calc-alarme":<CalcAlarmePage project={selProj}/>,
    "calc-sprinklers":<CalcSprinklersPage project={selProj}/>,
    "calc-spda":<CalcSpdaPage project={selProj}/>,
    "calc-glp":<CalcGlpPage project={selProj}/>,
    "calc-fumaca":<CalcPressurizacaoPage project={selProj}/>,
    "hidrantes-iso":<HidrantesIsoPage/>,
    "pts-it42":<ProjetoSimplificadoPage project={selProj}/>,
    "calculos":<CalculosPage project={selProj}/>,
    "revisao":<RevisaoPage project={selProj}/>,
    "exportar":<ExportarPage project={selProj}/>,
    "planos":<PlanosPage profile={profile} onPlanChange={(newPlan)=>setProfile(p=>({...p,plan:newPlan}))}/>,
  };

  return(
    <div className="min-h-screen bg-slate-50/80">
      {/* Header mobile */}
      <div className="lg:hidden fixed top-0 left-0 right-0 h-14 bg-white border-b border-slate-200 flex items-center px-4 z-50 gap-3">
        <button onClick={()=>setMobMenu(!mobMenu)} className="p-2 rounded-lg hover:bg-slate-100"><Icons.menu size={20}/></button>
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center"><Icons.flame size={14} className="text-white"/></div>
          <span className="font-bold text-sm text-slate-800">PPCI SaaS</span>
        </div>
        <div className="ml-auto flex items-center gap-2">
          <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold ${planoBadge[plano]}`}>{planoLabel[plano]}</span>
          <button onClick={handleLogout} className="text-xs text-slate-500 hover:text-red-500 px-2 py-1 rounded hover:bg-red-50 transition-colors">Sair</button>
        </div>
      </div>

      {/* Overlay mobile */}
      {mobMenu&&<div className="lg:hidden fixed inset-0 bg-black/50 z-40" onClick={()=>setMobMenu(false)}/>}

      {/* Sidebar desktop */}
      <div className="hidden lg:block">
        <Sidebar page={page} setPage={p=>{setPage(p);setMobMenu(false)}} collapsed={collapsed} setCollapsed={setCollapsed} selProj={selProj}/>
        {/* Botão de logout + info de usuário no rodapé do sidebar (desktop) */}
        {!collapsed&&(
          <div className="fixed bottom-0 left-0 w-64 bg-slate-900 border-t border-slate-700/50 px-4 py-3 z-40">
            <div className="flex items-center gap-2 mb-2">
              <div className="w-7 h-7 rounded-full bg-orange-500/20 flex items-center justify-center flex-shrink-0">
                <span className="text-orange-400 text-[10px] font-bold">{(profile?.full_name||session.user.email||"U")[0].toUpperCase()}</span>
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-[11px] text-slate-300 truncate">{profile?.full_name||session.user.email}</p>
                <span className={`text-[9px] px-1.5 py-0.5 rounded font-semibold ${planoBadge[plano]}`}>{planoLabel[plano]}</span>
              </div>
              <button onClick={handleLogout} title="Sair" className="text-slate-500 hover:text-red-400 transition-colors p-1 rounded">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Sidebar mobile */}
      {mobMenu&&<div className="lg:hidden fixed left-0 top-0 h-full z-50"><Sidebar page={page} setPage={p=>{setPage(p);setMobMenu(false)}} collapsed={false} setCollapsed={()=>{}} selProj={selProj}/></div>}

      {/* Conteúdo principal */}
      <main className={`transition-all duration-300 pt-14 lg:pt-0 ${collapsed?"lg:ml-[68px]":"lg:ml-64"}`}>
        <div className="p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto">{pages[page]}</div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
