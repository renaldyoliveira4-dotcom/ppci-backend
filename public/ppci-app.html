// ============================================================
// FUNÇÃO UTILITÁRIA: GERAR MEMÓRIA DE CÁLCULO EM PDF
// ============================================================
// Recebe um objeto estruturado e gera o relatório técnico completo.
// Estrutura mantida intencionalmente para no futuro suportar DOCX e XLSX
// usando os mesmos dados de entrada.
//
// Parâmetros:
//   modulo: string — nome do dimensionamento
//   norma: string — IT / Norma técnica aplicada
//   projeto: { nome, divisao, grupo, area_construida, altura_edificacao, numero_pavimentos, responsavel_tecnico, crea_responsavel }
//   dadosEntrada: array de { label, valor, unidade? }
//   formulas: array de { descricao, equacao }
//   desenvolvimento: array de { titulo, calculo, resultado }
//   resultadoFinal: { valor, unidade, descricao? }
//   situacao: "CONFORME" | "NÃO CONFORME" | "INFORMATIVO"
//   observacoes: string
//
// Retorna: false se faltar dados essenciais (exibe alert); true se gerou OK.
function gerarMemoriaCalculoPDF(opts){
  // Validação de dados essenciais
  const faltando=[];
  if(!opts.modulo)faltando.push("nome do módulo");
  if(!opts.projeto||!opts.projeto.nome)faltando.push("projeto/empreendimento");
  if(!opts.norma)faltando.push("norma técnica");
  if(!opts.dadosEntrada||opts.dadosEntrada.length===0)faltando.push("dados de entrada");
  if(!opts.resultadoFinal)faltando.push("resultado final");
  if(faltando.length>0){
    alert("⚠ Não é possível exportar a memória de cálculo.\n\nDados faltando:\n• "+faltando.join("\n• ")+"\n\nPreencha os campos e calcule antes de exportar.");
    return false;
  }
  if(!window.jspdf||!window.jspdf.jsPDF){
    alert("Biblioteca PDF não carregou. Verifique sua conexão e recarregue a página.");
    return false;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210, M=15;
  let y=M;

  // ---------- Cabeçalho ----------
  doc.setFillColor(234,88,12); // orange-600
  doc.rect(0,0,W,22,"F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold").setFontSize(14);
  doc.text("MEMÓRIA DE CÁLCULO TÉCNICA",M,11);
  doc.setFont("helvetica","normal").setFontSize(9);
  doc.text("Sistema PPCI — Prevenção e Proteção Contra Incêndio (CBMBA)",M,17);
  doc.setTextColor(40,40,40);
  y=30;

  // ---------- 1. Nome do módulo ----------
  doc.setFillColor(255,237,213); // orange-100
  doc.rect(M,y,W-2*M,8,"F");
  doc.setFont("helvetica","bold").setFontSize(11).setTextColor(154,52,18);
  doc.text("1. DIMENSIONAMENTO",M+2,y+5.5);
  y+=12;
  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(20,20,20);
  doc.text(opts.modulo,M,y); y+=6;
  doc.setFont("helvetica","normal").setFontSize(9).setTextColor(80,80,80);
  doc.text(`Norma: ${opts.norma}`,M,y); y+=4;
  doc.text(`Data de emissão: ${new Date().toLocaleString("pt-BR")}`,M,y); y+=8;

  // ---------- 2. Dados do empreendimento ----------
  doc.setFillColor(255,237,213); doc.rect(M,y,W-2*M,8,"F");
  doc.setFont("helvetica","bold").setFontSize(11).setTextColor(154,52,18);
  doc.text("2. DADOS DO EMPREENDIMENTO",M+2,y+5.5);
  y+=10;
  const p=opts.projeto;
  const dadosProj=[
    ["Empreendimento",p.nome||"—"],
    ["Grupo / Divisão",`${p.grupo||"—"} / ${p.divisao||"—"}`],
    ["Área construída",`${p.area_construida||"—"} m²`],
    ["Altura da edificação",`${p.altura_edificacao||"—"} m`],
    ["Nº de pavimentos",`${p.numero_pavimentos||"—"}`],
    ["Responsável técnico",p.responsavel_tecnico||"—"],
    ["CREA / Registro",p.crea_responsavel||"—"],
  ];
  doc.autoTable({
    startY:y,
    head:[["Campo","Valor"]],
    body:dadosProj,
    margin:{left:M,right:M},
    theme:"grid",
    headStyles:{fillColor:[71,85,105],fontSize:9,halign:"left"},
    bodyStyles:{fontSize:9},
    columnStyles:{0:{cellWidth:60,fontStyle:"bold"}},
  });
  y=doc.lastAutoTable.finalY+8;

  // Quebra de página se necessário
  const verificaPagina=(necessario=30)=>{ if(y+necessario>285){doc.addPage();y=M+5;} };

  // ---------- 3. Dados de entrada ----------
  verificaPagina(40);
  doc.setFillColor(255,237,213); doc.rect(M,y,W-2*M,8,"F");
  doc.setFont("helvetica","bold").setFontSize(11).setTextColor(154,52,18);
  doc.text("3. DADOS DE ENTRADA",M+2,y+5.5);
  y+=10;
  doc.autoTable({
    startY:y,
    head:[["Parâmetro","Valor","Unidade"]],
    body:opts.dadosEntrada.map(d=>[d.label,String(d.valor),d.unidade||"—"]),
    margin:{left:M,right:M},
    theme:"striped",
    headStyles:{fillColor:[71,85,105],fontSize:9},
    bodyStyles:{fontSize:9},
  });
  y=doc.lastAutoTable.finalY+8;

  // ---------- 4. (Norma já no item 1, então item 4 reservado para Fórmulas) ----------
  // ---------- 4. Fórmulas aplicadas ----------
  if(opts.formulas&&opts.formulas.length>0){
    verificaPagina(30);
    doc.setFillColor(255,237,213); doc.rect(M,y,W-2*M,8,"F");
    doc.setFont("helvetica","bold").setFontSize(11).setTextColor(154,52,18);
    doc.text("4. FÓRMULAS APLICADAS",M+2,y+5.5);
    y+=12;
    doc.setFontSize(9).setTextColor(40,40,40);
    opts.formulas.forEach(f=>{
      verificaPagina(14);
      doc.setFont("helvetica","bold");
      const descLines=doc.splitTextToSize(f.descricao,W-2*M);
      descLines.forEach(line=>{doc.text(line,M,y);y+=4;});
      doc.setFont("courier","normal").setFillColor(248,250,252);
      doc.rect(M,y-2,W-2*M,6,"F");
      const eqLines=doc.splitTextToSize(f.equacao,W-2*M-4);
      eqLines.forEach(line=>{doc.text(line,M+2,y+2);y+=5;});
      doc.setFont("helvetica","normal"); y+=3;
    });
    y+=4;
  }

  // ---------- 5. Desenvolvimento do cálculo ----------
  verificaPagina(40);
  doc.setFillColor(255,237,213); doc.rect(M,y,W-2*M,8,"F");
  doc.setFont("helvetica","bold").setFontSize(11).setTextColor(154,52,18);
  doc.text("5. DESENVOLVIMENTO DO CÁLCULO",M+2,y+5.5);
  y+=10;
  if(opts.desenvolvimento&&opts.desenvolvimento.length>0){
    doc.autoTable({
      startY:y,
      head:[["Etapa","Cálculo","Resultado"]],
      body:opts.desenvolvimento.map((d,i)=>[`${i+1}. ${d.titulo}`,d.calculo,d.resultado]),
      margin:{left:M,right:M},
      theme:"grid",
      headStyles:{fillColor:[71,85,105],fontSize:9},
      bodyStyles:{fontSize:8,valign:"middle"},
      columnStyles:{0:{cellWidth:40,fontStyle:"bold"},1:{cellWidth:90},2:{cellWidth:"auto",fontStyle:"bold",halign:"right"}},
    });
    y=doc.lastAutoTable.finalY+8;
  }

  // ---------- 6. Resultado final ----------
  verificaPagina(30);
  doc.setFillColor(255,237,213); doc.rect(M,y,W-2*M,8,"F");
  doc.setFont("helvetica","bold").setFontSize(11).setTextColor(154,52,18);
  doc.text("6. RESULTADO FINAL",M+2,y+5.5);
  y+=12;
  const r=opts.resultadoFinal;
  doc.setFillColor(254,242,242); doc.setDrawColor(248,113,113);
  doc.rect(M,y,W-2*M,18,"FD");
  doc.setFont("helvetica","bold").setFontSize(16).setTextColor(127,29,29);
  doc.text(`${r.valor} ${r.unidade||""}`,W/2,y+9,{align:"center"});
  if(r.descricao){
    doc.setFont("helvetica","normal").setFontSize(9).setTextColor(80,80,80);
    doc.text(r.descricao,W/2,y+15,{align:"center"});
  }
  y+=24;

  // ---------- 7. Situação ----------
  verificaPagina(20);
  const sit=(opts.situacao||"INFORMATIVO").toUpperCase();
  const corSit=sit==="CONFORME"?[16,185,129]:sit==="NÃO CONFORME"||sit==="NAO CONFORME"?[239,68,68]:[100,116,139];
  doc.setFillColor(...corSit);
  doc.rect(M,y,W-2*M,10,"F");
  doc.setFont("helvetica","bold").setFontSize(11).setTextColor(255,255,255);
  doc.text(`SITUAÇÃO: ${sit}`,W/2,y+6.5,{align:"center"});
  doc.setTextColor(40,40,40);
  y+=16;

  // ---------- 8. Observações ----------
  verificaPagina(30);
  doc.setFillColor(255,237,213); doc.rect(M,y,W-2*M,8,"F");
  doc.setFont("helvetica","bold").setFontSize(11).setTextColor(154,52,18);
  doc.text("7. OBSERVAÇÕES TÉCNICAS",M+2,y+5.5);
  y+=12;
  doc.setFont("helvetica","normal").setFontSize(9).setTextColor(40,40,40);
  const obs=opts.observacoes||"Nenhuma observação registrada.";
  const obsLines=doc.splitTextToSize(obs,W-2*M);
  obsLines.forEach(line=>{
    if(y>275){doc.addPage();y=M+5;}
    doc.text(line,M,y); y+=4.5;
  });
  y+=6;

  // ---------- 9. Assinatura ----------
  verificaPagina(45);
  doc.setFillColor(255,237,213); doc.rect(M,y,W-2*M,8,"F");
  doc.setFont("helvetica","bold").setFontSize(11).setTextColor(154,52,18);
  doc.text("8. RESPONSABILIDADE TÉCNICA",M+2,y+5.5);
  y+=18;
  doc.setDrawColor(80,80,80).setLineWidth(0.3);
  doc.line(M+20,y,W-M-20,y);
  y+=4;
  doc.setFont("helvetica","normal").setFontSize(9).setTextColor(40,40,40);
  doc.text(p.responsavel_tecnico||"_______________________________________________",W/2,y,{align:"center"});
  y+=4;
  doc.setFontSize(8).setTextColor(80,80,80);
  doc.text(`Responsável Técnico${p.crea_responsavel?` — CREA/Registro: ${p.crea_responsavel}`:""}`,W/2,y,{align:"center"});
  y+=8;
  doc.text("Assinatura: _____________________________________   Data: ____/____/_______",W/2,y,{align:"center"});

  // ---------- Rodapé em todas as páginas ----------
  const totalPages=doc.internal.pages.length-1;
  for(let i=1;i<=totalPages;i++){
    doc.setPage(i);
    doc.setFont("helvetica","normal").setFontSize(7).setTextColor(120,120,120);
    doc.text(`Memória de Cálculo — ${opts.modulo}  |  ${opts.projeto.nome}`,M,292);
    doc.text(`Página ${i} de ${totalPages}`,W-M,292,{align:"right"});
  }

  // Salva
  const nomeArquivo=`Memoria_${opts.modulo.replace(/[^a-zA-Z0-9]/g,"_")}_${(opts.projeto.nome||"projeto").replace(/[^a-zA-Z0-9]/g,"_")}_${new Date().toISOString().split("T")[0]}.pdf`;
  doc.save(nomeArquivo);
  return true;
}

/*
 * Define se a edificação se enquadra como PTS (IT-42 CBMBA) ou Projeto Técnico
 *
 * IT-42/2016 — Item 5.1: PTS exige TODAS as condições:
 *  - Área construída ≤ 750 m² (5.1.1)
 *  - Até 3 pavimentos (5.1.2)
 *  - Sem subsolo F ou outra ocupação > 50m² (5.1.3)
 *  - Grupo F com lotação ≤ 100 pessoas (5.1.4)
 *  - GLP revenda ≤ 12.480 kg (5.1.5)
 *  - Sem inflamáveis em tanques aéreos (5.1.6)
 *  - Não ser posto de combustível (5.1.7)
 *  - Sem gases inflamáveis em tanques/cilindros (5.1.8)
 *  - Sem produtos perigosos (5.1.9)
 *
 * Item 5.2.7 — Não permitido nas ocupações:
 *  - A-3 e B-1 com mais de 16 leitos
 *  - D-1 com Call Center > 100 funcionários
 *  - E-5 (Pré-escolas), E-6 (Portadores de deficiência)
 *  - F-1, F-3, F-4, F-5, F-6, F-7, F-9, F-10
 *  - H-2, H-3, H-5
 *  - Todo grupo J (Depósitos)
 */
function definirProcesso(area,alt,pav,grupo,divisao,populacao,riscoNivel,exigeHidrante){
  const motivos=[];
  const grupoU=(grupo||"").toUpperCase();
  const divisaoU=(divisao||"").toUpperCase();

  // Item 5.1.1 — Área máxima
  if(area>750)motivos.push(`Área ${area} m² > 750 m² (IT-42 item 5.1.1)`);
  // Item 5.1.2 — Pavimentos
  if(pav>3)motivos.push(`${pav} pavimentos (máx 3 pelo IT-42 item 5.1.2)`);
  // Item 5.1.4 — Grupo F com lotação >100
  if(grupoU==="F"&&populacao>100)motivos.push(`Grupo F com ${populacao} pessoas > 100 (IT-42 item 5.1.4)`);

  // Item 5.2.7 — Ocupações excluídas
  if(["F-1","F-3","F-4","F-5","F-6","F-7","F-9","F-10"].includes(divisaoU))
    motivos.push(`Divisão ${divisaoU} excluída pelo IT-42 item 5.2.7-e`);
  if(["H-2","H-3","H-5"].includes(divisaoU))
    motivos.push(`Divisão ${divisaoU} (saúde) excluída pelo IT-42 item 5.2.7-f`);
  if(["E-5","E-6"].includes(divisaoU))
    motivos.push(`Divisão ${divisaoU} (pré-escola/portadores de deficiência) excluída pelo IT-42 item 5.2.7-d`);
  if(grupoU==="J")
    motivos.push(`Grupo J (Depósitos) excluído pelo IT-42 item 5.2.7-g`);

  // Outras restrições prudenciais (não literais da IT-42 mas técnicas):
  if(alt>12)motivos.push(`Altura ${alt} m > 12 m (boa prática)`);
  if(exigeHidrante)motivos.push("Exige sistema hidráulico (incompatível com PTS)");
  if((riscoNivel||"").toUpperCase()==="ELEVADO")motivos.push("Risco elevado de incêndio");
  if(["I-2","I-3"].includes(divisaoU))motivos.push(`Divisão ${divisaoU} (indústria risco médio/alto)`);
  if(divisaoU==="L-1"||divisaoU==="L-2"||divisaoU==="L-3")motivos.push(`Explosivos (${divisaoU})`);

  if(motivos.length===0){
    return{
      tipo:"PTS",
      descricao:"Processo Técnico Simplificado",
      justificativa:`Edificação com área ${area} m², ${pav} pavimento(s), grupo ${grupoU} atende todos os requisitos da IT-42/2016 CBMBA para PTS`,
    };
  }
  return{
    tipo:"PROJETO_TECNICO",
    descricao:"Projeto Técnico Completo",
    justificativa:"Motivos: "+motivos.join("; "),
  };
}
/*
 * Determina os sistemas de proteção contra incêndio exigidos.
 * Baseado nas Instruções Técnicas do CBMBA.
 * Recebe: área (m²), altura (m), grupo (letra), divisão (ex: "I-2"), risco (LEVE/MODERADO/ELEVADO),
 *         subsolo (bool), populacao (int), pavimentos (int)
 */
function sistemas(area,alt,gr,div,ri,sub,populacao=0,pav=1){
  const s=new Set();
  // === SISTEMAS BÁSICOS — exigidos para TODA edificação ===
  s.add("EXTINTORES");           // IT-21 — sempre (Extintores)
  s.add("SAIDA_EMERGENCIA");     // IT-11 — sempre
  s.add("ILUM_EMERGENCIA");      // IT-18 — quase sempre
  s.add("SINALIZACAO");          // IT-20 — sempre
  s.add("CONTROLE_MATERIAIS");   // IT-10 — controle de materiais de acabamento

  // === HIDRANTES — IT-17 (área > 700 m²) ===
  const exigeHidrante = area > 700;
  if(exigeHidrante){s.add("HIDRANTES");s.add("ALARME")}

  // === POR ÁREA CONSTRUÍDA ===
  if(area>750){s.add("ALARME")}                                          // alarme em médias/grandes
  if(area>1500){s.add("BRIGADA");s.add("PLANO_EMERGENCIA")}              // brigada em maiores
  if(area>5000){s.add("ACESSO_VIATURAS");s.add("DETECCAO")}              // acesso de viaturas + detecção

  // === POR ALTURA ===
  if(alt>6){s.add("SEG_ESTRUTURAL")}                                     // resistência estrutural
  if(alt>12){s.add("COMPARTIMENTACAO");s.add("ALARME");s.add("BRIGADA")} // compartimentação vertical
  if(alt>23){s.add("DETECCAO");s.add("PLANO_EMERGENCIA")}
  if(alt>30){s.add("CHUVEIROS_AUTO")}                                    // sprinklers em altas
  if(alt>54){s.add("CHUVEIROS_AUTO");s.add("DETECCAO")}                  // edif. muito altas

  // === POR PAVIMENTOS ===
  if(pav>=3){s.add("ALARME");s.add("SEG_ESTRUTURAL")}
  if(pav>=4){s.add("COMPARTIMENTACAO")}

  // === GRUPO A — Residencial ===
  if(gr==="A"){
    // residências em geral têm exigências reduzidas, mas multifamiliar precisa de mais
    if(div==="A-2"||div==="A-3"){s.add("ALARME")}
  }

  // === GRUPO B — Hospedagem (hotéis precisam alarme + brigada) ===
  if(gr==="B"){
    s.add("ALARME");s.add("BRIGADA");s.add("PLANO_EMERGENCIA");
  }

  // === GRUPO C — Comercial ===
  if(gr==="C"){
    if(area>750){s.add("ALARME")}
    if(div==="C-2"||div==="C-3"){s.add("DETECCAO");s.add("BRIGADA");s.add("PLANO_EMERGENCIA")}
  }

  // === GRUPO D — Serviços profissionais (escritórios em geral) ===
  if(gr==="D"){
    if(area>750){s.add("ALARME")}
    if(div==="D-3"){s.add("DETECCAO")}  // oficinas
  }

  // === GRUPO E — Educacional ===
  if(gr==="E"){
    s.add("ALARME");s.add("BRIGADA");s.add("PLANO_EMERGENCIA");
    if(div==="E-5"||div==="E-6"){s.add("DETECCAO")}  // creches e PNE — proteção extra
  }

  // === GRUPO F — Reunião de Público ===
  if(gr==="F"){
    s.add("ALARME");s.add("BRIGADA");s.add("PLANO_EMERGENCIA");
    if(populacao>100){s.add("DETECCAO")}
    if(populacao>500||area>2500){s.add("HIDRANTES");s.add("DETECCAO");s.add("CHUVEIROS_AUTO")}
  }

  // === GRUPO G — Automotivo ===
  if(gr==="G"){
    s.add("ALARME");
    if(div==="G-3"){s.add("HIDRANTES");s.add("DETECCAO");s.add("BRIGADA");s.add("PLANO_EMERGENCIA")} // posto combustível
    if(div==="G-4"){s.add("DETECCAO")}  // oficinas
    if(sub){s.add("DETECCAO");s.add("VENTILACAO_MECANICA")}
  }

  // === GRUPO H — Saúde ===
  if(gr==="H"){
    s.add("ALARME");s.add("DETECCAO");s.add("BRIGADA");s.add("PLANO_EMERGENCIA");
    s.add("COMPARTIMENTACAO");
    if(area>750){s.add("HIDRANTES")}
    if(div==="H-2"||div==="H-3"){s.add("CHUVEIROS_AUTO")}  // hospitais — sprinklers
  }

  // === GRUPO I — Industrial (atenção especial!) ===
  if(gr==="I"){
    s.add("ALARME");s.add("BRIGADA");s.add("PLANO_EMERGENCIA");
    s.add("SEG_ESTRUTURAL");
    if(div==="I-2"){
      // médio potencial — exige detecção, compartimentação e proteção da carga elevada
      s.add("DETECCAO");
      s.add("COMPARTIMENTACAO");
      s.add("HIDRANTES");  // I-2 quase sempre exige sistema hidráulico independente da área
    }
    if(div==="I-3"){
      // alto potencial — todos os sistemas + chuveiros automáticos
      s.add("DETECCAO");
      s.add("COMPARTIMENTACAO");
      s.add("HIDRANTES");
      s.add("CHUVEIROS_AUTO");
      s.add("RESFRIAMENTO");  // resfriamento p/ inflamáveis
    }
  }

  // === GRUPO J — Depósitos ===
  if(gr==="J"){
    s.add("ALARME");s.add("BRIGADA");
    if(div==="J-2"){
      s.add("HIDRANTES");
      s.add("DETECCAO");
      s.add("COMPARTIMENTACAO");
      s.add("PLANO_EMERGENCIA");
      if(area>1500){s.add("CHUVEIROS_AUTO")}
    }
  }

  // === POR NÍVEL DE RISCO ===
  if(ri==="MODERADO"){
    s.add("ALARME");
    if(area>500){s.add("BRIGADA")}
  }
  if(ri==="ELEVADO"){
    s.add("ALARME");
    s.add("DETECCAO");
    s.add("BRIGADA");
    s.add("PLANO_EMERGENCIA");
    s.add("COMPARTIMENTACAO");
    if(area>500){s.add("HIDRANTES")}
  }

  // === SUBSOLO ===
  if(sub){
    s.add("DETECCAO");
    s.add("VENTILACAO_MECANICA");
    if(exigeHidrante||area>700){s.add("HIDRANTES")}
  }

  return[...s];
}
const SN={
  EXTINTORES:"Extintores (IT-21)",
  SAIDA_EMERGENCIA:"Saídas de emergência (IT-11)",
  ILUM_EMERGENCIA:"Iluminação emergência (IT-18)",
  SINALIZACAO:"Sinalização (IT-20)",
  ALARME:"Alarme (IT-19)",
  HIDRANTES:"Hidrantes (IT-22)",
  SEG_ESTRUTURAL:"Segurança estrutural (IT-08)",
  COMPARTIMENTACAO:"Compartimentação (IT-09)",
  DETECCAO:"Detecção (IT-19)",
  BRIGADA:"Brigada (IT-17)",
  PLANO_EMERGENCIA:"Plano de emergência (NBR 15219)",
  CHUVEIROS_AUTO:"Chuveiros automáticos (IT-23)",
  ACESSO_VIATURAS:"Acesso viaturas (IT-06)",
  CONTROLE_MATERIAIS:"Controle materiais acabamento (IT-10)",
  VENTILACAO_MECANICA:"Pressurização de escada (IT-13)",
  RESFRIAMENTO:"Resfriamento (NBR 17505)",
};

// ---- CÁLCULOS ----
const CalculosPage=({project:p})=>{
  const [tab,setTab]=useState("classificacao");
  if(!p)return <div className="flex flex-col items-center justify-center h-96 text-slate-400"><Icons.calculator size={48} className="mb-4 opacity-50"/><p className="text-lg font-medium">Selecione um projeto para calcular</p><p className="text-sm mt-1">Vá ao Dashboard ou crie um novo projeto</p></div>;
  const area=Number(p.area_construida)||0,alt=Number(p.altura_edificacao)||0,pav=Number(p.numero_pavimentos)||1;
  const cg=Number(p.carga_incendio)||(CARGA[p.divisao]||300),pop=Number(p.populacao)||(Math.ceil(area*(POP_M2[p.divisao]||.1)));
  const ri=risco(cg),sis=sistemas(area,alt,p.grupo,p.divisao,ri.n,p.possui_subsolo,pop,pav),areaPav=area/Math.max(pav,1),temH=sis.includes("HIDRANTES");

  // -------- EXTINTORES (IT-21/2017) --------
  // Tabela 1: capacidade extintora mínima e distância máxima de caminhamento
  // Não há "área de cobertura por extintor" na IT-21 — a IT-21 traz somente capacidade extintora mínima e distância máxima.
  // (IT-04 do CBMBA trata apenas de Símbolos Gráficos, não de extintores.)
  const IT21_TAB1={
    LEVE:{cap:"2-A / 20-B",dMax:25},
    MODERADO:{cap:"3-A / 40-B",dMax:20},
    ELEVADO:{cap:"4-A / 80-B",dMax:15},
  };
  const ext21=IT21_TAB1[ri.n];
  // Item 5.2.1.4: mínimo 2 unidades extintoras por pavimento (1 classe A + 1 classe BC)
  // Item 5.2.1.5: áreas < 50 m² admitem 1 unidade só (de pó ABC)
  const qExtMinPav=areaPav<50?1:2;
  const qExtT=qExtMinPav*pav;

  // -------- SAÍDAS DE EMERGÊNCIA (IT-11/2016 Anexo A Tabela 1) --------
  // Capacidade da UP em pessoas: [acessos, escadas/rampas, portas]
  const IT11_TAB1={
    "A-1":[60,45,100],"A-2":[60,45,100],"A-3":[60,45,100],
    "B-1":[60,45,100],"B-2":[60,45,100],
    "C-1":[100,75,100],"C-2":[100,75,100],"C-3":[100,75,100],
    "D-1":[100,75,100],"D-2":[100,75,100],"D-3":[100,75,100],"D-4":[100,75,100],
    "E-1":[100,75,100],"E-2":[100,75,100],"E-3":[100,75,100],"E-4":[100,75,100],
    "E-5":[30,22,30],"E-6":[30,22,30],
    "F-1":[100,75,100],"F-2":[100,75,100],"F-3":[100,75,100],"F-4":[100,75,100],
    "F-5":[100,75,100],"F-6":[100,75,100],"F-7":[100,75,100],"F-8":[100,75,100],
    "F-9":[100,75,100],"F-10":[100,75,100],
    "G-1":[100,60,100],"G-2":[100,60,100],"G-3":[100,60,100],"G-4":[100,60,100],"G-5":[100,60,100],
    "H-1":[60,45,100],"H-2":[30,22,30],"H-3":[60,45,100],"H-4":[60,45,100],"H-5":[60,45,100],"H-6":[60,45,100],
    "I-1":[100,60,100],"I-2":[100,60,100],"I-3":[100,60,100],
    "J-1":[100,60,100],"J-2":[100,60,100],"J-3":[100,60,100],"J-4":[100,60,100],
  };
  const cap11=IT11_TAB1[p.divisao]||[100,60,100];
  // Para pavimento térreo usa-se acessos/descargas; multi-pavimento usa escadas
  const capE=pav>1?cap11[1]:cap11[0];
  const nUp=Math.max(Math.ceil(pop/capE),2),lCalc=nUp*.55;
  // Largura mínima por grupo (IT-11 / NBR 9077 - 1,10 m geral, 1,65 m para reunião pública e ensino)
  const lMin={"A":1.1,"B":1.1,"C":1.1,"D":1.1,"E":1.65,"F":1.65,"G":1.1,"H":1.65,"I":1.1,"J":1.1}[p.grupo]||1.1;
  const nUpF=Math.ceil(Math.max(lCalc,lMin)/.55),lFin=(nUpF*.55).toFixed(2);
  const nSaidas=pop<=50?1:pop<=200?2:pop<=500?3:4;
  const tipoEsc=alt<=6?"Comum":alt<=12?"Enclausurada Protegida (EP)":"Enclausurada à Prova de Fumaça (PF)";

  // -------- HIDRANTES (IT-22/2016) --------
  // A IT-22 classifica em 5 tipos de sistema POR OCUPAÇÃO (Tabela 3), não por risco.
  // Valores da Tabela 2 (vazão por hidrante e nº simultâneos) e Tabela 3 (RTI por área):
  const IT22_TIPOS={
    1:{nome:"Tipo 1 — Mangotinho",mang:"25 mm (1\")",vazaoH:80,nSim:1,obs:"Sistema mais simples; para edificações de menor porte/risco"},
    2:{nome:"Tipo 2 — Hidrante simples",mang:"40 mm (1½\")",vazaoH:100,nSim:1,obs:"Hidrante com 1 mangueira"},
    3:{nome:"Tipo 3 — Hidrante duplo simples",mang:"40 mm (1½\")",vazaoH:100,nSim:2,obs:"2 hidrantes simultâneos"},
    4:{nome:"Tipo 4 — Hidrante 65 mm",mang:"65 mm (2½\")",vazaoH:300,nSim:2,obs:"Mangueira 65 mm, esguicho regulável"},
    5:{nome:"Tipo 5 — Hidrante 65 mm reforçado",mang:"65 mm (2½\")",vazaoH:600,nSim:2,obs:"Para grupos de maior risco"},
  };
  // Sugestão preliminar baseada em risco — REAL deve ser pela Tabela 3 da IT-22 (por ocupação)
  const tipoSugerido=ri.n==="LEVE"?2:ri.n==="MODERADO"?3:ri.n==="ELEVADO"?4:2;
  const hSys=IT22_TIPOS[tipoSugerido];
  const vazH=hSys.vazaoH,nSim=hSys.nSim,vazT=vazH*nSim;
  const presMin=tipoSugerido<=2?10:tipoSugerido<=3?15:25; // mca, valores conforme IT-22

  // Reserva técnica: tempo mínimo 60 min × vazão (item 5.9). Valor mínimo absoluto pela Tabela 3.
  const volC=vazT*60; // litros (vazão L/min × 60 min)
  const volMinTab3={1:5000,2:8000,3:16000,4:32000,5:40000}[tipoSugerido];
  const volAd=Math.max(volC,volMinTab3);

  // Bomba: Hman = altura + perdas + pressão na válvula mais desfavorável + 5m segurança (aproximado)
  const hm=alt+presMin+5,vm3s=vazT/60000,pH=(1000*9.81*vm3s*hm)/735.5,pE=pH/.65,pM=pE*1.25;
  const cvs=[.5,.75,1,1.5,2,3,5,7.5,10,15,20,25,30,40,50,60,75,100],pCom=cvs.find(c=>c>=pM)||Math.ceil(pM);

  const tabs=[{id:"classificacao",label:"Classificação",Ic:Icons.shield},{id:"saida",label:"Saída Emergência",Ic:Icons.arrowRight},{id:"extintores",label:"Extintores",Ic:Icons.flame},...(temH?[{id:"hidrantes",label:"Hidrantes",Ic:Icons.droplets},{id:"reserva",label:"Reserva Técnica",Ic:Icons.database},{id:"bomba",label:"Bomba",Ic:Icons.gauge}]:[])];

  return(
    <div className="space-y-6 fade-in">
      <div><h1 className="text-2xl font-bold text-slate-800">{p.nome}</h1><p className="text-slate-500 text-sm mt-1">Dimensionamento completo — ITs CBMBA</p></div>
      <div className="flex gap-1 overflow-x-auto pb-1">{tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} className={`flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition-all ${tab===t.id?"bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-sm":"bg-slate-100 text-slate-600 hover:bg-slate-200"}`}><t.Ic size={14}/>{t.label}</button>))}</div>
      <Card className="p-6">
        {tab==="classificacao"&&(<div className="space-y-6">
          <h2 className="text-lg font-bold text-slate-800">Classificação da Edificação</h2><p className="text-xs text-slate-400 font-medium uppercase tracking-wider">Norma: IT-01 CBMBA</p>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div className="p-4 bg-slate-50 rounded-xl"><p className="text-xs text-slate-500">Grupo/Divisão</p><p className="font-bold text-slate-800">{p.divisao}</p><p className="text-xs text-slate-500 mt-1">{GRUPOS[p.grupo]?.nome}</p></div>
            <div className="p-4 bg-slate-50 rounded-xl"><p className="text-xs text-slate-500">Nível de Risco</p><p className="font-bold text-slate-800">{ri.d}</p><p className="text-xs text-slate-500 mt-1">Carga: {cg} MJ/m²</p></div>
            <div className="p-4 bg-slate-50 rounded-xl"><p className="text-xs text-slate-500">Tipo de Processo</p>{(() => {const proc=definirProcesso(area,alt,pav,p.grupo,p.divisao,pop,ri.n,temH);return(<><p className="font-bold text-slate-800">{proc.tipo==="PTS"?"PTS":"Projeto Técnico"}</p><p className="text-[10px] text-slate-500 mt-1 leading-tight">{proc.descricao}</p></>)})()}</div>
          </div>
          <div><p className="text-sm font-semibold text-slate-700 mb-3">Sistemas Exigidos ({sis.length})</p><div className="grid grid-cols-1 sm:grid-cols-2 gap-2">{sis.map(s=>(<div key={s} className="flex items-center gap-2 p-3 bg-orange-50/60 rounded-lg border border-orange-100"><Icons.check size={14} className="text-orange-500 flex-shrink-0"/><span className="text-sm text-slate-700">{SN[s]||s}</span></div>))}</div></div>
        </div>)}
        {tab==="saida"&&(<div className="space-y-4"><h2 className="text-lg font-bold text-slate-800">Saídas de Emergência</h2><p className="text-xs text-slate-400 font-medium uppercase tracking-wider">Norma: IT-11 CBMBA</p>
          <CalcStep n={1} title="Número mínimo de saídas" formula={`População: ${pop} → Tabela IT-11`} result={nSaidas} unit="saída(s)"/>
          <CalcStep n={2} title="Unidades de passagem" formula={`N = P/C = ${pop}/${capE} = ${(pop/capE).toFixed(2)} → ${nUp} UP (mín 2)`} result={nUp} unit="UP"/>
          <CalcStep n={3} title="Largura calculada" formula={`L = ${nUp} UP × 0,55 m = ${lCalc.toFixed(2)} m`} result={lCalc.toFixed(2)} unit="m"/>
          <CalcStep n={4} title="Largura mínima normativa" formula={`Grupo ${p.grupo}: ${lMin} m`} result={lMin} unit="m"/>
          <CalcStep n={5} title="Largura adotada" formula={`Maior entre ${lCalc.toFixed(2)} e ${lMin} → ${nUpF} UP × 0,55`} result={lFin} unit="m"/>
          {pav>1&&<CalcStep n={6} title="Tipo de escada" formula={`Altura ${alt} m → IT-11`} result={tipoEsc}/>}
        </div>)}
        {tab==="extintores"&&(<div className="space-y-4"><h2 className="text-lg font-bold text-slate-800">Extintores de Incêndio</h2><p className="text-xs text-slate-400 font-medium uppercase tracking-wider">Norma: IT-21/2017 CBMBA</p>
          <CalcStep n={1} title="Classe de risco (IT-21 Tabela 1)" formula={`Carga ${cg} MJ/m² → ${ri.d}`} result={ri.n}/>
          <CalcStep n={2} title="Capacidade extintora mínima" formula="IT-21/2017 Tabela 1" result={ext21.cap} obs="Por unidade extintora portátil"/>
          <CalcStep n={3} title="Distância máxima de caminhamento" formula="IT-21/2017 Tabela 1" result={ext21.dMax} unit="m" obs="A partir de qualquer ponto da edificação"/>
          <CalcStep n={4} title="Mínimo por pavimento (item 5.2.1.4 / 5.2.1.5)" formula={areaPav<50?`Área ${areaPav.toFixed(0)} m² < 50 m² → 1 unidade de pó ABC`:"Mínimo 2 unidades (1 classe A + 1 classe BC, ou 2 ABC)"} result={qExtMinPav} unit="unid./pav"/>
          <CalcStep n={5} title="Quantidade mínima total" formula={`${qExtMinPav} × ${pav} pavimento(s)`} result={qExtT} unit="extintores"/>
          <CalcStep n={6} title="Extintor próximo às entradas/escadas (item 5.2.1.12)" formula="Não mais de 5 m da entrada principal e das escadas em demais pavimentos" result="Obrigatório"/>
          <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800">
            <b>Observação técnica:</b> A IT-21/2017 NÃO traz tabela de área de cobertura por extintor. O critério normativo é distância máxima de caminhamento até o extintor mais próximo. A distribuição final deve ser detalhada em planta, respeitando os itens 5.2.1 (instalação) e 5.2.1.10 (locais de risco específico: casas de máquinas, transformadores, geradores etc).
          </div>
        </div>)}
        {tab==="hidrantes"&&temH&&(<div className="space-y-4"><h2 className="text-lg font-bold text-slate-800">Sistema de Hidrantes</h2><p className="text-xs text-slate-400 font-medium uppercase tracking-wider">Norma: IT-22/2016 CBMBA</p>
          <CalcStep n={1} title="Tipo de sistema sugerido" formula={`${hSys.nome} (verificar IT-22 Tabela 3 por ocupação ${p.divisao})`} result={`Tipo ${tipoSugerido}`}/>
          <CalcStep n={2} title="Mangueira / esguicho" formula="IT-22 Tabela 2" result={hSys.mang}/>
          <CalcStep n={3} title="Vazão por hidrante" formula="IT-22 Tabela 2" result={vazH} unit="L/min"/>
          <CalcStep n={4} title="Hidrantes em uso simultâneo" formula={`Tipo ${tipoSugerido}: ${nSim} jato(s) mais desfavorável(eis)`} result={nSim} unit="hidrantes"/>
          <CalcStep n={5} title="Vazão total mínima" formula={`${vazH} × ${nSim}`} result={vazT} unit="L/min"/>
          <CalcStep n={6} title="Pressão mínima (mais desfavorável)" formula="IT-22 item 5.6.1" result={presMin} unit="m.c.a."/>
          <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800">
            <b>Observação técnica:</b> A escolha do tipo de sistema (1 a 5) é definida pela <b>IT-22 Tabela 3</b> em função da ocupação ({p.divisao}) e da área construída, não pelo risco/carga. O valor sugerido aqui é uma estimativa que deve ser confirmada consultando a Tabela 3 diretamente. {hSys.obs}.
          </div>
        </div>)}
        {tab==="reserva"&&temH&&(<div className="space-y-4"><h2 className="text-lg font-bold text-slate-800">Reserva Técnica de Incêndio</h2><p className="text-xs text-slate-400 font-medium uppercase tracking-wider">Norma: IT-17 / IT-22 CBMBA</p>
          <CalcStep n={1} title="Volume calculado" formula={`V = ${vazT} L/min × 60 min`} result={volC.toLocaleString()} unit="litros"/>
          <CalcStep n={2} title="Volume mínimo normativo (IT-22 Tabela 3)" formula={`${hSys.nome}: ${volMinTab3.toLocaleString()} L`} result={volMinTab3.toLocaleString()} unit="litros"/>
          <CalcStep n={3} title="Volume adotado" formula={`Maior entre ${volC.toLocaleString()} e ${volMinTab3.toLocaleString()}`} result={volAd.toLocaleString()} unit={`litros (${(volAd/1000).toFixed(1)} m³)`}/>
        </div>)}
        {tab==="bomba"&&temH&&(<div className="space-y-4"><h2 className="text-lg font-bold text-slate-800">Bomba de Incêndio</h2><p className="text-xs text-slate-400 font-medium uppercase tracking-wider">Norma: IT-22/2016 CBMBA — Anexo C</p>
          <CalcStep n={1} title="Altura manométrica total (estimativa)" formula={`Hm ≈ ${alt} + ${presMin} + 5 (perdas)`} result={hm} unit="m.c.a."/>
          <CalcStep n={2} title="Potência hidráulica" formula="P = ρ×g×Q×Hm / 735,5" result={pH.toFixed(2)} unit="CV"/>
          <CalcStep n={3} title="Potência eixo (η=65%)" formula={`${pH.toFixed(2)} / 0,65`} result={pE.toFixed(2)} unit="CV"/>
          <CalcStep n={4} title="Potência motor (FS=1,25)" formula={`${pE.toFixed(2)} × 1,25 → Comercial`} result={pCom} unit="CV"/>
          <CalcStep n={5} title="Bomba jockey (uso típico)" formula="10% vazão, 115% pressão" result={`${(vazT*.1).toFixed(0)} L/min a ${(hm*1.15).toFixed(1)} m.c.a.`}/>
          <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800">
            <b>Observação:</b> A perda de carga real depende do traçado da tubulação (Hazen-Williams). Para cálculo definitivo, use o módulo <b>Hidrantes Isométrico</b> que aplica a fórmula completa para o caminho crítico.
          </div>
        </div>)}
      </Card>
    </div>
  );
};

// ---- LOGIN ----
const LoginPage=({onLogin})=>{
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [nome,setNome]=useState("");
  const [mode,setMode]=useState("login");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [msg,setMsg]=useState("");

  const handleSubmit=async()=>{
    setError("");setMsg("");
    if(!email||!pass){setError("Preencha e-mail e senha.");return;}
    setLoading(true);
    try{
      if(mode==="login"){
        const{data,error:err}=await supabase.auth.signInWithPassword({email,password:pass});
        if(err)throw err;
        onLogin(data.session);
      }else{
        if(!nome){setError("Informe seu nome completo.");setLoading(false);return;}
        const{data,error:err}=await supabase.auth.signUp({
          email,password:pass,
          options:{data:{full_name:nome}}
        });
        if(err)throw err;
        if(data.session){onLogin(data.session);}
        else{setMsg("Cadastro realizado! Verifique seu e-mail para confirmar a conta.");setMode("login");}
      }
    }catch(e){
      const msgs={
        "Invalid login credentials":"E-mail ou senha incorretos.",
        "User already registered":"Este e-mail já está cadastrado. Faça login.",
        "Password should be at least 6 characters":"A senha deve ter pelo menos 6 caracteres.",
        "Email not confirmed":"Confirme seu e-mail antes de entrar."
      };
      setError(msgs[e.message]||e.message);
    }finally{setLoading(false);}
  };

  const handleKeyDown=(e)=>{if(e.key==="Enter")handleSubmit();};

  return(
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
      <div className="absolute inset-0 overflow-hidden pointer-events-none">
        <div className="absolute -top-40 -right-40 w-96 h-96 bg-orange-500/10 rounded-full blur-3xl"/>
        <div className="absolute -bottom-40 -left-40 w-96 h-96 bg-red-500/10 rounded-full blur-3xl"/>
      </div>
      <div className="relative bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
        <div className="flex items-center gap-3 mb-8 justify-center">
          <div className="w-11 h-11 rounded-xl bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center shadow-lg shadow-orange-500/30"><Icons.flame size={22} className="text-white"/></div>
          <div><h1 className="text-xl font-bold text-slate-800 tracking-tight">PPCI SaaS</h1><p className="text-[10px] text-slate-400 uppercase tracking-[0.2em]">Corpo de Bombeiros — Bahia</p></div>
        </div>
        <h2 className="text-lg font-bold text-slate-800 text-center mb-6">{mode==="login"?"Entrar na sua conta":"Criar sua conta grátis"}</h2>
        {error&&<div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{error}</div>}
        {msg&&<div className="mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700">{msg}</div>}
        <div className="space-y-4" onKeyDown={handleKeyDown}>
          {mode==="signup"&&<Input label="Nome completo" placeholder="Seu nome e sobrenome" value={nome} onChange={e=>setNome(e.target.value)}/>}
          <Input label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
          <Input label="Senha" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Mínimo 6 caracteres"/>
          <Btn className="w-full" onClick={handleSubmit} disabled={loading}>
            {loading?<><span className="pulse-dot inline-block w-2 h-2 rounded-full bg-white mr-2"/>Aguarde...</>:mode==="login"?"Entrar":"Criar conta"}
          </Btn>
        </div>
        {mode==="login"&&(
          <p className="text-center text-xs text-slate-400 mt-3">
            <button className="text-orange-500 hover:underline" onClick={async()=>{
              if(!email){setError("Informe o e-mail para redefinir a senha.");return;}
              const{error:err}=await supabase.auth.resetPasswordForEmail(email);
              if(!err)setMsg("Link de redefinição enviado para "+email);
              else setError(err.message);
            }}>Esqueci minha senha</button>
          </p>
        )}
        <p className="text-center text-sm text-slate-500 mt-4">
          {mode==="login"?"Não tem conta? ":"Já tem conta? "}
          <button className="text-orange-500 font-semibold hover:underline" onClick={()=>{setMode(mode==="login"?"signup":"login");setError("");setMsg("");}}>
            {mode==="login"?"Cadastre-se grátis":"Fazer login"}
          </button>
        </p>
        <p className="text-center text-[10px] text-slate-400 mt-4">Plano gratuito: até 3 projetos · Sem cartão necessário</p>
      </div>
    </div>
  );
};

const OrigemDado=({tipo})=>{
  const cfg={
    extraido:{color:"bg-blue-50 text-blue-700",label:"IA extraiu",icon:"🤖"},
    informado:{color:"bg-emerald-50 text-emerald-700",label:"Usuário informou",icon:"👤"},
    estimado:{color:"bg-amber-50 text-amber-700",label:"Estimado",icon:"📊"},
    pendente:{color:"bg-red-50 text-red-700",label:"Pendente",icon:"❓"},
  };
  const c=cfg[tipo]||cfg.pendente;
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-medium ${c.color}`}>{c.icon} {c.label}</span>;
};

const AnalisePlantaPage=({setPage,setProjects,setSelProj})=>{
  const [files,setFiles]=useState([]);
  const [analyzing,setAnalyzing]=useState(false);
  const [result,setResult]=useState(null);
  const [stage,setStage]=useState(0);
  const [stageText,setStageText]=useState("");
  const [editing,setEditing]=useState({});
  // URL do backend embutida — não precisa configurar na interface
  const BACKEND_URL_EMBUTIDA="https://ppci-saas01-production.up.railway.app";
  const [backendUrl,setBackendUrl]=useState(()=>{try{return localStorage.getItem("ppci_backend_url")||BACKEND_URL_EMBUTIDA}catch(e){return BACKEND_URL_EMBUTIDA}});
  const [showSettings,setShowSettings]=useState(false);
  const [backendStatus,setBackendStatus]=useState(null);
  const [errorMsg,setErrorMsg]=useState("");

  const saveBackendUrl=(url)=>{
    setBackendUrl(url);
    try{localStorage.setItem("ppci_backend_url",url)}catch(e){}
  };

  // Verifica status do backend quando URL mudar
  useEffect(()=>{
    if(!backendUrl){setBackendStatus(null);return}
    fetch(backendUrl.replace(/\/$/,"")+"/api/ai/status").then(r=>r.json()).then(d=>setBackendStatus(d)).catch(()=>setBackendStatus({error:"Backend inacessível"}));
  },[backendUrl]);

  const stages=[
    "Enviando arquivo para o servidor...",
    "IA analisando documento técnico...",
    "Extraindo dados e identificando elementos...",
    "Verificando sistemas PPCI representados...",
    "Aplicando regras CBMBA e gerando enquadramento...",
    "Compilando relatório final...",
  ];

  const handleFile=(e)=>{
    const fs=Array.from(e.target.files||[]);
    setFiles(prev=>[...prev,...fs.map(f=>({name:f.name,size:f.size,ext:(f.name.split(".").pop()||"").toLowerCase(),id:Date.now()+Math.random(),raw:f}))]);
  };
  const handleDrop=(e)=>{e.preventDefault();const fs=Array.from(e.dataTransfer.files||[]);setFiles(prev=>[...prev,...fs.map(f=>({name:f.name,size:f.size,ext:(f.name.split(".").pop()||"").toLowerCase(),id:Date.now()+Math.random(),raw:f}))])};
  const removeFile=(id)=>setFiles(prev=>prev.filter(f=>f.id!==id));

  // === ANÁLISE COM IA REAL (backend conectado) ===
  const analyzeWithBackend=async(file)=>{
    const formData=new FormData();
    formData.append("file",file.raw);
    const res=await fetch(backendUrl.replace(/\/$/,"")+"/api/ai/analyze-plant",{method:"POST",body:formData});
    if(!res.ok){const err=await res.text();throw new Error(`Backend retornou ${res.status}: ${err}`)}
    return await res.json();
  };

  // === ANÁLISE MOCK (fallback quando backend não está configurado) ===
  const generateMock=()=>{
    const hasPdf=files.some(f=>f.ext==="pdf");
    const hasDwg=files.some(f=>["dwg","dxf"].includes(f.ext));
    const hasBim=files.some(f=>["rvt","ifc"].includes(f.ext));
    const confidence=hasBim?"alta":hasDwg?"alta":hasPdf?"media":"baixa";
    return{
      _mock:true,
      confianca_geral:confidence,
      encontrados:[
        {campo:"Área construída",valor:"4.235 m²",confianca:hasBim?"alta":"media",origem:"extraido",fonte:"Quadro de áreas - prancha 01 (DEMO)"},
        {campo:"Número de pavimentos",valor:"8 pavimentos",confianca:"alta",origem:"extraido",fonte:"Cortes AA e BB (DEMO)"},
        {campo:"Altura da edificação",valor:"24,3 m",confianca:hasBim?"alta":"media",origem:"extraido",fonte:"Corte longitudinal (DEMO)"},
        {campo:"Uso da edificação",valor:"Comercial/Escritórios",confianca:"media",origem:"extraido",fonte:"Memorial arquitetônico (DEMO)"},
        {campo:"Número de escadas",valor:"2 escadas (enclausuradas)",confianca:"alta",origem:"extraido",fonte:"Planta pav. tipo (DEMO)"},
        {campo:"Saídas de emergência",valor:"2 saídas (térreo)",confianca:"media",origem:"extraido",fonte:"Planta térreo (DEMO)"},
        {campo:"Corredores principais",valor:"Largura 1,80 m",confianca:"media",origem:"extraido",fonte:"Plantas pav. tipo (DEMO)"},
        {campo:"Distância máxima percurso",valor:"~22 m (estimado)",confianca:"baixa",origem:"estimado",fonte:"Análise visual (DEMO)"},
      ],
      sistemas_identificados:[
        {sistema:"Extintores indicados em planta",encontrado:true,quantidade:"~24 unidades",confianca:"media"},
        {sistema:"Hidrantes representados",encontrado:hasDwg||hasBim,quantidade:hasBim?"8 hidrantes":"Posições aparentes",confianca:hasBim?"alta":"baixa"},
        {sistema:"Casa de bombas",encontrado:hasBim,quantidade:hasBim?"Identificada no subsolo":"Não identificada",confianca:hasBim?"alta":"baixa"},
        {sistema:"Reservatório técnico",encontrado:hasBim,quantidade:hasBim?"RTI cobertura - 24 m³":"Não claramente identificado",confianca:hasBim?"alta":"pendente"},
        {sistema:"Sinalização de emergência",encontrado:false,quantidade:"Não detectado",confianca:"pendente"},
        {sistema:"Iluminação de emergência",encontrado:false,quantidade:"Não detectado",confianca:"pendente"},
        {sistema:"Sistema de alarme/detecção",encontrado:hasBim,quantidade:hasBim?"Centrais identificadas":"Não detectado",confianca:hasBim?"media":"pendente"},
      ],
      pendencias:[
        "⚠ MODO DEMO: configure o backend para análise real com IA da Anthropic",
        "Confirmar carga de incêndio específica do uso comercial",
        "Verificar população de cálculo por pavimento",
        "Validar largura total das escadas conforme IT-11",
        "Confirmar tipo de risco predominante",
        "Verificar existência de subsolo e número de pavimentos abaixo do solo",
      ],
      inconsistencias:[
        {tipo:"info",texto:"Esta é uma análise SIMULADA (modo demo). Para análise real com IA, configure o backend nas configurações."},
        {tipo:"warn",texto:"Distância de caminhamento próxima ao limite IT-11 (estimado 22m)"},
      ],
      sugestao_enquadramento:{
        grupo:"D",divisao:"D-1",descricao:"Local para prestação de serviço profissional",
        risco:"MODERADO",processo:"Projeto Técnico Completo",
        justificativa:"Área construída > 750 m² e altura > 12 m, conforme IT-01 CBMBA",
        its_aplicaveis:["IT-01","IT-21","IT-08","IT-09","IT-11","IT-22","IT-18","IT-19","IT-20"],
      },
    };
  };

  const startAnalysis=async()=>{
    if(!files.length)return;
    setErrorMsg("");
    setAnalyzing(true);setStage(0);setResult(null);

    // Modo MOCK (sem backend configurado)
    if(!backendUrl||!backendStatus?.ai_enabled){
      stages.forEach((txt,i)=>{setTimeout(()=>{setStage(i+1);setStageText(txt)},700*(i+1))});
      setTimeout(()=>{setAnalyzing(false);setResult(generateMock())},700*(stages.length+1));
      return;
    }

    // Modo REAL (backend configurado e com chave de IA)
    try{
      // Anima as etapas enquanto a IA processa
      const interval=setInterval(()=>{setStage(s=>s<stages.length-1?s+1:s)},2500);
      const firstFile=files[0]; // por enquanto, analisa o primeiro arquivo
      const r=await analyzeWithBackend(firstFile);
      clearInterval(interval);
      setStage(stages.length);
      setTimeout(()=>{setAnalyzing(false);setResult(r)},500);
    }catch(e){
      setAnalyzing(false);
      setErrorMsg(`Erro ao analisar: ${e.message}. Verifique se o backend está acessível e a chave de API está configurada.`);
    }
  };

  const formatSize=(b)=>b<1024?b+" B":b<1024*1024?(b/1024).toFixed(1)+" KB":(b/1024/1024).toFixed(1)+" MB";

  return(
    <div className="space-y-6 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icons.scan size={24} className="text-orange-500"/> Análise de Planta com IA</h1><p className="text-slate-500 text-sm mt-1">Upload técnico — PDF, PNG, JPG (IA real); DWG/DXF/RVT/IFC (orientação)</p></div>
        {/* Indicador discreto de status — sem painel de configuração */}
        <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-50 border border-slate-200">
          <div className={`w-2 h-2 rounded-full ${backendStatus?.ai_enabled?"bg-emerald-500":backendStatus?.error?"bg-red-500":"bg-amber-500"} ${!backendStatus?"pulse-dot":""}`}/>
          <span className="text-xs font-medium text-slate-600">{backendStatus?.ai_enabled?"IA conectada":backendStatus?.error?"IA offline":"Conectando..."}</span>
        </div>
      </div>

      {/* Aviso técnico */}
      <Card className="p-4 border-amber-200 bg-amber-50/50">
        <div className="flex gap-3"><Icons.alert size={18} className="text-amber-500 flex-shrink-0 mt-0.5"/><div><p className="text-sm font-semibold text-amber-900">Análise preliminar orientativa</p><p className="text-xs text-amber-700 mt-1">A IA fornece extração automática e sugestões, mas <strong>não substitui a análise técnica do profissional habilitado</strong>. Todos os dados devem ser confirmados, e a responsabilidade técnica final é do responsável pelo projeto.</p></div></div>
      </Card>

      {/* Mensagem de erro */}
      {errorMsg&&(
        <Card className="p-4 border-red-200 bg-red-50">
          <div className="flex gap-3"><Icons.alert size={18} className="text-red-500 flex-shrink-0 mt-0.5"/><div className="flex-1"><p className="text-sm font-semibold text-red-900">Erro na análise</p><p className="text-xs text-red-700 mt-1">{errorMsg}</p></div><button onClick={()=>setErrorMsg("")} className="text-red-400 hover:text-red-600"><Icons.x size={16}/></button></div>
        </Card>
      )}

      {/* Upload area */}
      {!result&&!analyzing&&(
        <Card className="p-6">
          <div onDrop={handleDrop} onDragOver={e=>e.preventDefault()} className="border-2 border-dashed border-slate-300 rounded-xl p-10 text-center hover:border-orange-300 hover:bg-orange-50/30 transition-colors">
            <Icons.upload size={40} className="mx-auto text-slate-400 mb-3"/>
            <p className="text-sm font-medium text-slate-700">Arraste os arquivos aqui ou</p>
            <label className="inline-block mt-3 cursor-pointer">
              <input type="file" multiple accept=".pdf,.dwg,.dxf,.rvt,.ifc,.png,.jpg,.jpeg" onChange={handleFile} className="hidden"/>
              <span className="inline-flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-orange-500 to-red-500 text-white text-sm font-semibold rounded-lg hover:from-orange-600 hover:to-red-600"><Icons.upload size={14}/> Selecionar arquivos</span>
            </label>
            <p className="text-xs text-slate-500 mt-3">Formatos aceitos: PDF, DWG, DXF, RVT, IFC, PNG, JPG</p>
          </div>

          {files.length>0&&(
            <div className="mt-5 space-y-2">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">{files.length} arquivo(s) selecionado(s)</p>
              {files.map(f=>{const t=TIPOS_ARQUIVO[f.ext]||{label:f.ext.toUpperCase(),color:"bg-slate-100 text-slate-700",icon:Icons.fileText};const Ic=t.icon;return(
                <div key={f.id} className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                  <div className={`w-9 h-9 rounded-lg flex items-center justify-center ${t.color}`}><Ic size={16}/></div>
                  <div className="flex-1 min-w-0"><p className="text-sm font-medium text-slate-800 truncate">{f.name}</p><p className="text-xs text-slate-500">{formatSize(f.size)} • {t.label}</p></div>
                  <button onClick={()=>removeFile(f.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-500 transition-colors"><Icons.trash size={15}/></button>
                </div>
              )})}
              <div className="pt-3 flex justify-end"><Btn onClick={startAnalysis}><Icons.sparkles size={14}/> Analisar com IA</Btn></div>
            </div>
          )}
        </Card>
      )}

      {/* Analyzing animation */}
      {analyzing&&(
        <Card className="p-10">
          <div className="text-center max-w-md mx-auto">
            <div className="w-20 h-20 mx-auto mb-5 rounded-full bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center shadow-xl shadow-orange-500/30 pulse-dot"><Icons.sparkles size={36} className="text-white"/></div>
            <h3 className="text-lg font-bold text-slate-800 mb-2">Analisando projeto com IA</h3>
            <p className="text-sm text-slate-500 mb-6">Processando {files.length} arquivo(s)... Isso pode levar alguns instantes.</p>
            <div className="space-y-2">{stages.map((s,i)=>(
              <div key={i} className={`flex items-center gap-3 p-2.5 rounded-lg text-left transition-all ${i<stage?"bg-emerald-50":i===stage?"bg-orange-50":"bg-slate-50 opacity-50"}`}>
                <div className={`w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 ${i<stage?"bg-emerald-500":i===stage?"bg-orange-500":"bg-slate-300"}`}>{i<stage?<Icons.check size={12} className="text-white"/>:i===stage?<div className="w-2 h-2 bg-white rounded-full pulse-dot"/>:<span className="text-[10px] text-white font-bold">{i+1}</span>}</div>
                <span className={`text-xs ${i<=stage?"text-slate-700":"text-slate-400"}`}>{s}</span>
              </div>
            ))}</div>
          </div>
        </Card>
      )}

      {/* Result */}
      {result&&(<>
        <Card className="p-6">
          <div className="flex items-center justify-between mb-5"><div><h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Icons.sparkles size={20} className="text-orange-500"/> Relatório de Análise</h2><p className="text-xs text-slate-500 mt-1">Análise gerada por IA — todos os dados precisam de confirmação técnica</p></div><div className="flex items-center gap-2"><Confidence level={result.confianca_geral}/></div></div>

          {/* Sugestão de enquadramento */}
          <div className="mb-6 p-5 rounded-xl bg-gradient-to-br from-orange-50 to-red-50/50 border border-orange-200">
            <p className="text-xs font-semibold text-orange-700 uppercase tracking-wider mb-3">Sugestão de Enquadramento (orientativa)</p>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <div><p className="text-[10px] text-slate-500 uppercase">Grupo/Divisão</p><p className="font-bold text-slate-800">{result.sugestao_enquadramento.grupo}-{result.sugestao_enquadramento.divisao.split("-")[1]}</p></div>
              <div><p className="text-[10px] text-slate-500 uppercase">Risco</p><Badge variant={result.sugestao_enquadramento.risco}>{result.sugestao_enquadramento.risco}</Badge></div>
              <div><p className="text-[10px] text-slate-500 uppercase">Processo</p><p className="font-bold text-slate-800 text-sm">{result.sugestao_enquadramento.processo}</p></div>
              <div><p className="text-[10px] text-slate-500 uppercase">ITs aplicáveis</p><p className="font-bold text-slate-800 text-sm">{result.sugestao_enquadramento.its_aplicaveis.length} ITs</p></div>
            </div>
            <p className="text-xs text-slate-600 mt-3 italic">{result.sugestao_enquadramento.justificativa}</p>
            <div className="flex flex-wrap gap-1.5 mt-3">{result.sugestao_enquadramento.its_aplicaveis.map(it=><Badge key={it}>{it}</Badge>)}</div>
          </div>

          {/* Dados encontrados */}
          <div className="mb-6">
            <p className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><Icons.check size={16} className="text-emerald-500"/> Dados extraídos pela IA</p>
            <div className="space-y-2">{result.encontrados.map((d,i)=>(
              <div key={i} className="p-3 bg-slate-50 rounded-lg border border-slate-200">
                <div className="flex items-start justify-between gap-3 flex-wrap">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap"><p className="text-sm font-semibold text-slate-800">{d.campo}:</p>{editing[i]?<input defaultValue={d.valor} onBlur={e=>{d.valor=e.target.value;d.origem="informado";setEditing(p=>({...p,[i]:false}))}} className="text-sm font-bold text-orange-600 bg-white border border-orange-300 rounded px-2 py-0.5 outline-none focus:ring-1 focus:ring-orange-400" autoFocus/>:<p className="text-sm font-bold text-orange-600">{d.valor}</p>}</div>
                    <p className="text-[11px] text-slate-500 mt-1">{d.fonte}</p>
                  </div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <Confidence level={d.confianca}/>
                    <OrigemDado tipo={d.origem}/>
                    <button onClick={()=>setEditing(p=>({...p,[i]:!p[i]}))} className="p-1.5 rounded hover:bg-orange-50 text-slate-400 hover:text-orange-500"><Icons.edit size={13}/></button>
                  </div>
                </div>
              </div>
            ))}</div>
          </div>

          {/* Sistemas identificados */}
          <div className="mb-6">
            <p className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><Icons.shield size={16} className="text-blue-500"/> Sistemas PPCI identificados na planta</p>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="border-b border-slate-200">{["Sistema","Encontrado","Identificação","Confiança"].map(h=><th key={h} className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-3 py-2">{h}</th>)}</tr></thead>
                <tbody>{result.sistemas_identificados.map((s,i)=>(
                  <tr key={i} className="border-b border-slate-100">
                    <td className="px-3 py-2.5 text-slate-700">{s.sistema}</td>
                    <td className="px-3 py-2.5">{s.encontrado?<span className="text-emerald-600 text-xs font-semibold flex items-center gap-1"><Icons.check size={12}/> Sim</span>:<span className="text-red-500 text-xs font-semibold">Não</span>}</td>
                    <td className="px-3 py-2.5 text-slate-600 text-xs">{s.quantidade}</td>
                    <td className="px-3 py-2.5"><Confidence level={s.confianca}/></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>

          {/* Pendências */}
          <div className="mb-6">
            <p className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><Icons.alert size={16} className="text-amber-500"/> Pendências para confirmação manual</p>
            <div className="space-y-1.5">{result.pendencias.map((p,i)=>(
              <div key={i} className="flex items-start gap-2 p-2.5 bg-amber-50/50 rounded-lg border border-amber-100"><span className="text-amber-500 text-xs mt-0.5">❓</span><span className="text-sm text-slate-700">{p}</span></div>
            ))}</div>
          </div>

          {/* Inconsistências */}
          {result.inconsistencias.length>0&&(<div>
            <p className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><Icons.alert size={16} className="text-red-500"/> Inconsistências e observações</p>
            <div className="space-y-2">{result.inconsistencias.map((inc,i)=>(
              <div key={i} className={`flex items-start gap-2 p-3 rounded-lg border ${inc.tipo==="warn"?"bg-red-50/50 border-red-200":"bg-blue-50/50 border-blue-200"}`}>
                {inc.tipo==="warn"?<Icons.alert size={14} className="text-red-500 flex-shrink-0 mt-0.5"/>:<Icons.info size={14} className="text-blue-500 flex-shrink-0 mt-0.5"/>}
                <span className="text-xs text-slate-700">{inc.texto}</span>
              </div>
            ))}</div>
          </div>)}
        </Card>

        <div className="flex justify-between gap-2 flex-wrap"><Btn variant="secondary" onClick={()=>{setResult(null);setFiles([]);}}><Icons.arrowLeft size={14}/> Nova análise</Btn><Btn onClick={()=>{
          // Extrai números dos campos da análise da IA (área, pavimentos, altura)
          const extrair=(regex,padrao=0)=>{
            const item=result.encontrados?.find(d=>regex.test(d.campo||""));
            if(!item)return padrao;
            const m=String(item.valor||"").replace(/\./g,"").replace(",",".").match(/(\d+(?:\.\d+)?)/);
            return m?Number(m[1]):padrao;
          };
          const area=extrair(/área.*constru|construída|construido/i);
          const pav=extrair(/pavimento/i,1);
          const alt=extrair(/altura/i);
          const enq=result.sugestao_enquadramento||{};
          const grupo=(enq.grupo||"").toUpperCase();
          // Normaliza divisão (pode vir como "D-1" ou apenas "1")
          let divisao=enq.divisao||"";
          if(divisao&&!divisao.includes("-")&&grupo)divisao=grupo+"-"+divisao;
          divisao=divisao.toUpperCase();

          const nomeProj=files[0]?.name?.replace(/\.[^.]+$/,"")||"Projeto da IA";
          const novoProj={
            id:Date.now(),
            nome:nomeProj,
            status:"RASCUNHO",
            grupo:grupo||"D",
            divisao:divisao||"D-1",
            area_construida:area||0,
            altura_edificacao:alt||0,
            numero_pavimentos:pav||1,
            criado:new Date().toISOString().split("T")[0],
            atualizado:new Date().toISOString().split("T")[0],
            possui_subsolo:false,
            populacao:0,
            carga_incendio:0,
            numero_subsolos:0,
            responsavel_tecnico:"",
            crea_responsavel:"",
            origem_ia:true,
          };
          setProjects(p=>[novoProj,...p]);
          setSelProj(novoProj);
          setPage("calculos");
        }}><Icons.check size={14}/> Aplicar ao projeto</Btn></div>
      </>)}
    </div>
  );
};

// Coeficiente C de Hazen-Williams por material
const COEFICIENTES_C={
  "aco_galv":{nome:"Aço galvanizado",C:120},
  "aco_carb":{nome:"Aço carbono",C:120},
  "ferro_fund":{nome:"Ferro fundido",C:130},
  "pvc":{nome:"PVC",C:140},
  "cobre":{nome:"Cobre",C:130},
};

// Cálculo Hazen-Williams: J = 10.65 × Q^1.85 / (C^1.85 × D^4.87)  [m/m]
// Q em m³/s, D em metros
function calcPerdaCarga(Q_lmin,D_mm,C,L_m){
  const Q=Q_lmin/60000; // L/min -> m³/s
  const D=D_mm/1000;    // mm -> m
  const J=10.65*Math.pow(Q,1.85)/(Math.pow(C,1.85)*Math.pow(D,4.87)); // m/m
  const perda=J*L_m;
  const velocidade=Q/(Math.PI*Math.pow(D/2,2)); // m/s
  return {J,perda,velocidade,Q,D};
}

  const calcularCaminho=(hidranteTag)=>{

    const caminhoIds=[];
    let alvo=hidranteTag;
